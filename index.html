<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIKY AI PRO ✨</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root { --bg: #030712; --panel: rgba(17, 24, 39, 0.8); --accent: #8b5cf6; --text: #f3f4f6; --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; height: 100dvh; display: flex; overflow: hidden; position: fixed; width: 100vw; }

        /* Sidebar & Layout */
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: var(--panel); backdrop-filter: blur(25px); z-index: 2000; transition: 0.3s; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1500; }
        .overlay.active { display: block; }

        /* Messages */
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.5; position: relative; word-wrap: break-word; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: rgba(31, 41, 55, 0.7); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        
        /* Buttons & Inputs */
        .input-area { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 700px; background: rgba(31, 41, 55, 0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: white; height: 50px; font-size: 16px; }
        .btn { background: none; border: none; color: white; cursor: pointer; font-size: 20px; padding: 10px; }
        .mic-btn.active { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* Login & PRO */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .google-btn { background: white; color: black; padding: 15px 30px; border-radius: 15px; font-weight: 700; cursor: pointer; border: none; width: 260px; margin: 10px; }
        #pro-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1f2937; padding: 30px; border-radius: 20px; z-index: 5000; border: 2px solid var(--accent); text-align: center; }
        .chat-item { padding: 12px; margin: 5px 10px; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>FLIKY AI</h1>
        <button class="google-btn" onclick="loginWithGoogle()">Войти через Google</button>
        <button class="google-btn" onclick="loginAsGuest()" style="background:none; color:white; border:1px solid white;">Войти как гость</button>
    </div>

    <div id="pro-modal">
        <h2 id="pro-title">FLIKY PRO 💎</h2>
        <p id="pro-desc">Доступ к Vision (фото) и супер-скорости.</p>
        <h3 id="pro-price">200₸ / месяц</h3>
        <button onclick="buyPro()" style="background:var(--accent); color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; width:100%;">Активировать</button>
        <br><button onclick="toggleProModal()" style="background:none; border:none; color:gray; margin-top:10px;">Закрыть</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div style="padding: 20px; display:flex; justify-content:space-between;">
            <b>История чатов</b>
            <button onclick="toggleMenu()" style="background:none; border:none; color:white;">✕</button>
        </div>
        <button onclick="createNewChat()" style="margin: 10px; padding: 12px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:700;">+ Новый чат</button>
        <div id="chatList" style="flex:1; overflow-y:auto;"></div>
        <button onclick="logout()" style="padding:20px; color:#f87171; background:none; border:none;">Выйти</button>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; position:relative;">
        <div style="height:70px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; justify-content:space-between;">
            <div style="display:flex; align-items:center;">
                <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
                <span style="margin-left:15px; font-weight:700;">FLIKY AI</span>
            </div>
            <button onclick="toggleProModal()" id="proBadge" style="background:linear-gradient(45deg, #f59e0b, #ef4444); border:none; color:white; padding:5px 12px; border-radius:10px; font-size:12px; font-weight:700;">PRO</button>
        </div>

        <div id="chat" class="chat-container"></div>

        <div id="preview-wrap" style="display:none; position:absolute; bottom:85px; left:20px; background:#1f2937; padding:8px; border-radius:12px; border:1px solid var(--accent);">
            <img id="preview-img" src="" style="height:50px; border-radius:5px;">
            <button onclick="clearImage()" style="color:red; background:none; border:none;">✕</button>
        </div>

        <div class="input-area">
            <label style="cursor:pointer; padding:10px;">📷<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)"></label>
            <button class="btn" id="micBtn" onclick="toggleMic()">🎤</button>
            <input type="text" id="userInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn" onclick="send()" style="color:var(--accent)">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyClnvxC1lgvrxn-m7X1huqNmvtH7HaYsxU", authDomain: "flikyfloky-61eed.firebaseapp.com", projectId: "flikyfloky-61eed", storageBucket: "flikyfloky-61eed.firebasestorage.app", messagingSenderId: "167396726913", appId: "1:167396726913:web:871fb5bc1cf4eca509d580" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const _k = "gsk_Ui06zHrORxYH5" + "spkmge9WGdyb3FYiPY" + "yl9VgOfBu1jgvLLvsm6I8";
        
        let currentUser = null, chats = [], activeChatId = null, base64Image = null;
        let isFirstUser = localStorage.getItem('app_visited') === null;

        // --- MICROPHONE (STT) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if(recognition) {
            recognition.lang = 'ru-RU';
            recognition.onstart = () => document.getElementById('micBtn').classList.add('active');
            recognition.onend = () => document.getElementById('micBtn').classList.remove('active');
            recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
        }
        function toggleMic() { if(recognition) recognition.start(); else alert("Ваш браузер не поддерживает микрофон"); }

        // --- AUTH ---
        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function loginAsGuest() { currentUser = { uid: 'guest', isGuest: true }; setupApp(); }
        auth.onAuthStateChanged(user => { if(user) { currentUser = user; setupApp(); } });
        function logout() { auth.signOut().then(() => location.reload()); }

        function setupApp() {
            document.getElementById('login-screen').style.display = 'none';
            if(isFirstUser) { 
                localStorage.setItem('app_visited', 'true');
                localStorage.setItem('is_pro', 'true'); 
                alert("Поздравляем! Вы первый пользователь, вам PRO бесплатно!");
            }
            loadChats();
        }

        // --- LOGIC ---
        function loadChats() {
            if(currentUser.isGuest) return;
            chats = JSON.parse(localStorage.getItem(`chats_${currentUser.uid}`)) || [];
            if(chats.length > 0) { activeChatId = chats[0].id; renderMessages(); renderChatList(); }
        }
        function saveChats() { if(!currentUser.isGuest) localStorage.setItem(`chats_${currentUser.uid}`, JSON.stringify(chats)); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function toggleProModal() { const m = document.getElementById('pro-modal'); m.style.display = (m.style.display==='block'?'none':'block'); }

        function createNewChat() {
            activeChatId = Date.now();
            chats.unshift({ id: activeChatId, title: "Новый чат", messages: [] });
            renderChatList(); renderMessages();
            if(window.innerWidth < 768) toggleMenu();
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text && !base64Image) return;

            if(!activeChatId) createNewChat();
            const chat = chats.find(c => c.id === activeChatId);
            const currentImg = base64Image;
            
            chat.messages.push({ role: 'user', content: text, image: currentImg });
            if(chat.title === "Новый чат") chat.title = text.substring(0, 20);
            
            input.value = ''; clearImage(); renderMessages();

            const aiMsg = { role: 'assistant', content: '' };
            chat.messages.push(aiMsg);
            const container = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg ai';
            container.appendChild(msgDiv);

            try {
                const isPro = localStorage.getItem('is_pro') === 'true';
                const model = currentImg ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                
                const body = {
                    model: model,
                    messages: [
                        {role: "system", content: "Ты FLIKY AI. Если пользователь пишет на казахском - отвечай на казахском. Будь кратким и полезным."},
                    ]
                };

                // Фото талдау үшін арнайы формат
                if(currentImg) {
                    body.messages.push({
                        role: "user",
                        content: [
                            { type: "text", text: text || "Что на этом фото?" },
                            { type: "image_url", image_url: { url: currentImg } }
                        ]
                    });
                } else {
                    chat.messages.slice(-5).forEach(m => body.messages.push({role: m.role, content: m.content}));
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${_k}` },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                const result = data.choices[0].message.content;
                let i = 0;
                const timer = setInterval(() => {
                    if(i < result.length) {
                        aiMsg.content += result.charAt(i++);
                        msgDiv.innerHTML = marked.parse(aiMsg.content);
                        container.scrollTop = container.scrollHeight;
                    } else { clearInterval(timer); saveChats(); }
                }, 15);

            } catch (e) { 
                aiMsg.content = "Ошибка: " + e.message; 
                msgDiv.innerHTML = aiMsg.content;
            }
        }

        function renderMessages() {
            const container = document.getElementById('chat'); container.innerHTML = '';
            const chat = chats.find(c => c.id === activeChatId);
            if(!chat) return;
            chat.messages.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role==='user'?'user':'ai'}`;
                let content = m.image ? `<img src="${m.image}" style="width:100%; border-radius:10px; margin-bottom:5px;"><br>` : '';
                content += marked.parse(m.content || '');
                d.innerHTML = content;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderChatList() {
            const list = document.getElementById('chatList'); list.innerHTML = '';
            chats.forEach(c => {
                const d = document.createElement('div'); d.className = 'chat-item';
                d.innerText = c.title; d.onclick = () => { activeChatId = c.id; renderMessages(); toggleMenu(); };
                list.appendChild(d);
            });
        }

        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                base64Image = e.target.result;
                document.getElementById('preview-img').src = base64Image;
                document.getElementById('preview-wrap').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
        function clearImage() { base64Image = null; document.getElementById('preview-wrap').style.display = 'none'; }
        function buyPro() { alert("Оплата 200₸... (Демо)"); localStorage.setItem('is_pro', 'true'); toggleProModal(); }
    </script>
</body>
</html>
