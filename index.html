<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <style>
        :root {
            --tg-bg-color: #0e1621;
            --tg-surface-color: #17212b;
            --tg-text-color: #f5f5f5;
            --tg-text-secondary: #7f91a4;
            --tg-accent-color: #5288c1;
            --tg-border-color: #101924;
            --tg-msg-out: #244b6f;
            --tg-msg-in: #182533;
            --tg-verified: #2f8cc9;
            --tg-status-online: #5288c1;
            --tg-unread-badge: #5288c1;
            --tg-shadow: rgba(0,0,0,0.3);
        }

        [data-theme="light"] {
            --tg-bg-color: #ffffff;
            --tg-surface-color: #f0f0f0;
            --tg-text-color: #000000;
            --tg-text-secondary: #707579;
            --tg-border-color: #d5d5d5;
            --tg-msg-out: #e1ffc7;
            --tg-msg-in: #f0f0f0;
            --tg-shadow: rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            color: var(--tg-text-color);
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }

        #loading-screen .spinner {
            width: 44px;
            height: 44px;
            border: 3.5px solid rgba(127, 145, 164, 0.2);
            border-top: 3.5px solid var(--tg-accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #5288c1, #2a9d8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading-status {
            color: var(--tg-text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .loading-error {
            color: #ff3b30;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .reconnect-btn {
            background: var(--tg-accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }

        #app-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #main-header {
            height: 56px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            flex-shrink: 0;
            gap: 10px;
        }

        .header-content-left {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .header-main-title {
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .connection-status {
            font-size: 12px;
            color: var(--tg-text-secondary);
            margin-top: 2px;
        }

        .search-input {
            background-color: var(--tg-bg-color);
            border: 1px solid var(--tg-border-color);
            border-radius: 19px;
            padding: 6px 14px;
            color: var(--tg-text-color);
            font-size: 14px;
            outline: none;
            width: 100%;
            max-width: 200px;
        }

        .screen {
            flex: 1;
            display: none;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--tg-border-color);
            cursor: pointer;
            background-color: var(--tg-surface-color);
            position: relative;
            transition: background-color 0.2s;
        }

        .chat-item:active {
            background-color: #202b36;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5085b1, #366187);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            flex-shrink: 0;
            position: relative;
        }

        .chat-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tg-verify-icon {
            width: 15px;
            height: 15px;
            fill: var(--tg-verified);
            flex-shrink: 0;
        }

        .chat-preview {
            font-size: 13.5px;
            color: var(--tg-text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-unread-badge {
            background-color: var(--tg-unread-badge);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
            margin-left: 8px;
        }

        #chat-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .chat-header {
            height: 56px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            padding: 0 12px;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--tg-accent-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding-right: 8px;
            height: 100%;
        }

        .header-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
            cursor: pointer;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5288c1, #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: #ffffff;
            flex-shrink: 0;
            position: relative;
        }

        .header-text-container {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header-chat-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--tg-text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-chat-status {
            font-size: 12px;
            color: var(--tg-status-online);
            margin-top: 1px;
        }

        #chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 2px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }

        .message {
            max-width: 75%;
            min-width: 60px;
            padding: 6px 10px 7px 10px;
            border-radius: 12px;
            font-size: 14.5px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 1px var(--tg-shadow);
            display: flex;
            flex-direction: column;
            word-break: break-word;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message:active {
            transform: scale(0.98);
        }

        .message.sent {
            background-color: var(--tg-msg-out);
            color: var(--tg-text-color);
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background-color: var(--tg-msg-in);
            color: var(--tg-text-color);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            float: right;
            margin: 3px -4px -4px 8px;
            align-self: flex-end;
            user-select: none;
        }

        .message-time {
            font-size: 10.5px;
            color: var(--tg-text-secondary);
        }

        .status-ticks {
            display: flex;
            align-items: center;
            color: #4cd964;
        }

        .status-ticks svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
        }

        .chat-input-area {
            padding: 8px 12px;
            background-color: var(--tg-surface-color);
            border-top: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        .chat-input {
            flex: 1;
            background-color: var(--tg-bg-color);
            border: 1px solid var(--tg-border-color);
            border-radius: 19px;
            padding: 9px 15px;
            color: var(--tg-text-color);
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .send-btn.active {
            color: var(--tg-accent-color);
        }

        .placeholder-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--tg-text-secondary);
            font-size: 15px;
        }

        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: var(--tg-border-color);
            margin-bottom: 12px;
            object-fit: cover;
            cursor: pointer;
        }

        .profile-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .profile-username {
            font-size: 14px;
            color: var(--tg-text-secondary);
        }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: var(--tg-surface-color);
            border-top: 1px solid var(--tg-border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--tg-text-secondary);
            font-size: 11px;
            cursor: pointer;
            height: 100%;
            gap: 2px;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--tg-accent-color);
        }

        .search-results {
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .search-result-item {
            padding: 10px 14px;
            border-bottom: 1px solid var(--tg-border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-result-item:active {
            background-color: #202b36;
        }

        .chat-time {
            font-size: 11px;
            color: var(--tg-text-secondary);
            white-space: nowrap;
        }

        .profile-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .profile-popup.active {
            display: flex;
        }

        .profile-popup-content {
            background-color: var(--tg-surface-color);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .profile-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-popup-close {
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .message-actions {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--tg-surface-color);
            border-radius: 12px;
            padding: 8px;
            display: none;
            gap: 8px;
            z-index: 2500;
            box-shadow: 0 4px 12px var(--tg-shadow);
            flex-wrap: wrap;
            justify-content: center;
        }

        .message-actions.active {
            display: flex;
        }

        .message-action-btn {
            background: none;
            border: none;
            color: var(--tg-text-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .message-action-btn:hover {
            background-color: var(--tg-border-color);
        }

        .message-action-btn.danger {
            color: #ff3b30;
        }

        .theme-switch {
            background: none;
            border: none;
            color: var(--tg-text-color);
            font-size: 24px;
            cursor: pointer;
        }

        .link {
            color: var(--tg-accent-color);
            text-decoration: none;
            cursor: pointer;
        }

        .link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .profile-popup-content {
                width: 95%;
                padding: 20px;
            }
            
            .search-input {
                max-width: 120px;
                font-size: 12px;
            }
            
            .message-actions {
                bottom: 70px;
                padding: 6px;
            }
            
            .message-action-btn {
                padding: 6px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-title">DICEGRAM</div>
        <p class="loading-status" id="loading-status">Подключение к серверу...</p>
        <p class="loading-error" id="loading-error">❌ Не удалось подключиться к серверу</p>
        <button class="reconnect-btn" id="reconnect-btn" onclick="reconnect()">🔄 Переподключиться</button>
    </div>

    <div id="app-container">
        <header id="main-header">
            <div class="header-content-left">
                <span id="header-title" class="header-main-title">Чаты</span>
                <span id="global-status" class="connection-status" style="display:none;">Соединение...</span>
            </div>
            <input type="text" id="global-search" class="search-input" placeholder="Поиск..." oninput="handleSearch(this.value)">
            <button class="theme-switch" onclick="toggleTheme()">🌙</button>
        </header>

        <div id="search-results" class="search-results"></div>

        <div id="screen-chats" class="screen active">
            <div id="chats-list"></div>
        </div>

        <div id="chat-room">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()">❮ Назад</button>
                <div class="header-user-info" onclick="showUserProfile(currentChatId)">
                    <div class="header-avatar" id="room-header-avatar">DS</div>
                    <div class="header-text-container">
                        <span id="chat-room-title" class="header-chat-title">Чат</span>
                        <span id="chat-room-status" class="header-chat-status">в сети</span>
                    </div>
                </div>
            </div>
            
            <div id="chat-messages"></div>
            
            <div class="chat-input-area">
                <input type="text" id="message-field" class="chat-input" placeholder="Сообщение..." autocomplete="off" oninput="toggleSendButton(this)">
                <button id="send-btn-icon" class="send-btn" onclick="sendMessage()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div id="screen-contacts" class="screen">
            <div id="contacts-list"></div>
        </div>

        <div id="screen-settings" class="screen">
            <div style="padding:20px;">
                <h2>⚙️ Настройки DICEGRAM</h2>
                <div style="margin-top:20px;">
                    <button onclick="toggleTheme()" style="background:var(--tg-surface-color);color:var(--tg-text-color);border:1px solid var(--tg-border-color);padding:12px 20px;border-radius:12px;width:100%;font-size:16px;cursor:pointer;">🌓 Сменить тему</button>
                </div>
                <div style="margin-top:10px;">
                    <button onclick="alert('Версия 1.0.0')" style="background:var(--tg-surface-color);color:var(--tg-text-color);border:1px solid var(--tg-border-color);padding:12px 20px;border-radius:12px;width:100%;font-size:16px;cursor:pointer;">ℹ️ О приложении</button>
                </div>
            </div>
        </div>

        <div id="screen-profile" class="screen">
            <div class="profile-container">
                <img id="user-avatar" class="profile-avatar" src="https://via.placeholder.com/100/17212b/ffffff?text=U" alt="Avatar" onclick="changeAvatar()">
                <div id="user-name" class="profile-name">Имя Фамилия</div>
                <div id="user-username" class="profile-username">@username</div>
                <div style="margin-top:10px;color:var(--tg-text-secondary);font-size:13px;">Был(а) в сети недавно</div>
            </div>
            <div style="padding:16px;">
                <div style="background:var(--tg-surface-color);border-radius:12px;padding:12px;">
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--tg-border-color);">
                        <span style="color:var(--tg-text-secondary);">Имя</span>
                        <span id="profile-display-name" style="cursor:pointer;color:var(--tg-accent-color);" onclick="editName()">Изменить</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--tg-border-color);">
                        <span style="color:var(--tg-text-secondary);">Username</span>
                        <span id="profile-username-display" style="cursor:pointer;color:var(--tg-accent-color);" onclick="editUsername()">@username</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--tg-border-color);">
                        <span style="color:var(--tg-text-secondary);">Bio</span>
                        <span id="profile-bio-display" style="cursor:pointer;color:var(--tg-accent-color);" onclick="editBio()">Добавить описание</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;">
                        <span style="color:var(--tg-text-secondary);">Язык</span>
                        <span onclick="changeLanguage()" style="cursor:pointer;color:var(--tg-accent-color);">Русский</span>
                    </div>
                </div>
            </div>
        </div>

        <nav id="bottom-navigation">
            <div class="nav-item active" onclick="switchTab('chats', this)">
                <div style="font-size:22px;">💬</div>
                <div>Чаты</div>
            </div>
            <div class="nav-item" onclick="switchTab('contacts', this)">
                <div style="font-size:22px;">👥</div>
                <div>Контакты</div>
            </div>
            <div class="nav-item" onclick="switchTab('settings', this)">
                <div style="font-size:22px;">⚙️</div>
                <div>Настройки</div>
            </div>
            <div class="nav-item" onclick="switchTab('profile', this)">
                <div style="font-size:22px;">👤</div>
                <div>Профиль</div>
            </div>
        </nav>
    </div>

    <div id="profile-popup" class="profile-popup">
        <div class="profile-popup-content">
            <div class="profile-popup-header">
                <h2 id="popup-user-name">Пользователь</h2>
                <button class="profile-popup-close" onclick="closeProfilePopup()">✕</button>
            </div>
            <div id="popup-user-info">
                <div style="text-align:center;margin-bottom:20px;">
                    <div id="popup-avatar" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg, #5085b1, #366187);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;"></div>
                    <div id="popup-name" style="font-size:18px;font-weight:600;margin-top:10px;"></div>
                    <div id="popup-username" style="color:var(--tg-text-secondary);font-size:14px;"></div>
                    <div id="popup-bio" style="color:var(--tg-text-secondary);font-size:13px;margin-top:5px;"></div>
                    <div id="popup-status" style="color:var(--tg-status-online);font-size:13px;margin-top:5px;"></div>
                    <div id="popup-verified" style="color:var(--tg-verified);font-size:13px;margin-top:5px;"></div>
                    <div id="popup-created" style="color:var(--tg-text-secondary);font-size:12px;margin-top:5px;"></div>
                </div>
                <div id="popup-actions" style="display:flex;flex-direction:column;gap:8px;">
                    <button onclick="addContact()" style="background:var(--tg-accent-color);color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">➕ Добавить в контакты</button>
                    <button onclick="blockUser()" style="background:#ff3b30;color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">🚫 Заблокировать</button>
                </div>
            </div>
        </div>
    </div>

    <div id="message-actions" class="message-actions">
        <button class="message-action-btn" onclick="replyToMessage()">↩ Ответить</button>
        <button class="message-action-btn" onclick="forwardMessage()">📤 Переслать</button>
        <button class="message-action-btn" onclick="copyMessage()">📋 Копировать</button>
        <button class="message-action-btn" onclick="editMessage()">✏️ Изменить</button>
        <button class="message-action-btn danger" onclick="deleteMessage()">🗑 Удалить</button>
        <button class="message-action-btn" onclick="pinMessage()">📌 Закрепить</button>
    </div>

    <script>
        console.log('🚀 DICEGRAM загружается...');
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ============ КОНФИГУРАЦИЯ ============
        const SERVER_URL = "https://a38499-be46.m.jrnm.app";
        const CREATOR_ID = "8771009385";
        const CREATOR_USERNAME = "dauletbr";
        const MAX_RECONNECT_ATTEMPTS = 5;

        // ============ ПЕРЕМЕННЫЕ ============
        let socket = null;
        let isConnected = false;
        let reconnectAttempts = 0;
        let isInitialLoad = true;
        let currentChatId = null;
        let myTelegramId = null;
        let myUsername = '';
        let dynamicChats = {};
        let unreadCounts = {};
        let selectedMessageId = null;
        let theme = 'dark';
        let authTimeout = null;
        let currentUserData = null;

        // ============ ПОЛЬЗОВАТЕЛЬ ============
        const tgUser = tg.initDataUnsafe?.user || {
            id: 123456789,
            first_name: "Локальный",
            last_name: "Пользователь",
            username: "тест_юзер",
            photo_url: ""
        };

        myTelegramId = String(tgUser.id);
        myUsername = tgUser.username || '';
        console.log('👤 Пользователь:', tgUser.first_name, '@' + myUsername, 'ID:', myTelegramId);

        // ============ ИНИЦИАЛИЗАЦИЯ ПРОФИЛЯ ============
        function initProfile() {
            const fullName = `${tgUser.first_name} ${tgUser.last_name || ''}`.trim();
            document.getElementById('user-name').innerText = fullName || 'Пользователь';
            document.getElementById('user-username').innerText = myUsername ? `@${myUsername}` : '';
            document.getElementById('profile-username-display').innerText = myUsername ? `@${myUsername}` : '';
            document.getElementById('profile-display-name').innerText = fullName || 'Изменить';
            if (tgUser.photo_url) {
                document.getElementById('user-avatar').src = tgUser.photo_url;
            }
        }
        initProfile();

        // ============ ЛОКАЛЬНОЕ ВРЕМЯ ============
        function getLocalTime(timestamp) {
            try {
                const date = new Date(timestamp);
                if (isNaN(date.getTime())) return '--:--';
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return '--:--';
            }
        }

        // ============ УПРАВЛЕНИЕ СОЕДИНЕНИЕМ ============
        function connectSocket() {
            const loadingStatus = document.getElementById('loading-status');
            const loadingError = document.getElementById('loading-error');
            const reconnectBtn = document.getElementById('reconnect-btn');
            
            loadingStatus.textContent = 'Подключение к серверу...';
            loadingStatus.style.display = 'block';
            loadingError.style.display = 'none';
            reconnectBtn.style.display = 'none';

            console.log('🔌 Подключение к серверу:', SERVER_URL);

            if (socket) {
                socket.disconnect();
                socket = null;
            }

            socket = io(SERVER_URL, { 
                transports: ["websocket", "polling"],
                secure: true,
                reconnection: true,
                reconnectionAttempts: MAX_RECONNECT_ATTEMPTS,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                timeout: 10000
            });

            socket.on('connect', () => {
                console.log('✅ Socket.IO подключен');
                isConnected = true;
                reconnectAttempts = 0;
                
                const statusEl = document.getElementById('global-status');
                statusEl.style.display = 'none';
                
                loadingStatus.textContent = 'Авторизация...';
                
                socket.emit('auth', tgUser, (response) => {
                    console.log('📨 Ответ авторизации:', response);
                    
                    if (response && response.status === 'ok') {
                        console.log('✅ Авторизация успешна');
                        loadingStatus.textContent = 'Загрузка...';
                        
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('app-container').style.display = 'flex';
                        
                        // Загружаем данные пользователя
                        socket.emit('get_user_info', { user_id: myTelegramId }, (userInfo) => {
                            if (userInfo && userInfo.status === 'found') {
                                currentUserData = userInfo.user;
                                myUsername = currentUserData.username || myUsername;
                                initProfile();
                            }
                        });
                        
                        if (isInitialLoad) {
                            setTimeout(() => {
                                loadChatsAndMessages();
                                loadContacts();
                                isInitialLoad = false;
                            }, 500);
                        }
                    } else {
                        console.error('❌ Ошибка авторизации:', response);
                        loadingStatus.textContent = 'Ошибка авторизации';
                        loadingError.style.display = 'block';
                        reconnectBtn.style.display = 'block';
                    }
                });
            });

            socket.on('connect_error', (error) => {
                console.error('❌ Ошибка подключения:', error);
                reconnectAttempts++;
                
                loadingStatus.textContent = `Ошибка подключения (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`;
                
                if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                    loadingError.style.display = 'block';
                    reconnectBtn.style.display = 'block';
                    loadingStatus.textContent = 'Не удалось подключиться';
                }
            });

            socket.on('disconnect', (reason) => {
                console.log('🔌 Отключение:', reason);
                isConnected = false;
                const statusEl = document.getElementById('global-status');
                statusEl.style.display = 'block';
                statusEl.innerText = 'Соединение потеряно';
                statusEl.style.color = '#ff3b30';
            });

            socket.on('reconnect', () => {
                console.log('🔄 Переподключено');
                isConnected = true;
                const statusEl = document.getElementById('global-status');
                statusEl.style.display = 'none';
                loadChatsAndMessages();
                loadContacts();
            });

            socket.on('new_message', (msg) => {
                console.log('📩 Новое сообщение:', msg);
                handleNewMessage(msg);
            });

            socket.on('user_updated', (data) => {
                console.log('🔄 Обновление пользователя:', data);
                if (data.user_id === myTelegramId) {
                    if (data.username) {
                        myUsername = data.username;
                        initProfile();
                    }
                }
                // Обновляем чаты если нужно
                loadChatsAndMessages();
            });

            if (authTimeout) clearTimeout(authTimeout);
            authTimeout = setTimeout(() => {
                if (!isConnected) {
                    loadingStatus.textContent = 'Превышено время ожидания';
                    loadingError.style.display = 'block';
                    reconnectBtn.style.display = 'block';
                }
            }, 15000);
        }

        function reconnect() {
            console.log('🔄 Ручное переподключение...');
            reconnectAttempts = 0;
            connectSocket();
        }

        // ============ ЗАГРУЗКА ЧАТОВ ============
        function loadChatsAndMessages() {
            if (!socket || !isConnected) {
                console.log('⏳ Ожидание соединения...');
                setTimeout(loadChatsAndMessages, 1000);
                return;
            }

            console.log('📥 Загрузка чатов...');
            socket.emit('get_all_chats', {}, (chats) => {
                console.log('📨 Получены чаты:', chats?.length || 0);
                
                const chatsList = document.getElementById('chats-list');
                chatsList.innerHTML = '';
                
                if (chats && Array.isArray(chats)) {
                    chats.forEach(chat => {
                        const partnerId = chat.partner_id;
                        if (partnerId && partnerId !== myTelegramId) {
                            if (!dynamicChats[partnerId]) {
                                dynamicChats[partnerId] = {
                                    first_name: chat.partner_name || `User ${partnerId}`,
                                    username: chat.partner_username || `@user${partnerId}`
                                };
                            }
                            createChatRow(partnerId, dynamicChats[partnerId].first_name, dynamicChats[partnerId].username);
                            
                            if (chat.last_message) {
                                const previewEl = document.getElementById(`preview-${partnerId}`);
                                if (previewEl) previewEl.innerText = chat.last_message;
                            }
                            if (chat.unread_count > 0) {
                                unreadCounts[partnerId] = chat.unread_count;
                                updateUnreadBadge(partnerId, chat.unread_count);
                            }
                        }
                    });
                }
                
                if (chatsList.children.length === 0) {
                    chatsList.innerHTML = `
                        <div style="padding:40px 20px;text-align:center;color:var(--tg-text-secondary);">
                            <div style="font-size:48px;margin-bottom:16px;">💬</div>
                            <div style="font-size:16px;font-weight:500;">Нет чатов</div>
                            <div style="font-size:13px;margin-top:4px;">Начните переписку с помощью поиска</div>
                        </div>
                    `;
                }
            });
        }

        // ============ ЗАГРУЗКА КОНТАКТОВ ============
        function loadContacts() {
            if (!socket || !isConnected) return;
            
            socket.emit('get_contacts', {}, (contacts) => {
                const contactsList = document.getElementById('contacts-list');
                contactsList.innerHTML = '';
                
                if (contacts && contacts.length > 0) {
                    contacts.forEach(contact => {
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        div.innerHTML = `
                            <div class="chat-avatar" style="background:linear-gradient(135deg, #5085b1, #366187);">
                                ${(contact.first_name || 'U').substring(0,2).toUpperCase()}
                            </div>
                            <div class="chat-details">
                                <div class="chat-title-row">
                                    <div class="chat-name">${contact.first_name || 'User'} ${contact.is_verified ? '✅' : ''}</div>
                                </div>
                                <div class="chat-preview">@${contact.username || ''}</div>
                            </div>
                        `;
                        div.onclick = () => {
                            if (!dynamicChats[contact.telegram_id]) {
                                dynamicChats[contact.telegram_id] = {
                                    first_name: contact.first_name || `User ${contact.telegram_id}`,
                                    username: contact.username || ''
                                };
                                createChatRow(contact.telegram_id, contact.first_name || `User ${contact.telegram_id}`, contact.username || '');
                            }
                            openChat(contact.telegram_id, contact.first_name || `User ${contact.telegram_id}`, contact.is_verified);
                        };
                        contactsList.appendChild(div);
                    });
                } else {
                    contactsList.innerHTML = `
                        <div style="padding:40px 20px;text-align:center;color:var(--tg-text-secondary);">
                            <div style="font-size:48px;margin-bottom:16px;">👥</div>
                            <div style="font-size:16px;font-weight:500;">Нет контактов</div>
                            <div style="font-size:13px;margin-top:4px;">Добавьте пользователей в контакты</div>
                        </div>
                    `;
                }
            });
        }

        // ============ ОБРАБОТКА НОВОГО СООБЩЕНИЯ ============
        function handleNewMessage(msg) {
            const chatPartner = msg.sender_id === myTelegramId ? msg.receiver_id : msg.sender_id;

            if (chatPartner && chatPartner !== myTelegramId) {
                if (!dynamicChats[chatPartner]) {
                    socket.emit('get_user_info', { user_id: chatPartner }, (userInfo) => {
                        if (userInfo && userInfo.status === 'found') {
                            dynamicChats[chatPartner] = {
                                first_name: userInfo.user.first_name || `User ${chatPartner}`,
                                username: userInfo.user.username || `@user${chatPartner}`
                            };
                            createChatRow(chatPartner, dynamicChats[chatPartner].first_name, dynamicChats[chatPartner].username);
                        }
                    });
                }

                if (msg.sender_id !== myTelegramId && currentChatId !== chatPartner) {
                    unreadCounts[chatPartner] = (unreadCounts[chatPartner] || 0) + 1;
                    updateUnreadBadge(chatPartner, unreadCounts[chatPartner]);
                }
            }

            const previewEl = document.getElementById(`preview-${chatPartner}`);
            if (previewEl) previewEl.innerText = msg.text || '';

            if (currentChatId === chatPartner) {
                renderSingleMessage(msg);
                scrollToBottom();
                if (msg.sender_id !== myTelegramId) {
                    unreadCounts[chatPartner] = 0;
                    updateUnreadBadge(chatPartner, 0);
                }
            }
        }

        // ============ СОЗДАНИЕ СТРОКИ ЧАТА ============
        function createChatRow(tgId, firstName, username) {
            if (!tgId) return;
            
            if (!dynamicChats[tgId]) {
                dynamicChats[tgId] = { first_name: firstName || `User ${tgId}`, username: username || '' };
            }
            
            const chatsList = document.getElementById('chats-list');
            if (document.getElementById(`chat-item-${tgId}`)) return;
            
            const isBotFather = username === 'botfather';
            const isSupport = tgId === '0';
            const isVerified = tgId === CREATOR_ID || username === 'botfather';
            const verifiedIcon = isVerified ? 
                `<svg class="tg-verify-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
            
            const displayName = firstName || `User ${tgId}`;
            let avatarBg = 'linear-gradient(135deg, #5085b1, #366187)';
            if (isBotFather) avatarBg = 'linear-gradient(135deg, #2a9d8f, #264653)';
            else if (isSupport) avatarBg = 'linear-gradient(135deg, #5288c1, #1a3a5c)';
            
            const rowHTML = `
                <div class="chat-item" id="chat-item-${tgId}" onclick="openChat('${tgId}', '${displayName.replace(/'/g, "\\'")}', ${isVerified})">
                    <div class="chat-avatar" style="background: ${avatarBg}">
                        ${displayName.substring(0,2).toUpperCase()}
                        ${isVerified ? '<span style="position:absolute;bottom:-2px;right:-2px;font-size:12px;">✓</span>' : ''}
                    </div>
                    <div class="chat-details">
                        <div class="chat-title-row">
                            <div class="chat-name">${displayName} ${verifiedIcon}</div>
                            <div style="display:flex;align-items:center;gap:4px;">
                                <span class="chat-time" id="time-${tgId}"></span>
                                <span class="chat-unread-badge" id="unread-badge-${tgId}" style="display:none;">0</span>
                            </div>
                        </div>
                        <div class="chat-preview" id="preview-${tgId}">Нет сообщений</div>
                    </div>
                </div>
            `;
            chatsList.insertAdjacentHTML('beforeend', rowHTML);
        }

        function updateUnreadBadge(chatId, count) {
            const badge = document.getElementById(`unread-badge-${chatId}`);
            if (badge) {
                if (count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = count;
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // ============ ПОИСК ============
        function handleSearch(query) {
            const resultsContainer = document.getElementById('search-results');
            if (!query.trim()) {
                resultsContainer.style.display = 'none';
                resultsContainer.innerHTML = '';
                return;
            }

            if (!socket || !isConnected) {
                resultsContainer.style.display = 'block';
                resultsContainer.innerHTML = '<div style="padding:10px 14px;color:var(--tg-text-secondary);">Нет соединения с сервером</div>';
                return;
            }

            socket.emit('search_users', { query: query.trim() }, (results) => {
                resultsContainer.innerHTML = '';
                if (results && results.length > 0) {
                    resultsContainer.style.display = 'block';
                    results.forEach(user => {
                        if (user.telegram_id === myTelegramId) return;
                        const item = document.createElement('div');
                        item.className = 'search-result-item';
                        const isBotFather = user.username === 'botfather';
                        const verifiedIcon = isBotFather ? 
                            `<svg class="tg-verify-icon" viewBox="0 0 24 24" style="width:16px;height:16px;"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
                        const isVerified = user.telegram_id === CREATOR_ID || user.is_verified;
                        const verifyBadge = isVerified ? `<span style="color:var(--tg-verified);font-size:12px;">✓</span>` : '';
                        item.innerHTML = `
                            <div class="chat-avatar" style="width:36px;height:36px;font-size:12px;background:${isBotFather ? 'linear-gradient(135deg, #2a9d8f, #264653)' : 'linear-gradient(135deg, #5085b1, #366187)'}">${(user.first_name || 'U').substring(0,2).toUpperCase()}</div>
                            <div>
                                <div style="display:flex;align-items:center;gap:4px;font-weight:600;">${user.first_name || 'User'} ${verifiedIcon} ${verifyBadge}</div>
                                <div style="font-size:12px;color:var(--tg-text-secondary);">@${user.username || ''}</div>
                            </div>
                        `;
                        item.onclick = () => {
                            if (user.telegram_id === myTelegramId) return;
                            if (!dynamicChats[user.telegram_id]) {
                                dynamicChats[user.telegram_id] = {
                                    first_name: user.first_name || `User ${user.telegram_id}`,
                                    username: user.username || ''
                                };
                                createChatRow(user.telegram_id, user.first_name || `User ${user.telegram_id}`, user.username || '');
                            }
                            openChat(user.telegram_id, user.first_name || `User ${user.telegram_id}`, user.username === 'botfather' || user.telegram_id === CREATOR_ID);
                            resultsContainer.style.display = 'none';
                            document.getElementById('global-search').value = '';
                        };
                        resultsContainer.appendChild(item);
                    });
                } else {
                    resultsContainer.style.display = 'block';
                    resultsContainer.innerHTML = '<div style="padding:10px 14px;color:var(--tg-text-secondary);">Пользователи не найдены</div>';
                }
            });
        }

        // ============ ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ============
        function switchTab(tabName, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const targetScreen = document.getElementById(`screen-${tabName}`);
            if (targetScreen) targetScreen.classList.add('active');
            if (element) element.classList.add('active');
            
            const titles = {
                chats: 'Чаты',
                contacts: 'Контакты',
                settings: 'Настройки',
                profile: 'Профиль'
            };
            document.getElementById('header-title').innerText = titles[tabName] || 'Чаты';
            document.getElementById('search-results').style.display = 'none';
            
            if (tabName === 'contacts') {
                loadContacts();
            }
        }

        // ============ ОТКРЫТИЕ ЧАТА ============
        function openChat(chatId, chatName, isVerified = false) {
            if (!chatId || !socket || !isConnected) {
                if (!socket || !isConnected) {
                    alert('Нет соединения с сервером');
                }
                return;
            }

            currentChatId = chatId;
            
            unreadCounts[chatId] = 0;
            updateUnreadBadge(chatId, 0);
            
            const titleEl = document.getElementById('chat-room-title');
            titleEl.innerText = chatName || 'Чат';
            if (isVerified) {
                titleEl.innerHTML = `${chatName || 'Чат'} <svg class="tg-verify-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
            }

            const avatarLetters = (chatName || 'Ч').substring(0, 2).toUpperCase();
            document.getElementById('room-header-avatar').innerText = avatarLetters;
            
            socket.emit('get_user_info', { user_id: chatId }, (userInfo) => {
                if (userInfo && userInfo.status === 'found') {
                    document.getElementById('chat-room-status').innerText = userInfo.user.is_online ? '🟢 в сети' : 'был(а) недавно';
                }
            });

            document.getElementById('bottom-navigation').style.display = 'none';
            document.getElementById('chat-room').style.display = 'flex';
            
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = '';

            // Приветственное сообщение для поддержки
            if (chatId === '0') {
                const welcomeMsg = {
                    sender_id: '0',
                    receiver_id: myTelegramId,
                    text: `👋 Добро пожаловать в DICEGRAM!\n\n🆔 Ваш ID: ${myTelegramId}\n👤 Имя: ${tgUser.first_name} ${tgUser.last_name || ''}\n🏷️ Username: @${myUsername || 'не установлен'}\n\n📱 DICEGRAM — точная копия Telegram. Все данные сохраняются в базе данных.\n\n💬 Напишите нам, если у вас есть вопросы или предложения.`,
                    timestamp: new Date().toISOString()
                };
                renderSingleMessage(welcomeMsg);
            }

            socket.emit('get_chat_history', { with_id: chatId }, (history) => {
                if (history && Array.isArray(history)) {
                    history.forEach(msg => renderSingleMessage(msg));
                    scrollToBottom();
                }
            });

            socket.emit('mark_as_read', { chat_id: chatId });
        }

        function closeChat() {
            document.getElementById('chat-room').style.display = 'none';
            document.getElementById('bottom-navigation').style.display = 'flex';
            currentChatId = null;
        }

        // ============ ОТОБРАЖЕНИЕ СООБЩЕНИЯ ============
        function renderSingleMessage(msg) {
            if (!msg || !msg.text) return;
            
            const container = document.getElementById('chat-messages');
            
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper');

            const msgEl = document.createElement('div');
            msgEl.classList.add('message');
            msgEl.dataset.messageId = msg.id || Date.now();

            const timeStr = getLocalTime(msg.timestamp);

            let ticksHtml = '';
            if (msg.sender_id === myTelegramId) {
                wrapper.classList.add('sent');
                msgEl.classList.add('sent');
                ticksHtml = `<span class="status-ticks"><svg viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path d="M18 7l-1.41-1.41L10 12.17 7.41 9.59 6 11l4 4zm-4.24 0L12.35 5.59 6 11.94l1.41 1.41z"/></svg></span>`;
            } else {
                wrapper.classList.add('received');
                msgEl.classList.add('received');
            }

            // Преобразуем ссылки в кликабельные
            let formattedText = formatMessageText(msg.text);
            // Ссылки вида d.me/username
            formattedText = formattedText.replace(/(d\.me\/[a-zA-Z0-9_]+)/g, function(match) {
                return `<a href="#" class="link" onclick="handleLinkClick('${match}')">${match}</a>`;
            });

            msgEl.innerHTML = `
                <span>${formattedText}</span>
                <div class="message-meta">
                    <span class="message-time">${timeStr}</span>
                    ${ticksHtml}
                </div>
            `;

            // Долгое нажатие для меню
            let longPressTimer = null;
            msgEl.addEventListener('mousedown', () => {
                longPressTimer = setTimeout(() => {
                    showMessageActions(msgEl.dataset.messageId);
                }, 500);
            });
            msgEl.addEventListener('mouseup', () => clearTimeout(longPressTimer));
            msgEl.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
            
            // Touch события для мобильных
            msgEl.addEventListener('touchstart', () => {
                longPressTimer = setTimeout(() => {
                    showMessageActions(msgEl.dataset.messageId);
                }, 500);
            });
            msgEl.addEventListener('touchend', () => clearTimeout(longPressTimer));
            msgEl.addEventListener('touchmove', () => clearTimeout(longPressTimer));

            wrapper.appendChild(msgEl);
            container.appendChild(wrapper);
        }

        function formatMessageText(text) {
            if (!text) return '';
            return text.replace(/(@[a-zA-Z0-9_]{3,32})/g, function(match) {
                return `<span class="mention-link" onclick="handleMentionClick('${match}')">${match}</span>`;
            });
        }

        function handleLinkClick(link) {
            const username = link.replace('d.me/', '');
            handleMentionClick('@' + username);
        }

        function handleMentionClick(username) {
            if (!socket || !isConnected) {
                alert('Нет соединения с сервером');
                return;
            }

            socket.emit('find_user', { username: username }, (response) => {
                if (response && response.status === 'found') {
                    const user = response.user;
                    if (user.telegram_id === myTelegramId) return;
                    if (!dynamicChats[user.telegram_id]) {
                        dynamicChats[user.telegram_id] = {
                            first_name: user.first_name || `User ${user.telegram_id}`,
                            username: user.username || ''
                        };
                        createChatRow(user.telegram_id, user.first_name || `User ${user.telegram_id}`, user.username || '');
                    }
                    openChat(user.telegram_id, user.first_name || `User ${user.telegram_id}`, user.telegram_id === CREATOR_ID);
                } else {
                    alert(`Пользователь ${username} не найден.`);
                }
            });
        }

        // ============ ОТПРАВКА СООБЩЕНИЯ ============
        function toggleSendButton(input) {
            const btn = document.getElementById('send-btn-icon');
            if (input && input.value && input.value.trim().length > 0) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-field');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            if (!socket || !isConnected) {
                alert('Нет соединения с сервером');
                return;
            }

            if (currentChatId === 'botfather' || (dynamicChats[currentChatId] && dynamicChats[currentChatId].username === 'botfather')) {
                handleBotCommand(text);
                input.value = '';
                document.getElementById('send-btn-icon').classList.remove('active');
                return;
            }

            socket.emit('send_message', { receiver_id: currentChatId, text: text }, (response) => {
                if (response && response.status === 'ok') {
                    renderSingleMessage(response.message);
                    const previewEl = document.getElementById(`preview-${currentChatId}`);
                    if (previewEl) previewEl.innerText = text;
                    scrollToBottom();
                }
            });

            input.value = '';
            document.getElementById('send-btn-icon').classList.remove('active');
            input.focus();
        }

        // ============ БОТ КОМАНДЫ ============
        function handleBotCommand(text) {
            const botResponse = emulateBotFather(text);
            
            const userMsg = {
                sender_id: myTelegramId,
                receiver_id: 'botfather',
                text: text,
                timestamp: new Date().toISOString()
            };
            renderSingleMessage(userMsg);
            
            setTimeout(() => {
                const botMsg = {
                    sender_id: 'botfather',
                    receiver_id: myTelegramId,
                    text: botResponse,
                    timestamp: new Date().toISOString()
                };
                renderSingleMessage(botMsg);
                scrollToBottom();
            }, 500);
        }

        function emulateBotFather(text) {
            const lower = text.toLowerCase().trim();
            
            if (lower === '/start') {
                return `I can help you create and manage Telegram bots. If you're new to the Bot API, please see the manual.\n\nYou can control me by sending these commands:\n\n/newbot - create a new bot\n/mybots - edit your bots`;
            }
            
            if (lower === '/newbot') {
                return `Alright, a new bot. How are we going to call it? Please choose a name for your bot.`;
            }
            
            if (!window.botCreationStep) {
                window.botCreationStep = 'name';
                window.botName = text;
                return `Good. Now let's choose a username for your bot. It must end in \`bot\`. Like this, for example: TetrisBot or tetris_bot.`;
            } else if (window.botCreationStep === 'name') {
                window.botName = text;
                window.botCreationStep = 'username';
                return `Good. Now let's choose a username for your bot. It must end in \`bot\`. Like this, for example: TetrisBot or tetris_bot.`;
            } else if (window.botCreationStep === 'username') {
                const username = text.trim();
                if (!username.endsWith('bot')) {
                    return `Sorry, the username must end with 'bot'. Please try again.`;
                }
                
                if (window.createdBots && window.createdBots.includes(username)) {
                    return `Sorry, this username is invalid.`;
                }
                
                if (!window.createdBots) window.createdBots = [];
                window.createdBots.push(username);
                window.botCreationStep = null;
                
                const token = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                return `Done! Congratulations on your new bot. You will find it at d.me/${username}. You can now add a description, about section and profile picture for your bot, see /help for a list of commands. By the way, when you've finished creating your cool bot, ping our Bot Support if you want a better username for it. Just make sure the bot is fully operational before you do this.\n\nUse this token to access the HTTP API:\n${token}\n\nKeep your token secure and store it safely, it can be used by anyone to control your bot.`;
            }
            
            return `I don't understand that command. Please use /start, /newbot, or /mybots.`;
        }

        // ============ ДЕЙСТВИЯ С СООБЩЕНИЯМИ ============
        function showMessageActions(messageId) {
            const actions = document.getElementById('message-actions');
            if (actions) {
                actions.classList.toggle('active');
                selectedMessageId = messageId;
            }
        }

        function replyToMessage() {
            const text = prompt('Введите ответ:');
            if (text && text.trim()) {
                socket.emit('send_message', { 
                    receiver_id: currentChatId, 
                    text: text.trim(),
                    reply_to_id: selectedMessageId
                }, (response) => {
                    if (response && response.status === 'ok') {
                        renderSingleMessage(response.message);
                        scrollToBottom();
                    }
                });
            }
            document.getElementById('message-actions').classList.remove('active');
        }

        function forwardMessage() {
            const chatId = prompt('Введите ID пользователя для пересылки:');
            if (chatId && chatId.trim()) {
                socket.emit('forward_message', { 
                    message_id: selectedMessageId,
                    to_id: chatId.trim()
                }, (response) => {
                    if (response && response.status === 'ok') {
                        alert('✅ Сообщение переслано');
                    }
                });
            }
            document.getElementById('message-actions').classList.remove('active');
        }

        function copyMessage() {
            const msgEl = document.querySelector(`[data-message-id="${selectedMessageId}"]`);
            if (msgEl) {
                const text = msgEl.querySelector('span').innerText;
                navigator.clipboard.writeText(text).then(() => {
                    alert('📋 Сообщение скопировано');
                });
            }
            document.getElementById('message-actions').classList.remove('active');
        }

        function editMessage() {
            const newText = prompt('Введите новый текст:');
            if (newText && newText.trim()) {
                socket.emit('edit_message', { 
                    message_id: selectedMessageId,
                    text: newText.trim()
                }, (response) => {
                    if (response && response.status === 'ok') {
                        const msgEl = document.querySelector(`[data-message-id="${selectedMessageId}"]`);
                        if (msgEl) {
                            msgEl.querySelector('span').innerHTML = formatMessageText(newText.trim());
                        }
                    }
                });
            }
            document.getElementById('message-actions').classList.remove('active');
        }

        function deleteMessage() {
            if (confirm('🗑 Удалить сообщение?')) {
                socket.emit('delete_message', { message_id: selectedMessageId }, (response) => {
                    if (response && response.status === 'ok') {
                        const msgEl = document.querySelector(`[data-message-id="${selectedMessageId}"]`);
                        if (msgEl) {
                            msgEl.closest('.message-wrapper').remove();
                        }
                    }
                });
            }
            document.getElementById('message-actions').classList.remove('active');
        }

        function pinMessage() {
            socket.emit('pin_message', { message_id: selectedMessageId }, (response) => {
                if (response && response.status === 'ok') {
                    alert('📌 Сообщение закреплено');
                }
            });
            document.getElementById('message-actions').classList.remove('active');
        }

        // ============ ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ ============
        function showUserProfile(userId) {
            if (!userId) return;
            
            if (!socket || !isConnected) {
                alert('Нет соединения с сервером');
                return;
            }

            socket.emit('get_user_info', { user_id: userId }, (userInfo) => {
                if (userInfo && userInfo.status === 'found') {
                    const user = userInfo.user;
                    const popup = document.getElementById('profile-popup');
                    document.getElementById('popup-user-name').innerText = user.first_name || 'Пользователь';
                    document.getElementById('popup-avatar').innerText = (user.first_name || 'U').substring(0, 2).toUpperCase();
                    document.getElementById('popup-name').innerText = user.first_name || 'Пользователь';
                    document.getElementById('popup-username').innerText = `@${user.username || ''}`;
                    document.getElementById('popup-bio').innerText = user.bio || 'Нет описания';
                    document.getElementById('popup-status').innerText = user.is_online ? '🟢 В сети' : '⚪ Был(а) недавно';
                    
                    const isVerified = userId === CREATOR_ID || user.is_verified;
                    document.getElementById('popup-verified').innerHTML = isVerified ? '✅ Верифицирован' : '';
                    
                    const createdDate = user.created_at ? new Date(user.created_at).toLocaleDateString() : 'Неизвестно';
                    document.getElementById('popup-created').innerText = `📅 Зарегистрирован: ${createdDate}`;
                    
                    const actionsDiv = document.getElementById('popup-actions');
                    if (myTelegramId === CREATOR_ID && userId !== CREATOR_ID) {
                        const verifyBtnText = user.is_verified ? '❌ Снять верификацию' : '✅ Выдать верификацию';
                        actionsDiv.innerHTML = `
                            <button onclick="toggleVerification('${userId}', ${!user.is_verified})" style="background:var(--tg-verified);color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">${verifyBtnText}</button>
                            <button onclick="addContact()" style="background:var(--tg-accent-color);color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">➕ Добавить в контакты</button>
                            <button onclick="blockUser()" style="background:#ff3b30;color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">🚫 Заблокировать</button>
                        `;
                    } else {
                        actionsDiv.innerHTML = `
                            <button onclick="addContact()" style="background:var(--tg-accent-color);color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">➕ Добавить в контакты</button>
                            <button onclick="blockUser()" style="background:#ff3b30;color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">🚫 Заблокировать</button>
                        `;
                    }
                    
                    popup.classList.add('active');
                }
            });
        }

        function toggleVerification(userId, verify) {
            if (myTelegramId !== CREATOR_ID) {
                alert('❌ Только создатель может управлять верификацией!');
                return;
            }
            socket.emit('verify_user', { user_id: userId, verify: verify }, (response) => {
                if (response && response.status === 'ok') {
                    alert(verify ? '✅ Пользователь верифицирован!' : '❌ Верификация снята');
                    closeProfilePopup();
                    loadChatsAndMessages();
                }
            });
        }

        function closeProfilePopup() {
            document.getElementById('profile-popup').classList.remove('active');
        }

        function addContact() {
            if (!currentUserData) return;
            socket.emit('add_contact', { contact_id: currentUserData.telegram_id }, (response) => {
                if (response && response.status === 'ok') {
                    alert('➕ Пользователь добавлен в контакты');
                    loadContacts();
                }
            });
        }

        function blockUser() {
            if (confirm('🚫 Заблокировать пользователя?')) {
                socket.emit('block_user', { block_id: currentUserData.telegram_id }, (response) => {
                    if (response && response.status === 'ok') {
                        alert('Пользователь заблокирован');
                        closeProfilePopup();
                    }
                });
            }
        }

        // ============ РЕДАКТИРОВАНИЕ ПРОФИЛЯ ============
        function editName() {
            const newName = prompt('Введите новое имя:', tgUser.first_name || '');
            if (newName && newName.trim()) {
                socket.emit('update_profile', { name: newName.trim() }, (response) => {
                    if (response && response.status === 'ok') {
                        document.getElementById('user-name').innerText = newName.trim();
                        document.getElementById('profile-display-name').innerText = newName.trim();
                        alert('✅ Имя обновлено!');
                    }
                });
            }
        }

        function editUsername() {
            const isCreator = myTelegramId === CREATOR_ID;
            const newUsername = prompt('Введите новый username:', myUsername || '');
            
            if (newUsername && newUsername.trim()) {
                const username = newUsername.trim().replace('@', '');
                
                // Проверка на занятость
                socket.emit('check_username', { username: username }, (response) => {
                    if (response && response.status === 'taken' && !isCreator) {
                        alert('❌ Этот username уже занят');
                        return;
                    }
                    
                    socket.emit('update_profile', { username: username }, (response) => {
                        if (response && response.status === 'ok') {
                            myUsername = username;
                            initProfile();
                            alert('✅ Username обновлен!');
                            // Обновляем данные пользователя
                            socket.emit('get_user_info', { user_id: myTelegramId }, (userInfo) => {
                                if (userInfo && userInfo.status === 'found') {
                                    currentUserData = userInfo.user;
                                }
                            });
                        } else if (response && response.message) {
                            alert('❌ ' + response.message);
                        }
                    });
                });
            }
        }

        function editBio() {
            const newBio = prompt('Введите описание (Bio):', currentUserData?.bio || '');
            if (newBio !== null) {
                socket.emit('update_profile', { bio: newBio.trim() }, (response) => {
                    if (response && response.status === 'ok') {
                        document.getElementById('profile-bio-display').innerText = newBio.trim() || 'Добавить описание';
                        alert('✅ Bio обновлен!');
                        if (currentUserData) currentUserData.bio = newBio.trim();
                    }
                });
            }
        }

        function changeAvatar() {
            const url = prompt('Введите URL фото профиля:');
            if (url && url.trim()) {
                document.getElementById('user-avatar').src = url.trim();
                socket.emit('update_profile', { photo_url: url.trim() });
            }
        }

        function changeLanguage() {
            alert('🌐 Выбор языка будет доступен в следующей версии');
        }

        // ============ ТЕМА ============
        function toggleTheme() {
            const root = document.documentElement;
            if (theme === 'dark') {
                root.setAttribute('data-theme', 'light');
                theme = 'light';
                document.querySelector('.theme-switch').innerText = '☀️';
            } else {
                root.removeAttribute('data-theme');
                theme = 'dark';
                document.querySelector('.theme-switch').innerText = '🌙';
            }
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // ============ СОБЫТИЯ ============
        document.getElementById('message-field').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        document.addEventListener('click', function(e) {
            const searchInput = document.getElementById('global-search');
            const results = document.getElementById('search-results');
            if (searchInput && results) {
                if (!searchInput.contains(e.target) && !results.contains(e.target)) {
                    results.style.display = 'none';
                }
            }
            const actions = document.getElementById('message-actions');
            if (actions && !actions.contains(e.target)) {
                actions.classList.remove('active');
            }
        });

        document.getElementById('profile-popup').addEventListener('click', function(e) {
            if (e.target === this) {
                closeProfilePopup();
            }
        });

        // ============ ЗАПУСК ============
        window.botCreationStep = null;
        window.botName = '';
        window.createdBots = [];

        console.log('🚀 Запуск DICEGRAM...');
        connectSocket();

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && !isConnected) {
                console.log('🔄 Восстановление соединения...');
                connectSocket();
            }
        });
    </script>
</body>
