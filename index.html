<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daupro AI PRO 💻 Code Assistant</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Outfit', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .login-title {
            font-size: 48px;
            background: linear-gradient(45deg, #10b981, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .google-btn {
            background: white;
            color: #1a1a2e;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            width: 280px;
            font-size: 16px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .google-btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .guest-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid #333;
        }

        /* Main App */
        .app-container {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(15, 15, 25, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header h2 {
            font-size: 20px;
            background: linear-gradient(45deg, #10b981, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .mode-switch {
            display: flex;
            gap: 10px;
            margin: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #10b981;
            border-color: #10b981;
        }

        .sidebar-btn {
            margin: 0 20px 10px 20px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .global-btn {
            background: linear-gradient(45deg, #6366f1, #10b981);
            color: white;
        }

        .new-chat-btn {
            background: #10b981;
            color: white;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .logout-btn {
            margin: 20px;
            padding: 14px;
            background: none;
            border: none;
            color: #f87171;
            font-weight: 600;
            cursor: pointer;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        /* Main Chat Area */
        .main-area {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .top-bar {
            height: 70px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            margin-left: 15px;
        }

        .mode-badge {
            background: linear-gradient(45deg, #10b981, #6366f1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 110px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: #6366f1;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.ai {
            background: rgba(31, 41, 55, 0.8);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .message.global {
            background: rgba(99, 102, 241, 0.15);
        }

        .input-area {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 700px;
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            height: 50px;
            font-size: 16px;
            padding: 0 10px;
            outline: none;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
            font-size: 22px;
            transition: transform 0.2s;
        }

        .icon-btn:hover {
            transform: scale(1.05);
        }

        .preview-wrap {
            display: none;
            position: absolute;
            bottom: 85px;
            left: 20px;
            background: #1f2937;
            padding: 10px;
            border-radius: 15px;
        }

        .preview-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 18px;
            background: rgba(31, 41, 55, 0.8);
            border-radius: 20px;
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        pre {
            background: #0f0f12;
            padding: 12px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 8px 0;
        }

        code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #1f2937;
        }

        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
    <h1 class="login-title">💻 Daupro AI</h1>
    <p class="login-subtitle">Ваш профессиональный AI-кодер</p>
    <button class="google-btn" id="google-login-btn">🚀 Войти через Google</button>
    <button class="google-btn guest-btn" id="guest-login-btn">👤 Режим гостя</button>
</div>

<!-- Main App -->
<div class="app-container" id="app-container">
    <div class="overlay" id="overlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>МЕНЮ</h2>
            <button class="close-sidebar" id="close-sidebar-btn">✕</button>
        </div>
        
        <div class="mode-switch">
            <button class="mode-btn" id="code-mode-btn" data-mode="code">💻 CODE AI</button>
            <button class="mode-btn" id="chat-mode-btn" data-mode="chat">💬 CHAT AI</button>
        </div>
        
        <button class="sidebar-btn global-btn" id="global-chat-btn">🌍 World Chat</button>
        <button class="sidebar-btn new-chat-btn" id="new-chat-btn">+ Новый чат</button>
        
        <div class="chat-list" id="chat-list"></div>
        
        <button class="logout-btn" id="logout-btn">🚪 Выйти</button>
    </div>
    
    <div class="main-area">
        <div class="top-bar">
            <div style="display: flex; align-items: center;">
                <button class="menu-btn" id="menu-btn">☰</button>
                <span class="header-title" id="header-title">Daupro AI</span>
            </div>
            <div class="mode-badge" id="mode-badge">💻 CODE MODE</div>
        </div>
        
        <div class="chat-container" id="chat-container"></div>
        
        <div class="preview-wrap" id="preview-wrap">
            <div class="preview-box">
                <img class="preview-img" id="preview-img" src="">
                <button class="icon-btn" id="clear-image-btn" style="color:#f87171;">✕</button>
            </div>
        </div>
        
        <div class="input-area">
            <label class="icon-btn" style="cursor: pointer;">📷
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </label>
            <button class="icon-btn" id="mic-btn">🎤</button>
            <input type="text" id="message-input" placeholder="Напишите код или вопрос..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="icon-btn" id="send-btn" style="color:#10b981;">➤</button>
        </div>
    </div>
</div>

<script>
    // ============ FIREBASE CONFIG ============
    const firebaseConfig = {
        apiKey: "AIzaSyClnvxC1lgvrxn-m7X1huqNmvtH7HaYsxU",
        authDomain: "flikyfloky-61eed.firebaseapp.com",
        projectId: "flikyfloky-61eed",
        storageBucket: "flikyfloky-61eed.firebasestorage.app",
        messagingSenderId: "167396726913",
        appId: "1:167396726913:web:871fb5bc1cf4eca509d580"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // ============ API KEY ============
    const API_KEY = "AQ.Ab8RN6KlBl1pXmJY81bNkiTCTQgDKWkv9q0ZB5ttZ3KTKeYqtw";
    
    // ============ GLOBAL VARIABLES ============
    let currentUser = null;
    let chats = [];
    let activeChatId = null;
    let currentMode = "code";
    let isGlobal = false;
    let currentImage = null;
    let typingTimeout = null;
    
    // ============ HELPER FUNCTIONS ============
    function getSystemPrompt() {
        if (currentMode === "code") {
            return `Ты Daupro AI - профессиональный AI-ассистент программиста. Твоя задача - помогать с кодом, алгоритмами, отладкой. Ты эксперт в Python, JavaScript, Java, C++, HTML/CSS, React, Node.js, SQL. Всегда давай готовые рабочие решения с примерами кода. Объясняй код построчно. Форматируй код с помощью markdown. Если спрашивают не про код - можешь ответить, но в приоритете программирование. Твой создатель - Даулет.`;
        } else {
            return `Ты Daupro AI - дружелюбный помощник. Можешь общаться на любые темы, отвечать на вопросы, давать советы, шутить. Будь вежливым и полезным. Твой создатель - Даулет.`;
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ============ LOCAL STORAGE ============
    function loadChats() {
        const key = `daupro_chats_${currentUser?.uid || 'guest'}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            chats = JSON.parse(saved);
        } else {
            chats = [];
        }
        renderChatList();
    }
    
    function saveChats() {
        if (currentUser) {
            const key = `daupro_chats_${currentUser.uid}`;
            localStorage.setItem(key, JSON.stringify(chats));
        }
    }
    
    // ============ RENDER FUNCTIONS ============
    function renderChatList() {
        const container = document.getElementById('chat-list');
        if (!container) return;
        container.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            const icon = chat.mode === 'code' ? '💻' : '💬';
            div.innerHTML = `${icon} ${chat.title || 'Чат'}`;
            div.onclick = () => {
                isGlobal = false;
                activeChatId = chat.id;
                if (chat.mode) currentMode = chat.mode;
                updateModeUI();
                renderMessages();
                document.getElementById('header-title').innerHTML = `${icon} ${chat.title}`;
                closeSidebar();
            };
            container.appendChild(div);
        });
    }
    
    function renderMessages() {
        const container = document.getElementById('chat-container');
        if (!container) return;
        
        if (isGlobal) return;
        
        container.innerHTML = '';
        const chat = chats.find(c => c.id === activeChatId);
        if (!chat || !chat.messages) return;
        
        chat.messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;
            let html = '';
            if (msg.image) {
                html += `<img src="${msg.image}" style="max-width: 200px; max-height: 200px; border-radius: 10px; margin-bottom: 8px;"><br>`;
            }
            if (msg.content) {
                html += marked.parse(msg.content);
            }
            div.innerHTML = html;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function updateModeUI() {
        const codeBtn = document.getElementById('code-mode-btn');
        const chatBtn = document.getElementById('chat-mode-btn');
        const badge = document.getElementById('mode-badge');
        
        if (currentMode === 'code') {
            codeBtn.classList.add('active');
            chatBtn.classList.remove('active');
            badge.innerHTML = '💻 CODE MODE';
            badge.style.background = "linear-gradient(45deg, #10b981, #6366f1)";
        } else {
            chatBtn.classList.add('active');
            codeBtn.classList.remove('active');
            badge.innerHTML = '💬 CHAT MODE';
            badge.style.background = "linear-gradient(45deg, #6366f1, #10b981)";
        }
    }
    
    // ============ CHAT FUNCTIONS ============
    function createNewChat() {
        isGlobal = false;
        activeChatId = Date.now();
        const modeIcon = currentMode === 'code' ? '💻' : '💬';
        const modeName = currentMode === 'code' ? 'Code' : 'Chat';
        const chatTitle = `${modeIcon} ${modeName} чат ${chats.length + 1}`;
        chats.unshift({
            id: activeChatId,
            title: chatTitle,
            messages: [],
            mode: currentMode,
            createdAt: Date.now()
        });
        saveChats();
        renderChatList();
        renderMessages();
        document.getElementById('header-title').innerHTML = chatTitle;
        closeSidebar();
    }
    
    function showTypingIndicator() {
        const container = document.getElementById('chat-container');
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.id = 'typing-indicator';
        indicator.innerHTML = '<span></span><span></span><span></span>';
        container.appendChild(indicator);
        container.scrollTop = container.scrollHeight;
    }
    
    function hideTypingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) indicator.remove();
    }
    
    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (!text && !currentImage) return;
        
        // World Chat mode
        if (isGlobal) {
            if (!text) return;
            try {
                await db.collection("global_chat").add({
                    text: text,
                    user: currentUser?.displayName || 'Аноним',
                    uid: currentUser?.uid || 'guest',
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = '';
            } catch (e) {
                console.error("Global chat error:", e);
            }
            return;
        }
        
        // Regular chat
        if (!activeChatId) createNewChat();
        
        const chat = chats.find(c => c.id === activeChatId);
        if (!chat) return;
        
        // Add user message
        const userMsg = {
            role: 'user',
            content: text || "Посмотри на изображение",
            image: currentImage,
            timestamp: Date.now()
        };
        chat.messages.push(userMsg);
        
        const imageToSend = currentImage;
        input.value = '';
        clearImage();
        saveChats();
        renderMessages();
        showTypingIndicator();
        
        // Add empty AI message
        const aiMsg = { role: 'ai', content: '' };
        chat.messages.push(aiMsg);
        
        try {
            const model = imageToSend ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
            const requestMessages = [{ role: "system", content: getSystemPrompt() }];
            
            if (imageToSend) {
                requestMessages.push({
                    role: "user",
                    content: [
                        { type: "text", text: text || "Опиши что на этом изображении" },
                        { type: "image_url", image_url: { url: imageToSend } }
                    ]
                });
            } else {
                const recent = chat.messages.slice(-8);
                for (const msg of recent) {
                    if (msg.content && msg.role !== 'assistant') {
                        requestMessages.push({ role: msg.role, content: msg.content });
                    }
                }
            }
            
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: requestMessages,
                    temperature: currentMode === 'code' ? 0.3 : 0.7,
                    max_tokens: 2048
                })
            });
            
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }
            
            const data = await response.json();
            const result = data.choices[0].message.content;
            
            // Animate typing
            aiMsg.content = '';
            const container = document.getElementById('chat-container');
            const messagesDivs = container.querySelectorAll('.message');
            let lastMsgDiv = messagesDivs[messagesDivs.length - 1];
            
            if (lastMsgDiv && lastMsgDiv.classList.contains('ai')) {
                for (let i = 0; i < result.length; i++) {
                    aiMsg.content += result[i];
                    lastMsgDiv.innerHTML = marked.parse(aiMsg.content);
                    container.scrollTop = container.scrollHeight;
                    await new Promise(r => setTimeout(r, 5));
                }
            } else {
                aiMsg.content = result;
                renderMessages();
            }
            
            saveChats();
        } catch (error) {
            console.error("API Error:", error);
            aiMsg.content = `❌ Ошибка: ${error.message}. Проверьте API ключ или интернет.`;
            saveChats();
            renderMessages();
        } finally {
            hideTypingIndicator();
        }
    }
    
    // ============ GLOBAL CHAT ============
    function switchToGlobal() {
        isGlobal = true;
        activeChatId = 'global';
        document.getElementById('header-title').innerHTML = "🌍 World Chat";
        const container = document.getElementById('chat-container');
        container.innerHTML = '';
        
        db.collection("global_chat").orderBy("time", "asc").limitToLast(50).onSnapshot(snapshot => {
            if (!isGlobal) return;
            container.innerHTML = '';
            const msgs = [];
            snapshot.forEach(doc => msgs.push(doc.data()));
            msgs.reverse();
            msgs.forEach(msg => {
                const div = document.createElement('div');
                const isOwn = msg.uid === currentUser?.uid;
                div.className = `message ${isOwn ? 'user' : 'ai'} global`;
                div.innerHTML = `<strong style="font-size: 11px; opacity: 0.7;">${escapeHtml(msg.user || 'Аноним')}</strong><br>${escapeHtml(msg.text)}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
        closeSidebar();
    }
    
    // ============ IMAGE HANDLING ============
    function handleImage(file) {
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            alert("Пожалуйста, выберите изображение");
            return;
        }
        if (file.size > 5 * 1024 * 1024) {
            alert("Изображение не должно превышать 5MB");
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImage = e.target.result;
            document.getElementById('preview-img').src = currentImage;
            document.getElementById('preview-wrap').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
    
    function clearImage() {
        currentImage = null;
        document.getElementById('preview-wrap').style.display = 'none';
        document.getElementById('file-input').value = '';
    }
    
    // ============ VOICE RECOGNITION ============
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Ваш браузер не поддерживает голосовой ввод");
            return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        const micBtn = document.getElementById('mic-btn');
        recognition.onstart = () => {
            micBtn.style.color = '#ef4444';
            micBtn.innerHTML = '🎙️';
        };
        recognition.onend = () => {
            micBtn.style.color = 'white';
            micBtn.innerHTML = '🎤';
        };
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('message-input').value = text;
            setTimeout(() => sendMessage(), 100);
        };
        recognition.start();
    }
    
    // ============ SIDEBAR FUNCTIONS ============
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('show');
    }
    
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }
    
    // ============ AUTH FUNCTIONS ============
    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider)
            .then(result => {
                currentUser = result.user;
                showApp();
            })
            .catch(error => {
                if (error.code === 'auth/popup-blocked') {
                    alert("Пожалуйста, разрешите всплывающие окна для этого сайта");
                } else {
                    alert("Ошибка входа: " + error.message);
                }
            });
    }
    
    function loginAsGuest() {
        currentUser = { uid: 'guest_' + Date.now(), displayName: 'Гость', isGuest: true };
        showApp();
    }
    
    function showApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        loadChats();
        if (chats.length === 0) {
            createNewChat();
        } else {
            activeChatId = chats[0].id;
            if (chats[0].mode) currentMode = chats[0].mode;
            updateModeUI();
            renderMessages();
            document.getElementById('header-title').innerHTML = chats[0].title;
        }
    }
    
    function logout() {
        if (currentUser?.isGuest) {
            currentUser = null;
            localStorage.clear();
            location.reload();
        } else {
            auth.signOut().then(() => {
                location.reload();
            });
        }
    }
    
    // ============ EVENT LISTENERS ============
    document.addEventListener('DOMContentLoaded', () => {
        // Auth buttons
        document.getElementById('google-login-btn').onclick = loginWithGoogle;
        document.getElementById('guest-login-btn').onclick = loginAsGuest;
        
        // Sidebar buttons
        document.getElementById('menu-btn').onclick = openSidebar;
        document.getElementById('close-sidebar-btn').onclick = closeSidebar;
        document.getElementById('overlay').onclick = closeSidebar;
        
        // Mode buttons
        document.getElementById('code-mode-btn').onclick = () => {
            currentMode = 'code';
            updateModeUI();
            closeSidebar();
        };
        document.getElementById('chat-mode-btn').onclick = () => {
            currentMode = 'chat';
            updateModeUI();
            closeSidebar();
        };
        
        // Action buttons
        document.getElementById('global-chat-btn').onclick = switchToGlobal;
        document.getElementById('new-chat-btn').onclick = () => {
            createNewChat();
            closeSidebar();
        };
        document.getElementById('logout-btn').onclick = logout;
        
        // Input buttons
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('mic-btn').onclick = startVoice;
        document.getElementById('clear-image-btn').onclick = clearImage;
        
        // File input
        const fileInput = document.getElementById('file-input');
        fileInput.onchange = (e) => handleImage(e.target.files[0]);
        
        // Label for file input
        const label = document.querySelector('label[for="file-input"]');
        if (label) {
            label.onclick = () => fileInput.click();
        }
        
        // Enter key
        document.getElementById('message-input').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        // Check auth state
        auth.onAuthStateChanged(user => {
            if (user && !currentUser) {
                currentUser = user;
                showApp();
            }
        });
    });
</script>
</body>
