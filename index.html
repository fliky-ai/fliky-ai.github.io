<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIKY AI PRO ✨</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.8);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text: #f3f4f6;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; padding: 0;
            height: 100dvh; width: 100vw; display: flex; overflow: hidden; position: fixed;
        }

        /* --- Меню (Sidebar) --- */
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: var(--panel); backdrop-filter: blur(25px); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }

        /* --- Login Screen --- */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .google-btn { background: white; color: black; padding: 16px 32px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-top: 10px; width: 280px; justify-content: center; transition: 0.3s; }
        .pro-badge { background: linear-gradient(45deg, #f59e0b, #ef4444); color: white; padding: 4px 10px; border-radius: 10px; font-size: 12px; margin-left: 10px; font-weight: bold; cursor: pointer; }

        /* --- Chat Interface --- */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; display: none; }
        .header { display: flex; align-items: center; padding: 0 20px; background: rgba(3, 7, 18, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); height: 70px; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 120px; }
        .msg { padding: 16px; border-radius: 20px; max-width: 85%; line-height: 1.6; position: relative; font-size: 15px; }
        .user { background: var(--accent); align-self: flex-end; color: white; border-bottom-right-radius: 4px; }
        .ai { background: rgba(31, 41, 55, 0.6); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        /* --- PRO Modal --- */
        #pro-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: #1f2937; border: 1px solid var(--accent); border-radius: 25px; padding: 30px; z-index: 5000; text-align: center; box-shadow: 0 0 50px var(--accent-glow); }
        .pro-btn-buy { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }

        .input-area { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 650px; padding: 8px 15px; background: rgba(31, 41, 55, 0.9); backdrop-filter: blur(20px); border-radius: 30px; display: flex; gap: 10px; align-items: center; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; height: 45px; }
        .action-btn { background: var(--accent); width: 45px; height: 45px; border-radius: 50%; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        pre { background: #000; padding: 12px; border-radius: 12px; overflow-x: auto; font-size: 13px; }
        .copy-btn { position: absolute; top: 5px; right: 10px; font-size: 10px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 4px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="font-size: 60px;">⚡</div>
        <h1 style="font-size: 32px; font-weight: 800; color: white; margin-bottom: 30px;">FLIKY AI PRO</h1>
        <button class="google-btn" onclick="loginWithGoogle()">Войти через Google</button>
        <button class="google-btn" onclick="loginAsGuest()" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border);">Режим гостя (Без сохранения)</button>
    </div>

    <div id="pro-modal">
        <h2 style="margin:0;">Купить FLIKY PRO 💎</h2>
        <p style="opacity: 0.7; font-size: 14px; margin-top: 15px;">
            • Безлимитный анализ фото<br>
            • Самая быстрая модель Llama 3.3<br>
            • Ранний доступ к новым функциям
        </p>
        <div style="font-size: 24px; font-weight: bold; margin: 20px 0;">200₸ <span style="font-size:14px; opacity:0.5;">/ месяц</span></div>
        <button class="pro-btn-buy" onclick="alert('Переход на оплату...')">Купить за 200₸</button>
        <button onclick="toggleProModal()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Закрыть</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div style="padding: 25px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; font-size:20px;">FLIKY AI</h2>
                <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
            </div>
            <button style="width:100%; padding:15px; border-radius:15px; background:var(--accent); border:none; color:white; font-weight:700; margin-top:20px;" onclick="createNewChat()">+ Новый чат</button>
            <button style="width:100%; padding:15px; border-radius:15px; background:linear-gradient(45deg, #f59e0b, #ef4444); border:none; color:white; font-weight:700; margin-top:10px;" onclick="toggleProModal()">💎 Активировать PRO</button>
        </div>
        <div class="chat-list" id="chatList" style="flex:1; overflow-y:auto; padding: 0 15px;"></div>
        <div style="padding: 25px; border-top: 1px solid var(--border);"><button onclick="logout()" style="background:none; border:none; color:#f87171;">Выйти</button></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="header">
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
            <span style="margin-left:15px; font-weight:700;">FLIKY AI</span>
            <span class="pro-badge" onclick="toggleProModal()">PRO</span>
        </div>
        <div id="chat" class="chat-container"></div>
        <div id="preview-wrap" style="display:none; padding:10px; background:var(--panel); position:absolute; bottom:90px; left:20px; border-radius:15px; border:1px solid var(--accent);">
            <img id="preview-img" src="" style="height:60px; border-radius:8px;">
            <button onclick="clearImage()" style="color:red; background:none; border:none; margin-left:10px;">✕</button>
        </div>
        <div class="input-area">
            <label style="cursor:pointer; font-size: 20px;">📷<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)"></label>
            <button id="micBtn" class="action-btn" onclick="toggleMic()" style="background:none; font-size:18px;">🎤</button>
            <input type="text" id="userInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button class="action-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyClnvxC1lgvrxn-m7X1huqNmvtH7HaYsxU", authDomain: "flikyfloky-61eed.firebaseapp.com", projectId: "flikyfloky-61eed", storageBucket: "flikyfloky-61eed.firebasestorage.app", messagingSenderId: "167396726913", appId: "1:167396726913:web:871fb5bc1cf4eca509d580" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const _k = "gsk_Ui06zHrORxYH5" + "spkmge9WGdyb3FYiPY" + "yl9VgOfBu1jgvLLvsm6I8";
        let currentUser = null, chats = [], activeChatId = 'welcome', base64Image = null;

        const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
        if(recognition) { recognition.lang = 'ru-RU'; recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; }; }

        function toggleMic() { if(recognition) recognition.start(); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function toggleProModal() { const m = document.getElementById('pro-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        
        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function loginAsGuest() { currentUser = { uid: 'guest_'+Date.now(), isGuest: true }; startApp(); }
        function logout() { auth.signOut().then(() => location.reload()); }
        auth.onAuthStateChanged(user => { if(user) { currentUser = user; startApp(); } });

        function startApp() { document.getElementById('login-screen').style.display='none'; document.getElementById('mainContent').style.display='flex'; loadChats(); }
        function loadChats() { chats = (currentUser && !currentUser.isGuest) ? JSON.parse(localStorage.getItem(`chats_${currentUser.uid}`)) || [] : []; renderChatList(); renderMessages(); }
        function saveChats() { if(currentUser && !currentUser.isGuest) localStorage.setItem(`chats_${currentUser.uid}`, JSON.stringify(chats)); }
        function createNewChat() { activeChatId = Date.now(); chats.unshift({ id: activeChatId, title: "Новый чат", messages: [] }); renderChatList(); renderMessages(); toggleMenu(); }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text && !base64Image) return;

            if(activeChatId === 'welcome') createNewChat();
            const chat = chats.find(c => c.id === activeChatId);
            const imgSave = base64Image;
            chat.messages.push({ role: 'user', content: text, image: imgSave });
            input.value = ''; clearImage(); renderMessages();

            const aiMsg = { role: 'assistant', content: '' };
            chat.messages.push(aiMsg);
            const msgDiv = renderMessages(true);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${_k}` },
                    body: JSON.stringify({
                        model: imgSave ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "Ты FLIKY AI. Отвечай на языке пользователя (если пишет на казахском - отвечай на казахском). Твои ответы должны быть профессиональными."},
                            ...chat.messages.slice(-5).map(m => {
                                if(m.image) return { role: m.role, content: [{type:"text", text:m.content || "Опиши это фото"}, {type:"image_url", image_url:{url:m.image}}] };
                                return { role: m.role, content: m.content };
                            })
                        ]
                    })
                });
                const data = await response.json();
                const fullText = data.choices[0].message.content;
                let i = 0;
                const timer = setInterval(() => {
                    if (i < fullText.length) {
                        aiMsg.content += fullText.charAt(i++);
                        msgDiv.innerHTML = `<button class="copy-btn" onclick="copyText(this)">Copy</button>` + marked.parse(aiMsg.content);
                        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                    } else { clearInterval(timer); saveChats(); }
                }, 10);
            } catch (e) { aiMsg.content = "Ошибка API."; renderMessages(); }
        }

        function renderMessages(last = false) {
            const cont = document.getElementById('chat'); cont.innerHTML = '';
            const chat = chats.find(c => c.id === activeChatId);
            let d;
            if(chat) chat.messages.forEach(m => {
                d = document.createElement('div'); d.className = `msg ${m.role==='user'?'user':'ai'}`;
                let h = m.image ? `<img src="${m.image}" style="max-width:100%; border-radius:10px; margin-bottom:10px;"><br>` : '';
                h += (m.role==='assistant' ? '<button class="copy-btn" onclick="copyText(this)">Copy</button>' : '') + marked.parse(m.content || '');
                d.innerHTML = h; cont.appendChild(d);
            });
            cont.scrollTop = cont.scrollHeight;
            return d;
        }

        function handleImage(i) {
            const r = new FileReader();
            r.onload = (e) => { base64Image = e.target.result; document.getElementById('preview-img').src = base64Image; document.getElementById('preview-wrap').style.display = 'block'; };
            r.readAsDataURL(i.files[0]);
        }
        function clearImage() { base64Image = null; document.getElementById('preview-wrap').style.display = 'none'; }
        function copyText(btn) { navigator.clipboard.writeText(btn.parentElement.innerText.replace('Copy', '')); btn.innerText = 'OK'; setTimeout(()=>btn.innerText='Copy', 1000); }
        function renderChatList() {
            const list = document.getElementById('chatList'); list.innerHTML = '';
            chats.forEach(chat => {
                const item = document.createElement('div'); item.className = `chat-item ${chat.id === activeChatId ? 'active' : ''}`;
                item.innerText = chat.title; item.onclick = () => { activeChatId = chat.id; renderMessages(); toggleMenu(); };
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
