<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <style>
        :root {
            --tg-bg-color: #0e1621;
            --tg-surface-color: #17212b;
            --tg-text-color: #f5f5f5;
            --tg-text-secondary: #7f91a4;
            --tg-accent-color: #5288c1;
            --tg-border-color: #101924;
            --tg-msg-out: #244b6f;
            --tg-msg-in: #182533;
            --tg-verified: #2f8cc9;
            --tg-status-online: #5288c1;
            --tg-unread-badge: #5288c1;
            --tg-shadow: rgba(0,0,0,0.3);
        }

        [data-theme="light"] {
            --tg-bg-color: #ffffff;
            --tg-surface-color: #f0f0f0;
            --tg-text-color: #000000;
            --tg-text-secondary: #707579;
            --tg-border-color: #d5d5d5;
            --tg-msg-out: #e1ffc7;
            --tg-msg-in: #f0f0f0;
            --tg-shadow: rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            color: var(--tg-text-color);
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3.5px solid rgba(127, 145, 164, 0.2);
            border-top: 3.5px solid var(--tg-accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #app-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #main-header {
            height: 56px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            flex-shrink: 0;
            gap: 10px;
        }

        .header-content-left {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .header-main-title {
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .connection-status {
            font-size: 12px;
            color: var(--tg-text-secondary);
            margin-top: 2px;
        }

        .search-input {
            background-color: var(--tg-bg-color);
            border: 1px solid var(--tg-border-color);
            border-radius: 19px;
            padding: 6px 14px;
            color: var(--tg-text-color);
            font-size: 14px;
            outline: none;
            width: 100%;
            max-width: 200px;
        }

        .screen {
            flex: 1;
            display: none;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--tg-border-color);
            cursor: pointer;
            background-color: var(--tg-surface-color);
            position: relative;
            transition: background-color 0.2s;
        }

        .chat-item:active {
            background-color: #202b36;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5085b1, #366187);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            flex-shrink: 0;
            position: relative;
        }

        .online-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background-color: #4cd964;
            border-radius: 50%;
            border: 2px solid var(--tg-surface-color);
        }

        .chat-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tg-verify-icon {
            width: 15px;
            height: 15px;
            fill: var(--tg-verified);
            flex-shrink: 0;
        }

        .chat-preview {
            font-size: 13.5px;
            color: var(--tg-text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-unread-badge {
            background-color: var(--tg-unread-badge);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
            margin-left: 8px;
        }

        #chat-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--tg-bg-color);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .chat-header {
            height: 56px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            padding: 0 12px;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--tg-accent-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding-right: 8px;
            height: 100%;
        }

        .header-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
            cursor: pointer;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5288c1, #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: #ffffff;
            flex-shrink: 0;
            position: relative;
        }

        .header-text-container {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header-chat-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--tg-text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-chat-status {
            font-size: 12px;
            color: var(--tg-status-online);
            margin-top: 1px;
        }

        #chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background-image: radial-gradient(rgba(23, 33, 43, 0.25) 15%, transparent 16%);
            background-size: 16px 16px;
        }

        .message-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 2px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }

        .message {
            max-width: 75%;
            min-width: 60px;
            padding: 6px 10px 7px 10px;
            border-radius: 12px;
            font-size: 14.5px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 1px var(--tg-shadow);
            display: flex;
            flex-direction: column;
            word-break: break-word;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message:active {
            transform: scale(0.98);
        }

        .message.sent {
            background-color: var(--tg-msg-out);
            color: var(--tg-text-color);
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background-color: var(--tg-msg-in);
            color: var(--tg-text-color);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            float: right;
            margin: 3px -4px -4px 8px;
            align-self: flex-end;
            user-select: none;
        }

        .message-time {
            font-size: 10.5px;
            color: var(--tg-text-secondary);
        }

        .status-ticks {
            display: flex;
            align-items: center;
            color: #4cd964;
        }

        .status-ticks svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
        }

        .message.system-welcome {
            background-color: rgba(24, 37, 51, 0.85);
            border: 1px solid rgba(82, 136, 193, 0.1);
            max-width: 85%;
            align-self: center;
            border-radius: 12px;
            color: #e2e8f0;
            white-space: pre-line;
            font-size: 13.5px;
            padding: 10px 12px;
            box-shadow: none;
        }

        .mention-link {
            color: #6fb1e4;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }

        .chat-input-area {
            padding: 8px 12px;
            background-color: var(--tg-surface-color);
            border-top: 1px solid var(--tg-border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        .chat-input {
            flex: 1;
            background-color: var(--tg-bg-color);
            border: 1px solid var(--tg-border-color);
            border-radius: 19px;
            padding: 9px 15px;
            color: var(--tg-text-color);
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .send-btn.active {
            color: var(--tg-accent-color);
        }

        .placeholder-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--tg-text-secondary);
            font-size: 15px;
        }

        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px;
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: var(--tg-border-color);
            margin-bottom: 12px;
            object-fit: cover;
            cursor: pointer;
        }

        .profile-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .profile-username {
            font-size: 14px;
            color: var(--tg-text-secondary);
        }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: var(--tg-surface-color);
            border-top: 1px solid var(--tg-border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--tg-text-secondary);
            font-size: 11px;
            cursor: pointer;
            height: 100%;
            gap: 2px;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--tg-accent-color);
        }

        .search-results {
            background-color: var(--tg-surface-color);
            border-bottom: 1px solid var(--tg-border-color);
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .search-result-item {
            padding: 10px 14px;
            border-bottom: 1px solid var(--tg-border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-result-item:active {
            background-color: #202b36;
        }

        .chat-time {
            font-size: 11px;
            color: var(--tg-text-secondary);
            white-space: nowrap;
        }

        /* Profile popup */
        .profile-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .profile-popup.active {
            display: flex;
        }

        .profile-popup-content {
            background-color: var(--tg-surface-color);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .profile-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-popup-close {
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        /* Message actions */
        .message-actions {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--tg-surface-color);
            border-radius: 12px;
            padding: 8px;
            display: none;
            gap: 8px;
            z-index: 2500;
            box-shadow: 0 4px 12px var(--tg-shadow);
        }

        .message-actions.active {
            display: flex;
        }

        .message-action-btn {
            background: none;
            border: none;
            color: var(--tg-text-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .message-action-btn:hover {
            background-color: var(--tg-border-color);
        }

        .message-action-btn.danger {
            color: #ff3b30;
        }

        /* Themes */
        .theme-switch {
            position: fixed;
            top: 60px;
            right: 16px;
            z-index: 100;
            background: none;
            border: none;
            color: var(--tg-text-color);
            font-size: 24px;
            cursor: pointer;
        }

        /* Verified badge for creator */
        .verified-badge {
            color: var(--tg-verified);
            margin-left: 4px;
        }

        @media (max-width: 480px) {
            .profile-popup-content {
                width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="font-weight: bold; font-size: 16px; margin-bottom: 6px;">DICEGRAM</p>
        <p style="color: var(--tg-text-secondary); font-size: 13px;">Подключение к серверу...</p>
    </div>

    <div id="app-container">
        <header id="main-header">
            <div class="header-content-left">
                <span id="header-title" class="header-main-title">Чаты</span>
                <span id="global-status" class="connection-status">Обновление...</span>
            </div>
            <input type="text" id="global-search" class="search-input" placeholder="Поиск..." oninput="handleSearch(this.value)">
            <button class="theme-switch" onclick="toggleTheme()">🌙</button>
        </header>

        <div id="search-results" class="search-results"></div>

        <div id="screen-chats" class="screen active">
            <div id="chats-list"></div>
        </div>

        <div id="chat-room">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()">❮ Назад</button>
                <div class="header-user-info" onclick="showUserProfile(currentChatId)">
                    <div class="header-avatar" id="room-header-avatar">DS</div>
                    <div class="header-text-container">
                        <span id="chat-room-title" class="header-chat-title">Чат</span>
                        <span id="chat-room-status" class="header-chat-status">в сети</span>
                    </div>
                </div>
            </div>
            
            <div id="chat-messages"></div>
            
            <div class="chat-input-area">
                <input type="text" id="message-field" class="chat-input" placeholder="Сообщение..." autocomplete="off" oninput="toggleSendButton(this)">
                <button id="send-btn-icon" class="send-btn" onclick="sendMessage()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div id="screen-contacts" class="screen">
            <div class="placeholder-screen">Список контактов пуст</div>
        </div>

        <div id="screen-settings" class="screen">
            <div style="padding:20px;">
                <h2>Настройки DICEGRAM</h2>
                <div style="margin-top:20px;">
                    <button onclick="toggleTheme()" style="background:var(--tg-surface-color);color:var(--tg-text-color);border:1px solid var(--tg-border-color);padding:12px 20px;border-radius:12px;width:100%;font-size:16px;cursor:pointer;">Сменить тему</button>
                </div>
            </div>
        </div>

        <div id="screen-profile" class="screen">
            <div class="profile-container">
                <img id="user-avatar" class="profile-avatar" src="https://via.placeholder.com/100/17212b/ffffff?text=U" alt="Avatar" onclick="changeAvatar()">
                <div id="user-name" class="profile-name">Имя Фамилия</div>
                <div id="user-username" class="profile-username">@username</div>
                <div style="margin-top:10px;color:var(--tg-text-secondary);font-size:13px;">Был(а) в сети недавно</div>
            </div>
            <div style="padding:16px;">
                <div style="background:var(--tg-surface-color);border-radius:12px;padding:12px;">
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--tg-border-color);">
                        <span style="color:var(--tg-text-secondary);">Имя</span>
                        <span id="profile-display-name" style="cursor:pointer;" onclick="editName()">Изменить</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--tg-border-color);">
                        <span style="color:var(--tg-text-secondary);">Username</span>
                        <span id="profile-username-display">@username</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;">
                        <span style="color:var(--tg-text-secondary);">Язык</span>
                        <span onclick="changeLanguage()" style="cursor:pointer;">Русский</span>
                    </div>
                </div>
            </div>
        </div>

        <nav id="bottom-navigation">
            <div class="nav-item active" onclick="switchTab('chats', this)">
                <div style="font-size:22px;">💬</div>
                <div>Чаты</div>
            </div>
            <div class="nav-item" onclick="switchTab('contacts', this)">
                <div style="font-size:22px;">👥</div>
                <div>Контакты</div>
            </div>
            <div class="nav-item" onclick="switchTab('settings', this)">
                <div style="font-size:22px;">⚙️</div>
                <div>Настройки</div>
            </div>
            <div class="nav-item" onclick="switchTab('profile', this)">
                <div style="font-size:22px;">👤</div>
                <div>Профиль</div>
            </div>
        </nav>
    </div>

    <!-- Profile Popup -->
    <div id="profile-popup" class="profile-popup">
        <div class="profile-popup-content">
            <div class="profile-popup-header">
                <h2 id="popup-user-name">Пользователь</h2>
                <button class="profile-popup-close" onclick="closeProfilePopup()">✕</button>
            </div>
            <div id="popup-user-info">
                <div style="text-align:center;margin-bottom:20px;">
                    <div id="popup-avatar" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg, #5085b1, #366187);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;"></div>
                    <div id="popup-name" style="font-size:18px;font-weight:600;margin-top:10px;"></div>
                    <div id="popup-username" style="color:var(--tg-text-secondary);font-size:14px;"></div>
                    <div id="popup-status" style="color:var(--tg-status-online);font-size:13px;margin-top:5px;"></div>
                    <div id="popup-verified" style="color:var(--tg-verified);font-size:13px;margin-top:5px;"></div>
                </div>
                <div id="popup-actions" style="display:flex;flex-direction:column;gap:8px;">
                    <button onclick="addContact()" style="background:var(--tg-accent-color);color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">Добавить в контакты</button>
                    <button onclick="blockUser()" style="background:#ff3b30;color:white;border:none;padding:12px;border-radius:12px;font-size:16px;cursor:pointer;">Заблокировать</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const SERVER_URL = "https://a38499-be46.m.jrnm.app";
        const socket = io(SERVER_URL, { transports: ["websocket"], secure: true });

        let currentChatId = null;
        let myTelegramId = null;
        let dynamicChats = {};
        let unreadCounts = {};
        let selectedMessageId = null;
        let theme = 'dark';

        const CREATOR_ID = "8771009385";
        const CREATOR_USERNAME = "dauletbr";

        const tgUser = tg.initDataUnsafe?.user || {
            id: 123456789,
            first_name: "Локальный",
            last_name: "Пользователь",
            username: "тест_юзер",
            photo_url: ""
        };

        myTelegramId = String(tgUser.id);

        document.getElementById('user-name').innerText = `${tgUser.first_name} ${tgUser.last_name || ''}`.trim();
        document.getElementById('user-username').innerText = tgUser.username ? `@${tgUser.username}` : '';
        document.getElementById('profile-username-display').innerText = tgUser.username ? `@${tgUser.username}` : '';
        document.getElementById('profile-display-name').innerText = `${tgUser.first_name} ${tgUser.last_name || ''}`.trim();
        if (tgUser.photo_url) document.getElementById('user-avatar').src = tgUser.photo_url;

        socket.on('connect', () => {
            document.getElementById('global-status').style.display = 'none';
            socket.emit('auth', tgUser, (response) => {
                if (response && response.status === 'ok') {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    loadChatsAndMessages();
                }
            });
        });

        socket.on('disconnect', () => {
            const statusEl = document.getElementById('global-status');
            statusEl.style.display = 'block';
            statusEl.innerText = "Соединение...";
        });

        function loadChatsAndMessages() {
            socket.emit('get_all_chats', {}, (chats) => {
                if (chats && Array.isArray(chats)) {
                    chats.forEach(chat => {
                        const partnerId = chat.partner_id;
                        if (partnerId !== myTelegramId) {
                            if (!dynamicChats[partnerId]) {
                                dynamicChats[partnerId] = {
                                    first_name: chat.partner_name || `User ${partnerId}`,
                                    username: chat.partner_username || `@user${partnerId}`
                                };
                            }
                            createChatRow(partnerId, dynamicChats[partnerId].first_name, dynamicChats[partnerId].username);
                            if (chat.last_message) {
                                const previewEl = document.getElementById(`preview-${partnerId}`);
                                if (previewEl) previewEl.innerText = chat.last_message;
                            }
                            if (chat.unread_count > 0) {
                                unreadCounts[partnerId] = chat.unread_count;
                                updateUnreadBadge(partnerId, chat.unread_count);
                            }
                        }
                    });
                }
            });
        }

        socket.on('new_message', (msg) => {
            const chatPartner = msg.sender_id === myTelegramId ? msg.receiver_id : msg.sender_id;

            if (chatPartner !== myTelegramId) {
                if (!dynamicChats[chatPartner]) {
                    socket.emit('get_user_info', { user_id: chatPartner }, (userInfo) => {
                        if (userInfo && userInfo.status === 'found') {
                            dynamicChats[chatPartner] = {
                                first_name: userInfo.user.first_name,
                                username: userInfo.user.username
                            };
                            createChatRow(chatPartner, userInfo.user.first_name, userInfo.user.username);
                        } else {
                            dynamicChats[chatPartner] = {
                                first_name: `User ${chatPartner}`,
                                username: `@user${chatPartner}`
                            };
                            createChatRow(chatPartner, `User ${chatPartner}`, `@user${chatPartner}`);
                        }
                    });
                }

                if (msg.sender_id !== myTelegramId && currentChatId !== chatPartner) {
                    unreadCounts[chatPartner] = (unreadCounts[chatPartner] || 0) + 1;
                    updateUnreadBadge(chatPartner, unreadCounts[chatPartner]);
                }
            }

            const previewEl = document.getElementById(`preview-${chatPartner}`);
            if (previewEl) previewEl.innerText = msg.text;

            if (currentChatId === chatPartner) {
                renderSingleMessage(msg);
                scrollToBottom();
                if (msg.sender_id !== myTelegramId) {
                    unreadCounts[chatPartner] = 0;
                    updateUnreadBadge(chatPartner, 0);
                }
            }
        });

        function updateUnreadBadge(chatId, count) {
            const badge = document.getElementById(`unread-badge-${chatId}`);
            if (badge) {
                if (count > 0) {
                    badge.style.display = 'inline-block';
                    badge.textContent = count;
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        function getLocalTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function handleSearch(query) {
            const resultsContainer = document.getElementById('search-results');
            if (!query.trim()) {
                resultsContainer.style.display = 'none';
                resultsContainer.innerHTML = '';
                return;
            }

            socket.emit('search_users', { query: query.trim() }, (results) => {
                resultsContainer.innerHTML = '';
                if (results && results.length > 0) {
                    resultsContainer.style.display = 'block';
                    results.forEach(user => {
                        if (user.telegram_id === myTelegramId) return;
                        const item = document.createElement('div');
                        item.className = 'search-result-item';
                        const isBotFather = user.username === 'botfather';
                        const verifiedIcon = isBotFather ? 
                            `<svg class="tg-verify-icon" viewBox="0 0 24 24" style="width:16px;height:16px;"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
                        const isVerified = user.telegram_id === CREATOR_ID || user.is_verified;
                        const verifyBadge = isVerified ? `<span style="color:var(--tg-verified);font-size:12px;">✓</span>` : '';
                        item.innerHTML = `
                            <div class="chat-avatar" style="width:36px;height:36px;font-size:12px;background:${isBotFather ? 'linear-gradient(135deg, #2a9d8f, #264653)' : 'linear-gradient(135deg, #5085b1, #366187)'}">${user.first_name.substring(0,2).toUpperCase()}</div>
                            <div>
                                <div style="display:flex;align-items:center;gap:4px;font-weight:600;">${user.first_name} ${verifiedIcon} ${verifyBadge}</div>
                                <div style="font-size:12px;color:var(--tg-text-secondary);">@${user.username}</div>
                            </div>
                        `;
                        item.onclick = () => {
                            if (user.telegram_id === myTelegramId) return;
                            if (!dynamicChats[user.telegram_id]) {
                                dynamicChats[user.telegram_id] = {
                                    first_name: user.first_name,
                                    username: user.username
                                };
                                createChatRow(user.telegram_id, user.first_name, user.username);
                            }
                            openChat(user.telegram_id, user.first_name, user.username === 'botfather' || user.telegram_id === CREATOR_ID);
                            resultsContainer.style.display = 'none';
                            document.getElementById('global-search').value = '';
                        };
                        resultsContainer.appendChild(item);
                    });
                } else {
                    resultsContainer.style.display = 'block';
                    resultsContainer.innerHTML = '<div style="padding:10px 14px;color:var(--tg-text-secondary);">Пользователи не найдены</div>';
                }
            });
        }

        function switchTab(tabName, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`screen-${tabName}`).classList.add('active');
            if (element) element.classList.add('active');
            document.getElementById('header-title').innerText = tabName === 'chats' ? 'Чаты' : 
                                                              tabName === 'contacts' ? 'Контакты' :
                                                              tabName === 'settings' ? 'Настройки' : 'Профиль';
            document.getElementById('search-results').style.display = 'none';
        }

        function openChat(chatId, chatName, isVerified = false) {
            currentChatId = chatId;
            
            unreadCounts[chatId] = 0;
            updateUnreadBadge(chatId, 0);
            
            const titleEl = document.getElementById('chat-room-title');
            titleEl.innerText = chatName;
            if (isVerified) {
                titleEl.innerHTML = `${chatName} <svg class="tg-verify-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
            }

            const avatarLetters = chatName.substring(0, 2).toUpperCase();
            document.getElementById('room-header-avatar').innerText = avatarLetters;
            
            // Get user status
            socket.emit('get_user_info', { user_id: chatId }, (userInfo) => {
                if (userInfo && userInfo.status === 'found') {
                    document.getElementById('chat-room-status').innerText = userInfo.user.is_online ? 'в сети' : 'был(а) недавно';
                }
            });

            document.getElementById('bottom-navigation').style.display = 'none';
            document.getElementById('chat-room').style.display = 'flex';
            
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = '';

            if (chatId === "0" && !localStorage.getItem(`welcome_shown_${myTelegramId}`)) {
                renderSystemWelcomeMessage();
                localStorage.setItem(`welcome_shown_${myTelegramId}`, "true");
            }

            socket.emit('get_chat_history', { with_id: chatId }, (history) => {
                if (history && Array.isArray(history)) {
                    history.forEach(msg => renderSingleMessage(msg));
                    scrollToBottom();
                }
            });

            socket.emit('mark_as_read', { chat_id: chatId });
        }

        function closeChat() {
            document.getElementById('chat-room').style.display = 'none';
            document.getElementById('bottom-navigation').style.display = 'flex';
            currentChatId = null;
        }

        function renderSystemWelcomeMessage() {
            const container = document.getElementById('chat-messages');
            const welcomeEl = document.createElement('div');
            welcomeEl.classList.add('message', 'system-welcome');
            welcomeEl.innerText = `🤖 Добро пожаловать в DICEGRAM!\n\n👤 ${tgUser.first_name} ${tgUser.last_name || ''}\n🏷️ @${tgUser.username || 'тест_юзер'}\n🆔 ID: ${myTelegramId}`;
            container.appendChild(welcomeEl);
        }

        function renderSingleMessage(msg) {
            const container = document.getElementById('chat-messages');
            
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper');

            const msgEl = document.createElement('div');
            msgEl.classList.add('message');
            msgEl.dataset.messageId = msg.id || Date.now();

            const timeStr = getLocalTime(msg.timestamp);

            let ticksHtml = '';
            if (msg.sender_id === myTelegramId) {
                wrapper.classList.add('sent');
                msgEl.classList.add('sent');
                ticksHtml = `<span class="status-ticks"><svg viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path d="M18 7l-1.41-1.41L10 12.17 7.41 9.59 6 11l4 4zm-4.24 0L12.35 5.59 6 11.94l1.41 1.41z"/></svg></span>`;
            } else {
                wrapper.classList.add('received');
                msgEl.classList.add('received');
            }

            msgEl.innerHTML = `
                <span>${formatMessageText(msg.text)}</span>
                <div class="message-meta">
                    <span class="message-time">${timeStr}</span>
                    ${ticksHtml}
                </div>
            `;

            msgEl.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showMessageActions(msgEl.dataset.messageId);
            });

            msgEl.addEventListener('click', () => {
                showMessageActions(msgEl.dataset.messageId);
            });

            wrapper.appendChild(msgEl);
            container.appendChild(wrapper);
        }

        function formatMessageText(text) {
            return text.replace(/(@[a-zA-Z0-9_]{3,32})/g, function(match) {
                return `<span class="mention-link" onclick="handleMentionClick('${match}')">${match}</span>`;
            });
        }

        function handleMentionClick(username) {
            socket.emit('find_user', { username: username }, (response) => {
                if (response && response.status === 'found') {
                    const user = response.user;
                    if (user.telegram_id === myTelegramId) return;
                    if (!dynamicChats[user.telegram_id]) {
                        dynamicChats[user.telegram_id] = {
                            first_name: user.first_name,
                            username: user.username
                        };
                        createChatRow(user.telegram_id, user.first_name, user.username);
                    }
                    openChat(user.telegram_id, user.first_name, user.telegram_id === CREATOR_ID);
                } else {
                    alert(`Пользователь ${username} не найден.`);
                }
            });
        }

        function createChatRow(tgId, firstName, username) {
            if (!dynamicChats[tgId]) {
                dynamicChats[tgId] = { first_name: firstName, username: username };
            }
            const chatsList = document.getElementById('chats-list');
            if (document.getElementById(`chat-item-${tgId}`)) return;
            
            const isBotFather = username === 'botfather';
            const isVerified = tgId === CREATOR_ID || username === 'botfather';
            const verifiedIcon = isVerified ? 
                `<svg class="tg-verify-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>` : '';
            
            const rowHTML = `
                <div class="chat-item" id="chat-item-${tgId}" onclick="openChat('${tgId}', '${firstName}', ${isVerified})">
                    <div class="chat-avatar" style="background: ${isBotFather ? 'linear-gradient(135deg, #2a9d8f, #264653)' : 'linear-gradient(135deg, #5085b1, #366187)'}">
                        ${firstName.substring(0,2).toUpperCase()}
                        ${isVerified ? '<span style="position:absolute;bottom:-2px;right:-2px;font-size:12px;">✓</span>' : ''}
                    </div>
                    <div class="chat-details">
                        <div class="chat-title-row">
                            <div class="chat-name">${firstName} ${verifiedIcon}</div>
                            <div style="display:flex;align-items:center;gap:4px;">
                                <span class="chat-time" id="time-${tgId}"></span>
                                <span class="chat-unread-badge" id="unread-badge-${tgId}" style="display:none;">0</span>
                            </div>
                        </div>
                        <div class="chat-preview" id="preview-${tgId}">Нет сообщений</div>
                    </div>
                </div>
            `;
            chatsList.insertAdjacentHTML('beforeend', rowHTML);
        }

        function toggleSendButton(input) {
            const btn = document.getElementById('send-btn-icon');
            if (input.value.trim().length > 0) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-field');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            if (currentChatId === 'botfather' || dynamicChats[currentChatId]?.username === 'botfather') {
                handleBotCommand(text);
                input.value = '';
                document.getElementById('send-btn-icon').classList.remove('active');
                return;
            }

            socket.emit('send_message', { receiver_id: currentChatId, text: text }, (response) => {
                if (response && response.status === 'ok') {
                    renderSingleMessage(response.message);
                    const previewEl = document.getElementById(`preview-${currentChatId}`);
                    if (previewEl) previewEl.innerText = text;
                    scrollToBottom();
                }
            });

            input.value = '';
            document.getElementById('send-btn-icon').classList.remove('active');
            input.focus();
        }

        function handleBotCommand(text) {
            const botResponse = emulateBotFather(text);
            
            const userMsg = {
                sender_id: myTelegramId,
                receiver_id: 'botfather',
                text: text,
                timestamp: new Date().toISOString()
            };
            renderSingleMessage(userMsg);
            
            setTimeout(() => {
                const botMsg = {
                    sender_id: 'botfather',
                    receiver_id: myTelegramId,
                    text: botResponse,
                    timestamp: new Date().toISOString()
                };
                renderSingleMessage(botMsg);
                scrollToBottom();
            }, 500);
        }

        function emulateBotFather(text) {
            const lower = text.toLowerCase().trim();
            
            if (lower === '/start') {
                return `I can help you create and manage Telegram bots. If you're new to the Bot API, please see the manual.\n\nYou can control me by sending these commands:\n\n/newbot - create a new bot\n/mybots - edit your bots`;
            }
            
            if (lower === '/newbot') {
                return `Alright, a new bot. How are we going to call it? Please choose a name for your bot.`;
            }
            
            if (!window.botCreationStep) {
                window.botCreationStep = 'name';
                window.botName = text;
                return `Good. Now let's choose a username for your bot. It must end in \`bot\`. Like this, for example: TetrisBot or tetris_bot.`;
            } else if (window.botCreationStep === 'name') {
                window.botName = text;
                window.botCreationStep = 'username';
                return `Good. Now let's choose a username for your bot. It must end in \`bot\`. Like this, for example: TetrisBot or tetris_bot.`;
            } else if (window.botCreationStep === 'username') {
                const username = text.trim();
                if (!username.endsWith('bot')) {
                    return `Sorry, the username must end with 'bot'. Please try again.`;
                }
                
                if (window.createdBots && window.createdBots.includes(username)) {
                    return `Sorry, this username is invalid.`;
                }
                
                if (!window.createdBots) window.createdBots = [];
                window.createdBots.push(username);
                window.botCreationStep = null;
                
                const token = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                return `Done! Congratulations on your new bot. You will find it at d.me/${username}. You can now add a description, about section and profile picture for your bot, see /help for a list of commands. By the way, when you've finished creating your cool bot, ping our Bot Support if you want a better username for it. Just make sure the bot is fully operational before you do this.\n\nUse this token to access the HTTP API:\n${token}\n\nKeep your token secure and store it safely, it can be used by anyone to control your bot.`;
            }
            
            return `I don't understand that command. Please use /start, /newbot, or /mybots.`;
        }

        function showMessageActions(messageId) {
            const actions = document.getElementById('message-actions');
            if (!actions) {
                const div = document.createElement('div');
                div.id = 'message-actions';
                div.className = 'message-actions';
                div.innerHTML = `
                    <button class="message-action-btn" onclick="replyToMessage()">↩ Ответить</button>
                    <button class="message-action-btn" onclick="editMessage()">✏️ Редактировать</button>
                    <button class="message-action-btn" onclick="forwardMessage()">📤 Переслать</button>
                    <button class="message-action-btn danger" onclick="deleteMessage()">🗑 Удалить</button>
                    <button class="message-action-btn" onclick="pinMessage()">📌 Закрепить</button>
                `;
                document.body.appendChild(div);
            }
            actions.classList.toggle('active');
            selectedMessageId = messageId;
        }

        function replyToMessage() {
            alert('Ответ на сообщение');
            document.getElementById('message-actions').classList.remove('active');
        }

        function editMessage() {
            alert('Редактирование сообщения');
            document.getElementById('message-actions').classList.remove('active');
        }

        function forwardMessage() {
            alert('Пересылка сообщения');
            document.getElementById('message-actions').classList.remove('active');
        }

        function deleteMessage() {
            if (confirm('Удалить сообщение?')) {
                alert('Сообщение удалено');
                document.getElementById('message-actions').classList.remove('active');
            }
        }

        function pinMessage() {
            alert('Сообщение закреплено');
            document.getElementById('message-actions').classList.remove('active');
        }

        function showUserProfile(userId) {
            if (!userId) return;
            
            socket.emit('get_user_info', { user_id: userId }, (userInfo) => {
                if (userInfo && userInfo.status === 'found') {
                    const user = userInfo.user;
                    const popup = document.getElementById('profile-popup');
                    document.getElementById('popup-user-name').innerText = user.first_name;
                    document.getElementById('popup-avatar').innerText = user.
