<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DICEGRAM TikTok</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем Socket.io клиент -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <!-- Подключаем Telegram WebApp SDK для работы Mini App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- 1. ЗАГРУЗОЧНЫЙ ЭКРАН -->
    <div id="loading-screen" class="screen">
        <div class="loader"></div>
        <p>Подключение к DICEGRAM...</p>
        <p id="loading-error" style="display:none; color:#ff4545;">Не удалось подключиться</p>
        <button id="reconnect-btn" style="display:none;" onclick="reconnect()">Повторить попытку</button>
    </div>

    <!-- 2. ЭКРАН ВЫБОРА (ВХОД / РЕГИСТРАЦИЯ) -->
    <div id="screen-auth-choice" class="screen" style="display: none;">
        <div class="auth-logo">
            <span class="logo-text">DICEGRAM</span>
            <span class="logo-sub">TIKTOK</span>
        </div>
        <div class="auth-buttons">
            <button class="btn btn-primary" onclick="showAuthScreen('login')">Войти на аккаунт</button>
            <button class="btn btn-secondary" onclick="showAuthScreen('register')">Создать новый аккаунт</button>
        </div>
    </div>

    <!-- 3. ЭКРАН ВХОДА -->
    <div id="screen-auth-login" class="screen" style="display: none;">
        <div class="back-btn" onclick="showAuthScreen('choice')">← Назад</div>
        <h2>Войти на аккаунт</h2>
        <div class="auth-form">
            <div class="input-group">
                <label>Ваш юзернейм</label>
                <input type="text" id="login-username" placeholder="Введите @username">
            </div>
            <div class="input-group">
                <label>Ваш пароль</label>
                <input type="password" id="login-password" placeholder="Введите пароль">
            </div>
            <div id="login-error-msg" class="error-text" style="display: none;"></div>
            <button class="btn btn-primary" onclick="processLogin()">Войти</button>
        </div>
    </div>

    <!-- 4. ЭКРАН РЕГИСТРАЦИИ -->
    <div id="screen-auth-register" class="screen" style="display: none;">
        <div class="back-btn" onclick="showAuthScreen('choice')">← Назад</div>
        <h2>Регистрация</h2>
        <div class="auth-form">
            <div class="input-group">
                <label>Напишите вашего юзернейм из оригинального телеграмма</label>
                <input type="text" id="reg-username" placeholder="Пример: dauletbr">
            </div>
            <div class="input-group">
                <label>Создайте пароль</label>
                <input type="password" id="reg-password" placeholder="Придумайте пароль">
            </div>
            <div class="input-group">
                <label>Подтвердите пароля</label>
                <input type="password" id="reg-password-confirm" placeholder="Повторите пароль">
            </div>
            <div id="reg-error-msg" class="error-text" style="display: none;"></div>
            <button class="btn btn-secondary" onclick="processRegister()">Создать аккаунт</button>
        </div>
    </div>

    <!-- 5. ГЛАВНЫЙ ЭКРАН ПРИЛОЖЕНИЯ (БЕСКОНЕЧНАЯ ЛЕНТА) -->
    <div id="app-container" class="screen" style="display: none;">
        <!-- Индикатор статуса сети -->
        <span id="global-status" style="display:none;"></span>

        <!-- Вертикальный контейнер для видео-слайдов -->
        <div id="video-feed" class="video-feed-container">
            <!-- Сюда JS будет динамически рендерить слайды с видео -->
        </div>

        <!-- Нижнее навигационное меню (как в ТТ) -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="changeTab('feed')">🏠 Лента</div>
            <div class="nav-item" onclick="changeTab('profile')">👤 Профиль</div>
        </div>
    </div>

    <!-- Подключаем JS скрипты конфигурации и ядра -->
    <script src="js/config.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/feed.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
