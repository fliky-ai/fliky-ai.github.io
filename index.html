<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Захват Территории</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pubnub/7.2.1/pubnub.min.js"></script>
    
    <style>
        * { box-sizing: border-box; user-select: none; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; color: #ffffff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Экран блокировки */
        #kick-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: #050505; text-align: center; padding: 20px; position: absolute; z-index: 1000; }
        #kick-screen h1 { color: #ff3333; text-transform: uppercase; font-weight: bold; }
        
        #game-container { display: none; flex-direction: column; width: 100%; height: 100%; position: relative; }
        
        /* Верхняя панель и ТОП */
        #header { width: 100%; height: auto; padding: 10px; background: #0a0a0a; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; }
        #my-info { font-size: 14px; font-weight: bold; text-transform: uppercase; }
        #leaderboard { font-size: 12px; text-align: right; }
        .leader-row { margin-bottom: 3px; }
        
        /* Игровое поле (Сетка) */
        #board-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #050505; padding: 10px; }
        #grid { display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); width: 100%; aspect-ratio: 1/1; max-width: 500px; background: #111; border: 2px solid #333; gap: 1px; }
        .cell { background: #000; width: 100%; height: 100%; position: relative; transition: background-color 0.1s; }
        
        /* Маркер игрока (где он сейчас стоит) */
        .player-marker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; z-index: 5; pointer-events: none; }
        .player-marker::after { content: ''; position: absolute; width: 60%; height: 60%; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 5px #fff; }

        /* Джойстик */
        #controls { width: 100%; height: 35%; background: #0a0a0a; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); padding: 20px; gap: 15px; border-top: 1px solid #222; }
        .btn { background: #111; border: 1px solid #333; color: #fff; font-size: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 10px #000; }
        .btn:active { background: #222; border-color: #555; }
    </style>
</head>
<body>

    <!-- Экран кика для тех, кто зашел не через бота -->
    <div id="kick-screen">
        <h1>Доступ запрещен</h1>
        <p>Игра доступна только через официального бота Telegram.</p>
    </div>

    <!-- Основной интерфейс -->
    <div id="game-container">
        <div id="header">
            <div id="my-info">Подключение...</div>
            <div id="leaderboard">
                <div style="color: #666; margin-bottom: 5px;">ТОП ТЕРРИТОРИЙ</div>
                <div id="leaders-list"></div>
            </div>
        </div>
        
        <div id="board-container">
            <div id="grid"></div>
        </div>
        
        <!-- Кнопки управления -->
        <div id="controls">
            <div></div>
            <div class="btn" onclick="move(0, -1)">▲</div>
            <div></div>
            <div class="btn" onclick="move(-1, 0)">◀</div>
            <div class="btn" style="background: #050505; border: none; box-shadow: none;"></div>
            <div class="btn" onclick="move(1, 0)">▶</div>
            <div></div>
            <div class="btn" onclick="move(0, 1)">▼</div>
            <div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Проверка входа через Telegram
        if (!tg.initData || tg.initData === "") {
            document.getElementById('kick-screen').style.display = 'flex';
        } else {
            document.getElementById('kick-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            initGame();
        }

        // Настройки игры
        const gridSize = 15;
        let myId, myName, myColor;
        let myPos = { x: 7, y: 7 }; // Старт в центре
        let boardState = {}; // Хранит владельцев клеток "x,y" -> {id, color}
        let players = {}; // Хранит текущие позиции игроков "id" -> {name, x, y, color}

        function initGame() {
            myName = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || "Игрок";
            myId = tg.initDataUnsafe?.user?.id?.toString() || Math.random().toString(36).substr(2, 9);
            
            // Генерируем случайный яркий неоновый цвет для игрока
            const neonColors = ['#ff0055', '#00ffcc', '#ccff00', '#ffaa00', '#bd00ff', '#0088ff', '#ff0000', '#00ff00'];
            myColor = neonColors[Math.floor(Math.random() * neonColors.length)];

            document.getElementById('my-info').innerHTML = `<span style="color:${myColor}">${myName}</span>`;

            buildGrid();

            // Подключение к мультиплееру
            const pubnub = new PubNub({
                publishKey: 'pub-c-8def65ec-527e-4b47-bc85-ca3b6e828135',
                subscribeKey: 'sub-c-5e5bc8de-1e0e-436f-b425-4c07fcbeaf60',
                userId: myId
            });

            pubnub.subscribe({ channels: ['territory_io_room'] });

            // Обработка сообщений от сервера
            pubnub.addListener({
                message: function(event) {
                    const msg = event.message;
                    
                    if (msg.type === 'move') {
                        // Обновляем позицию игрока
                        players[msg.id] = { name: msg.name, x: msg.x, y: msg.y, color: msg.color };
                        
                        // Закрашиваем клетку
                        const cellKey = `${msg.x},${msg.y}`;
                        boardState[cellKey] = { id: msg.id, color: msg.color };
                        
                        updateVisuals();
                    }
                }
            });

            // Делаем первый ход (появляемся на карте)
            window.move = function(dx, dy) {
                let newX = myPos.x + dx;
                let newY = myPos.y + dy;

                // Проверка границ карты
                if (newX >= 0 && newX < gridSize && newY >= 0 && newY < gridSize) {
                    myPos.x = newX;
                    myPos.y = newY;
                    
                    // Отправляем свой ход всем онлайн
                    pubnub.publish({
                        channel: 'territory_io_room',
                        message: { type: 'move', id: myId, name: myName, x: myPos.x, y: myPos.y, color: myColor }
                    });

                    // Красим локально сразу для плавности
                    players[myId] = { name: myName, x: myPos.x, y: myPos.y, color: myColor };
                    boardState[`${myPos.x},${myPos.y}`] = { id: myId, color: myColor };
                    updateVisuals();
                }
            };

            // Принудительно "становимся" на стартовую клетку
            move(0, 0);
        }

        function buildGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${x}-${y}`;
                    grid.appendChild(cell);
                }
            }
        }

        function updateVisuals() {
            // 1. Очищаем все маркеры игроков с карты
            document.querySelectorAll('.player-marker').forEach(m => m.remove());

            // 2. Обновляем цвета захваченных клеток
            let scores = {}; // Подсчет очков: id -> count
            
            for (let key in boardState) {
                const parts = key.split(',');
                const x = parts[0];
                const y = parts[1];
                const owner = boardState[key];
                
                // Перекрашиваем клетку в цвет владельца (чуть затемненный)
                const cellEl = document.getElementById(`cell-${x}-${y}`);
                if (cellEl) {
                    cellEl.style.backgroundColor = owner.color;
                    cellEl.style.opacity = "0.7";
                }

                // Считаем очки
                if (!scores[owner.id]) scores[owner.id] = { count: 0, name: players[owner.id]?.name || 'Unknown', color: owner.color };
                scores[owner.id].count++;
            }

            // 3. Расставляем маркеры текущих позиций игроков
            for (let pid in players) {
                const p = players[pid];
                const cellEl = document.getElementById(`cell-${p.x}-${p.y}`);
                if (cellEl) {
                    // Клетка, где стоит игрок, яркая
                    cellEl.style.opacity = "1"; 
                    
                    const marker = document.createElement('div');
                    marker.className = 'player-marker';
                    // Первая буква имени внутри маркера
                    marker.innerText = p.name.charAt(0).toUpperCase(); 
                    cellEl.appendChild(marker);
                }
            }

            // 4. Обновляем таблицу лидеров
            updateLeaderboard(scores);
        }

        function updateLeaderboard(scores) {
            const listObj = Object.values(scores).sort((a, b) => b.count - a.count);
            const leadersList = document.getElementById('leaders-list');
            leadersList.innerHTML = '';
            
            listObj.slice(0, 5).forEach((item, index) => {
                leadersList.innerHTML += `
                    <div class="leader-row" style="color: ${item.color}">
                        ${index + 1}. ${item.name}: <b>${item.count}</b>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
