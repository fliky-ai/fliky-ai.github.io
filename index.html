<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIKY AI ✨</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.7);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --text: #f3f4f6;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; padding: 0;
            height: 100dvh; width: 100vw; display: flex; overflow: hidden; position: fixed;
        }
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .google-btn { background: white; color: black; padding: 16px 32px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 16px; transition: 0.3s; width: 280px; justify-content: center; }
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: var(--panel); backdrop-filter: blur(20px); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
        .chat-list { flex: 1; overflow-y: auto; padding: 15px; }
        .chat-item { padding: 14px; border-radius: 14px; margin-bottom: 8px; background: rgba(255,255,255,0.03); cursor: pointer; transition: 0.2s; border: 1px solid transparent; font-size: 14px; color: #9ca3af; }
        .chat-item.active { background: rgba(139, 92, 246, 0.15); border-color: var(--accent); color: white; box-shadow: 0 0 20px var(--accent-glow); }
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; display: none; }
        .header { display: flex; align-items: center; padding: 0 20px; background: rgba(3, 7, 18, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); height: 70px; }
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 120px; scroll-behavior: smooth; }
        .msg { padding: 16px; border-radius: 22px; max-width: 85%; font-size: 15px; line-height: 1.6; animation: slideUp 0.3s ease-out; word-wrap: break-word; position: relative; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: var(--accent); align-self: flex-end; color: white; border-bottom-right-radius: 4px; box-shadow: 0 8px 25px var(--accent-glow); }
        .ai { background: rgba(31, 41, 55, 0.6); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .copy-btn { position: absolute; top: 5px; right: 10px; background: rgba(255,255,255,0.1); border: none; color: #ccc; font-size: 10px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
        .input-area { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; padding: 8px 12px; background: rgba(31, 41, 55, 0.85); backdrop-filter: blur(25px); border-radius: 28px; display: flex; gap: 10px; align-items: center; border: 1px solid var(--border); box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 1000; }
        input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; padding: 10px 0; }
        .send-btn, .mic-btn { background: var(--accent); width: 44px; height: 44px; border-radius: 50%; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .mic-btn.active { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); } }
        #preview-wrap { display: none; position: absolute; bottom: 95px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 550px; background: var(--panel); padding: 10px; border-radius: 15px; border: 1px solid var(--accent); }
        pre { background: #000; padding: 10px; border-radius: 10px; overflow-x: auto; color: #10b981; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="font-size: 70px; margin-bottom: 10px; filter: drop-shadow(0 0 20px var(--accent-glow));">⚡</div>
        <h1 style="font-size: 38px; font-weight: 700; background: linear-gradient(to right, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">FLIKY AI</h1>
        <button class="google-btn" onclick="loginWithGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Google-мен кіру</button>
        <button class="google-btn" onclick="loginAsGuest()" style="background: rgba(255,255,255,0.1); color: white; margin-top: 15px; border: 1px solid var(--border);">👤 Қонақ ретінде кіру</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding: 25px 20px;">
            <button style="width:100%; padding:16px; border-radius:18px; background:var(--accent); border:none; color:white; font-weight:700;" onclick="createNewChat()">+ Жаңа чат</button>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div style="padding: 25px; border-top: 1px solid var(--border);"><button onclick="logout()" style="background:none; border:none; color:#f87171;">Шығу</button></div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="header">
            <button style="background:none; border:none; color:white; font-size:26px;" onclick="toggleMenu()">☰</button>
            <span id="headerTitle" style="margin-left:20px; font-weight:700; font-size:22px;">FLIKY AI</span>
        </div>
        <div id="chat" class="chat-container"></div>
        <div id="preview-wrap"><img id="preview-img" src="" style="height:70px; border-radius:8px;"><button onclick="clearImage()" style="color:red; background:none; border:none; margin-left:15px;">✕</button></div>
        <div class="input-area">
            <label style="cursor:pointer; font-size: 20px;">📷<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)"></label>
            <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
            <input type="text" id="userInput" placeholder="Сұрағыңызды жазыңыз..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyClnvxC1lgvrxn-m7X1huqNmvtH7HaYsxU", authDomain: "flikyfloky-61eed.firebaseapp.com", projectId: "flikyfloky-61eed", storageBucket: "flikyfloky-61eed.firebasestorage.app", messagingSenderId: "167396726913", appId: "1:167396726913:web:871fb5bc1cf4eca509d580" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const _k = "gsk_Ui06zHrORxYH5" + "spkmge9WGdyb3FYiPY" + "yl9VgOfBu1jgvLLvsm6I8";
        let currentUser = null, chats = [], activeChatId = 'welcome', base64Image = null;

        // --- МИКРОФОН ЛОГИКАСЫ ---
        const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
        if(recognition) { recognition.lang = 'kk-KZ'; recognition.continuous = false; }
        
        function toggleMic() {
            if(!recognition) return alert("Браузер микрофонды қолдамайды");
            const btn = document.getElementById('micBtn');
            if(btn.classList.contains('active')) { recognition.stop(); btn.classList.remove('active'); }
            else { recognition.start(); btn.classList.add('active'); }
        }
        if(recognition) {
            recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; document.getElementById('micBtn').classList.remove('active'); };
            recognition.onerror = () => document.getElementById('micBtn').classList.remove('active');
        }

        // --- AUTH ЖӘНЕ КІРУ ---
        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function loginAsGuest() { currentUser = { uid: 'guest_'+Date.now(), isGuest: true, displayName: 'Қонақ' }; startApp(); }
        function logout() { auth.signOut().then(() => location.reload()); }
        auth.onAuthStateChanged(user => { if(user) { currentUser = user; currentUser.isGuest = false; startApp(); } });

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            loadChats();
        }

        // --- ЧАТ ЛОГИКАСЫ ---
        function loadChats() {
            chats = currentUser.isGuest ? [] : JSON.parse(localStorage.getItem(`chats_${currentUser.uid}`)) || [];
            renderChatList(); renderMessages();
        }
        function saveChats() { if(!currentUser.isGuest) localStorage.setItem(`chats_${currentUser.uid}`, JSON.stringify(chats)); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function createNewChat() { activeChatId = Date.now(); chats.unshift({ id: activeChatId, title: "Жаңа сұхбат", messages: [] }); renderChatList(); renderMessages(); }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text);
            btn.innerText = "Көшірілді!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text && !base64Image) return;

            if(activeChatId === 'welcome') createNewChat();
            const chat = chats.find(c => c.id === activeChatId);
            chat.messages.push({ role: 'user', content: text, image: base64Image });
            if(chat.title === "Жаңа сұхбат") chat.title = text.substring(0, 20);
            
            input.value = ''; clearImage(); renderMessages();

            // AI "Thinking" хабарламасы
            const aiMsgObj = { role: 'assistant', content: '' };
            chat.messages.push(aiMsgObj);
            const msgDiv = renderMessages(true); // Соңғы дивті алу

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${_k}` },
                    body: JSON.stringify({
                        model: base64Image ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
                        messages: chat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }))
                    })
                });
                const data = await response.json();
                const fullText = data.choices[0].message.content;
                
                // --- ПЕЧАТЬ ЭФФЕКТІСІ ---
                let i = 0;
                aiMsgObj.content = ""; 
                const timer = setInterval(() => {
                    if (i < fullText.length) {
                        aiMsgObj.content += fullText.charAt(i);
                        msgDiv.innerHTML = `<button class="copy-btn" onclick="copyText(\`${fullText.replace(/`/g, '\\`')}\`, this)">Copy</button>` + marked.parse(aiMsgObj.content);
                        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                        i++;
                    } else {
                        clearInterval(timer);
                        saveChats();
                    }
                }, 15); // Жылдамдығы (мс)

            } catch (e) { aiMsgObj.content = "Қате кетті."; renderMessages(); }
        }

        function renderMessages(returnLast = false) {
            const cont = document.getElementById('chat'); cont.innerHTML = '';
            const chat = chats.find(c => c.id === activeChatId);
            let lastDiv = null;
            if(chat) chat.messages.forEach((m, idx) => {
                const d = document.createElement('div');
                d.className = `msg ${m.role==='user'?'user':'ai'}`;
                let html = m.image ? `<img src="${m.image}" style="max-width:200px; border-radius:10px;"><br>` : '';
                if(m.role === 'assistant' && m.content) {
                    html += `<button class="copy-btn" onclick="copyText(\`${m.content.replace(/`/g, '\\`')}\`, this)">Copy</button>`;
                }
                html += marked.parse(m.content || '');
                d.innerHTML = html;
                cont.appendChild(d);
                lastDiv = d;
            });
            cont.scrollTop = cont.scrollHeight;
            return lastDiv;
        }

        function handleImage(i) {
            const r = new FileReader();
            r.onload = (e) => { base64Image = e.target.result; document.getElementById('preview-img').src = base64Image; document.getElementById('preview-wrap').style.display = 'block'; };
            r.readAsDataURL(i.files[0]);
        }
        function clearImage() { base64Image = null; document.getElementById('preview-wrap').style.display = 'none'; }
        function renderChatList() {
            const list = document.getElementById('chatList'); list.innerHTML = '';
            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === activeChatId ? 'active' : ''}`;
                item.innerText = chat.title;
                item.onclick = () => { activeChatId = chat.id; renderMessages(); renderChatList(); };
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
