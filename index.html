<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram TikTok Mini App</title>
    
    <script src="https://cdn.socket.io/4.7.5/socket-io.min.js"></script>

    <style>
        /* Обнуляем отступы, чтобы приложение было на весь экран */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Отключаем стандартный скролл браузера */
        }

        /* Главный контейнер для вертикальных свайпов (как в ТикТоке) */
        .tiktok-container {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            /* Включаем магический CSS скролл-снап, чтобы видео прилипали к экрану */
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; /* Прячем полосу прокрутки */
        }
        .tiktok-container::-webkit-scrollbar {
            display: none; /* Прячем полосу прокрутки для WebKit (Chrome/Safari) */
        }

        /* Экран одного видео-поста (ровно на 100% видимого экрана смартфона) */
        .video-post {
            position: relative;
            width: 100%;
            height: 100%;
            scroll-snap-align: start; /* Видео фиксируется точно по верхней границе */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Само видео растягивается на весь задний фон */
        .video-player {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Видео обрезается и заполняет экран без черных полос */
        }

        /* Боковая панель справа (Лайк, Коммент) */
        .side-bar {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .action-btn {
            background: none;
            border: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* Иконка лайка (сердечко) */
        .icon-heart {
            font-size: 35px;
            transition: transform 0.1s ease;
        }
        .icon-heart.liked {
            color: #ff3b5c; /* Красный цвет при лайке */
            transform: scale(1.2);
        }

        .btn-counter {
            font-size: 13px;
            margin-top: 5px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Нижняя панель с описанием видео */
        .bottom-bar {
            position: absolute;
            left: 15px;
            bottom: 30px;
            color: #fff;
            z-index: 10;
            max-width: 75%;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .author-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .video-desc {
            font-size: 14px;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="tiktok-container" id="videoContainer">
        <div class="video-post">
            <video class="video-player" loop autoplay muted playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-4653-large.mp4" type="video/mp4">
            </video>
            
            <div class="side-bar">
                <button class="action-btn" onclick="toggleLike(this)">
                    <span class="icon-heart">❤️</span>
                    <span class="btn-counter">105</span>
                </button>
                <button class="action-btn">
                    <span style="font-size:32px;">💬</span>
                    <span class="btn-counter">42</span>
                </button>
            </div>

            <div class="bottom-bar">
                <div class="author-name">@dauletbr</div>
                <div class="video-desc">Тестируем первый в мире Telegram TikTok Mini App! Свайпы работают на чистом CSS 🎬🔥</div>
            </div>
        </div>
    </div>

    <script>
        // Подключаемся к твоему работающему WebSocket-серверу на хостинге justrun!
        const socket = io("https://a38499-be46.m.jrnm.app");

        // Ловим приветственный сигнал от сервера
        socket.on('welcome', (data) => {
            console.log("Сервер ответил:", data.message);
        });

        // Функция для переключения лайка на клиенте
        function toggleLike(button) {
            const heart = button.querySelector('.icon-heart');
            const counter = button.querySelector('.btn-counter');
            let currentLikes = parseInt(counter.innerText);

            if (heart.classList.contains('liked')) {
                heart.classList.remove('liked');
                counter.innerText = currentLikes - 1;
            } else {
                heart.classList.add('liked');
                counter.innerText = currentLikes + 1;
                
                // Отправляем онлайн-сигнал на наш бэкэнд о том, что поставлен лайк
                socket.emit('like_video', { video_id: "test_video_1" });
            }
        }
    </script>
</body>
</html>
