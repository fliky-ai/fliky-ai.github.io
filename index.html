<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Танки Онлайн TG</title>
    <!-- Подключаем Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем библиотеку для бесплатного мультиплеера без своего сервера -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pubnub/7.2.1/pubnub.min.js"></script>
    
    <style>
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
        
        #kick-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: #000; text-align: center; padding: 20px; }
        #kick-screen h1 { color: #ff3333; font-size: 24px; }
        
        #game-container { display: none; width: 100%; height: 100%; position: relative; }
        
        /* Карта (Арена) */
        #arena { width: 100%; height: 60%; background: #222; border-bottom: 2px solid #444; position: relative; overflow: hidden; }
        
        /* Танк */
        .tank { width: 30px; height: 30px; position: absolute; background: #00ff00; border-radius: 5px; transition: all 0.1s linear; }
        .tank::after { content: ''; position: absolute; width: 6px; height: 15px; background: #00aa00; top: -12px; left: 12px; }
        .tank.enemy { background: #ff3333; }
        .tank.enemy::after { background: #aa0000; }
        .tank-name { position: absolute; top: -30px; left: -10px; font-size: 10px; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 3px; white-space: nowrap; }
        
        /* Пуля */
        .bullet { width: 6px; height: 6px; background: #ffff00; border-radius: 50%; position: absolute; }

        /* Таблица лидеров */
        #leaderboard { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; font-size: 12px; min-width: 120px; max-height: 120px; overflow-y: auto; }
        #leaderboard h3 { margin: 0 0 5px 0; font-size: 14px; color: #00ff00; }
        
        /* Кнопки управления (Джойстик) */
        #controls { width: 100%; height: 40%; background: #151515; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); padding: 10px; gap: 10px; }
        .btn { background: #333; border: 2px solid #555; color: white; font-size: 20px; font-weight: bold; border-radius: 10px; display: flex; align-items: center; justify-content: center; active-background: #555; }
        .btn:active { background: #555; }
        #btn-shoot { background: #cc3333; border-color: #ff5555; grid-column: 2; grid-row: 2; }
        #btn-shoot:active { background: #ff3333; }
    </style>
</head>
<body>

    <!-- Экран блокировки, если зашли через обычный браузер -->
    <div id="kick-screen">
        <h1>ДОСТУП ЗАБЛОКИРОВАН</h1>
        <p>Для защиты от читеров играть можно только напрямую через официального Telegram-бота!</p>
    </div>

    <!-- Игровой интерфейс -->
    <div id="game-container">
        <div id="arena" id="arena-map"></div>
        
        <div id="leaderboard">
            <h3>ТОП ОЧКОВ</h3>
            <div id="leader-rows"></div>
        </div>
        
        <div id="controls">
            <div></div>
            <div class="btn" onclick="move('up')">▲</div>
            <div></div>
            
            <div class="btn" onclick="move('left')">◀</div>
            <div class="btn" id="btn-shoot" onclick="shoot()">🔥</div>
            <div class="btn" onclick="move('right')">▶</div>
            
            <div></div>
            <div class="btn" onclick="move('down')">▼</div>
            <div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Расширяем на весь экран телефона

        // --- ПРОВЕРКА НА КИК ИЗ БРАУЗЕРА ---
        // Если initData пустая, значит открыли не в Телеграмме
        if (!tg.initData || tg.initData === "" || !tg.initDataUnsafe.user) {
            document.getElementById('kick-screen').style.display = 'flex';
            document.getElementById('game-container').style.display = 'none';
            throw new Error("Kicked: Not in Telegram"); 
        } else {
            // Если всё норм, пускаем в игру
            document.getElementById('kick-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
        }

        // Данные текущего игрока из Telegram
        const username = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || "Танкист";
        const myId = tg.initDataUnsafe.user.id.toString();

        // Параметры нашей игры
        const arena = document.getElementById('arena');
        let myTank = { id: myId, name: username, x: 100, y: 100, dir: 'up', score: 0 };
        let players = {};
        
        // Автоматическое подключение к единому онлайн-серверу обмена сообщениями
        // Используем демо-ключи PubNub для моментального старта мультиплеера
        const pubnub = new PubNub({
            publishKey: 'pub-c-8def65ec-527e-4b47-bc85-ca3b6e828135',
            subscribeKey: 'sub-c-5e5bc8de-1e0e-436f-b425-4c07fcbeaf60',
            userId: myId
        });

        // Подписываемся на единую комнату для всех игроков сервера
        pubnub.subscribe({ channels: ['tanks_online_global_room'] });

        // Слушаем обновление позиций других игроков
        pubnub.addListener({
            message: function(event) {
                const msg = event.message;
                
                if (msg.type === 'update' && msg.id !== myId) {
                    players[msg.id] = msg;
                    renderPlayers();
                }
                if (msg.type === 'shoot' && msg.id !== myId) {
                    spawnEnemyBullet(msg.x, msg.y, msg.dir, msg.id);
                }
                if (msg.type === 'kill') {
                    if (msg.targetId === myId) {
                        alert('Вас подбили! Очки сброшены.');
                        myTank.score = 0;
                        myTank.x = Math.floor(Math.random() * (arena.clientWidth - 40));
                        myTank.y = Math.floor(Math.random() * (arena.clientHeight - 40));
                        sendPos();
                    }
                    if (players[msg.killerId]) players[msg.killerId].score = msg.killerScore;
                    if (msg.killerId === myId) {
                        myTank.score = msg.killerScore;
                    }
                    renderPlayers();
                }
            }
        });

        // Функция отправки своих координат в сеть
        function sendPos() {
            pubnub.publish({
                channel: 'tanks_online_global_room',
                message: { type: 'update', id: myId, name: username, x: myTank.x, y: myTank.y, dir: myTank.dir, score: myTank.score }
            });
            renderPlayers();
        }

        // Движение танка кнопками
        function move(direction) {
            const step = 15;
            myTank.dir = direction;
            
            if (direction === 'up' && myTank.y > 10) myTank.y -= step;
            if (direction === 'down' && myTank.y < arena.clientHeight - 45) myTank.y += step;
            if (direction === 'left' && myTank.x > 10) myTank.x -= step;
            if (direction === 'right' && myTank.x < arena.clientWidth - 45) myTank.x += step;
            
            sendPos();
        }

        // Стрельба
        function shoot() {
            // Спавним пулю у себя на экране
            let bx = myTank.x + 12;
            let by = myTank.y + 12;
            
            // Отправляем сигнал выстрела остальным онлайн
            pubnub.publish({
                channel: 'tanks_online_global_room',
                message: { type: 'shoot', id: myId, x: bx, y: by, dir: myTank.dir }
            });

            createBullet(bx, by, myTank.dir, true, myId);
        }

        function spawnEnemyBullet(x, y, dir, ownerId) {
            createBullet(x, y, dir, false, ownerId);
        }

        // Логика полета пули и фиксации попадания
        function createBullet(x, y, dir, isMine, ownerId) {
            const b = document.createElement('div');
            b.className = 'bullet';
            b.style.left = x + 'px';
            b.style.top = y + 'px';
            arena.appendChild(b);

            let bulletInterval = setInterval(() => {
                let bx = parseInt(b.style.left);
                let by = parseInt(b.style.top);

                if (dir === 'up') by -= 8;
                if (dir === 'down') by += 8;
                if (dir === 'left') bx -= 8;
                if (dir === 'right') bx += 8;

                b.style.left = bx + 'px';
                b.style.top = by + 'px';

                // Выход за границы карты
                if (bx < 0 || bx > arena.clientWidth || by < 0 || by > arena.clientHeight) {
                    clearInterval(bulletInterval);
                    b.remove();
                }

                // Если пуля моя, проверяем попал ли я во врагов
                if (isMine) {
                    for (let id in players) {
                        let p = players[id];
                        if (bx >= p.x && bx <= p.x + 30 && by >= p.y && by <= p.y + 30) {
                            clearInterval(bulletInterval);
                            b.remove();
                            
                            // Засчитываем фраг
                            myTank.score += 1;
                            
                            // Отправляем в сеть данные об убийстве
                            pubnub.publish({
                                channel: 'tanks_online_global_room',
                                message: { type: 'kill', killerId: myId, killerScore: myTank.score, targetId: id }
                            });
                            break;
                        }
                    }
                }
            }, 30);
        }

        // Отрисовка всех танков и ТОП очков на экране
        function renderPlayers() {
            // Удаляем старые танки врагов, чтобы перерисовать
            document.querySelectorAll('.tank').forEach(el => el.remove());

            // Рисуем свой танк
            drawTank(myTank, false);

            // Собираем всех для таблицы лидеров
            let list = [{ name: username, score: myTank.score }];

            // Рисуем врагов
            for (let id in players) {
                let p = players[id];
                // Если игрок не обновлялся больше 10 секунд — удаляем его (вышел из игры)
                drawTank(p, true);
                list.push({ name: p.name, score: p.score });
            }

            // Сортируем топ по очкам
            list.sort((a, b) => b.score - a.score);
            const leaderRows = document.getElementById('leader-rows');
            leaderRows.innerHTML = '';
            list.slice(0, 5).forEach((item, index) => {
                leaderRows.innerHTML += `<div>${index+1}. ${item.name}: ${item.score}</div>`;
            });
        }

        function drawTank(t, isEnemy) {
            const el = document.createElement('div');
            el.className = 'tank' + (isEnemy ? ' enemy' : '');
            el.style.left = t.x + 'px';
            el.style.top = t.y + 'px';
            
            // Поворот дула танка
            let angle = 0;
            if (t.dir === 'up') angle = 0;
            if (t.dir === 'down') angle = 180;
            if (t.dir === 'left') angle = 270;
            if (t.dir === 'right') angle = 90;
            el.style.transform = `rotate(${angle}deg)`;

            const nameTag = document.createElement('div');
            nameTag.className = 'tank-name';
            nameTag.innerText = t.name + ` (${t.score})`;
            // Отменяем поворот текста, чтобы он читался ровно
            nameTag.style.transform = `rotate(${-angle}deg)`; 
            el.appendChild(nameTag);

            arena.appendChild(el);
        }

        // При старте отправляем первую позицию
        setTimeout(() => { sendPos(); }, 500);
    </script>
</body>
</html>
