<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIKY AI ULTIMATE ✨</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root { --bg: #030712; --panel: rgba(17, 24, 39, 0.85); --accent: #8b5cf6; --text: #f3f4f6; --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; height: 100dvh; overflow: hidden; display: flex; width: 100vw; }

        /* Sidebar & Menu */
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: var(--panel); backdrop-filter: blur(25px); z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.7); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1500; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        /* Model Switcher */
        .model-selector { display: flex; gap: 8px; padding: 10px 20px; background: rgba(3, 7, 18, 0.4); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .model-btn { padding: 6px 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .model-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }

        /* Chat Container */
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; scroll-behavior: smooth; }
        .msg { padding: 14px 18px; border-radius: 22px; max-width: 85%; font-size: 15px; line-height: 1.6; position: relative; animation: slide 0.2s ease-out; }
        @keyframes slide { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3); }
        .ai { background: rgba(31, 41, 55, 0.7); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        
        /* Mic & Input */
        .input-area { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 700px; background: rgba(31, 41, 55, 0.95); backdrop-filter: blur(25px); border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input { flex: 1; background: transparent; border: none; color: white; height: 55px; font-size: 16px; padding: 0 10px; }
        .btn-icon { background: none; border: none; color: white; cursor: pointer; font-size: 22px; padding: 10px; transition: 0.2s; }
        #micBtn.active { color: #ef4444; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }

        /* Floating Mic Label */
        #mic-status { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.95); color: white; padding: 15px 30px; border-radius: 50px; z-index: 3000; font-weight: 800; box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translate(-50%, -45%); } to { transform: translate(-50%, -55%); } }

        /* Login & PRO */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .google-btn { background: white; color: black; padding: 16px 35px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; width: 280px; margin-top: 20px; font-size: 16px; }
        
        .chat-item { padding: 14px; margin: 5px 12px; background: rgba(255,255,255,0.03); border-radius: 15px; cursor: pointer; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; transition: 0.2s; }
        .chat-item.active { border-color: var(--accent); background: rgba(139, 92, 246, 0.1); }
    </style>
</head>
<body>

    <div id="mic-status">🎙 СЛУШАЮ... СӨЙЛЕҢІЗ...</div>

    <div id="login-screen">
        <div style="font-size: 100px; filter: drop-shadow(0 0 20px var(--accent));">⚡</div>
        <h1 style="font-size: 42px; margin: 10px 0;">FLIKY AI</h1>
        <button class="google-btn" onclick="loginWithGoogle()">Войти через Google</button>
        <button class="google-btn" onclick="loginAsGuest()" style="background:transparent; color:white; border:1px solid rgba(255,255,255,0.2); margin-top:10px;">Войти как гость</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div style="padding: 30px 20px; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:24px;">FLIKY</b>
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:28px;">✕</button>
        </div>
        <button onclick="createNewChat()" style="margin: 0 20px 20px 20px; padding: 16px; background:var(--accent); border:none; border-radius:15px; color:white; font-weight:800; cursor:pointer; font-size:15px;">+ Новый чат</button>
        <div id="chatList" style="flex:1; overflow-y:auto;"></div>
        <button onclick="logout()" style="padding:25px; color:#f87171; background:none; border:none; font-weight:700; cursor:pointer;">Выйти</button>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; position:relative;">
        <div style="height:70px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; background: rgba(3,7,18,0.6); backdrop-filter:blur(15px);">
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:26px; cursor:pointer;">☰</button>
            <span style="margin-left:20px; font-weight:700; font-size:22px;">FLIKY AI</span>
        </div>

        <div class="model-selector" id="modelSelector">
            <button class="model-btn active" onclick="selectModel('mini', this)">⚡ Mini</button>
            <button class="model-btn" onclick="selectModel('pro', this)">🧠 Pro</button>
            <button class="model-btn" onclick="selectModel('vision', this)">👁 Vision</button>
        </div>

        <div id="chat" class="chat-container"></div>

        <div id="preview-wrap" style="display:none; position:absolute; bottom:95px; left:20px; background:#1f2937; padding:10px; border-radius:18px; border:1px solid var(--accent); z-index:100;">
            <img id="preview-img" src="" style="height:70px; border-radius:10px;">
            <button onclick="clearImage()" style="color:#ef4444; background:none; border:none; font-weight:bold; margin-left:10px; cursor:pointer; font-size:20px;">✕</button>
        </div>

        <div class="input-area">
            <label style="cursor:pointer; padding:10px; font-size:24px;">📷<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)"></label>
            <button class="btn-icon" id="micBtn" onclick="toggleMic()">🎤</button>
            <input type="text" id="userInput" placeholder="Спроси о чем угодно..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-icon" onclick="send()" style="color:var(--accent); font-size:28px;">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyClnvxC1lgvrxn-m7X1huqNmvtH7HaYsxU", authDomain: "flikyfloky-61eed.firebaseapp.com", projectId: "flikyfloky-61eed", storageBucket: "flikyfloky-61eed.firebasestorage.app", messagingSenderId: "167396726913", appId: "1:167396726913:web:871fb5bc1cf4eca509d580" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const _k = "gsk_Ui06zHrORxYH5" + "spkmge9WGdyb3FYiPY" + "yl9VgOfBu1jgvLLvsm6I8";
        
        let currentUser = null, chats = [], activeChatId = null, base64Image = null;
        let selectedModelKey = 'mini';

        const models = {
            'mini': 'llama-3.1-8b-instant',
            'pro': 'llama-3.3-70b-versatile',
            'vision': 'llama-3.2-11b-vision-preview'
        };

        function selectModel(key, btn) {
            selectedModelKey = key;
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // --- MICROPHONE ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if(recognition) {
            recognition.lang = 'ru-RU';
            recognition.onstart = () => { 
                document.getElementById('micBtn').classList.add('active'); 
                document.getElementById('mic-status').style.display = 'block';
            };
            recognition.onend = () => { 
                document.getElementById('micBtn').classList.remove('active'); 
                document.getElementById('mic-status').style.display = 'none';
            };
            recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
        }
        function toggleMic() { if(recognition) recognition.start(); else alert("Микрофон не поддерживается"); }

        // --- AUTH ---
        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function loginAsGuest() { currentUser = { uid: 'guest', isGuest: true }; startApp(); }
        auth.onAuthStateChanged(user => { if(user) { currentUser = user; startApp(); } });
        function logout() { auth.signOut().then(() => location.reload()); }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            loadChats();
        }

        function loadChats() {
            if(currentUser.isGuest) return;
            chats = JSON.parse(localStorage.getItem(`chats_${currentUser.uid}`)) || [];
            if(chats.length > 0) { activeChatId = chats[0].id; renderMessages(); renderChatList(); }
        }
        function saveChats() { if(!currentUser.isGuest) localStorage.setItem(`chats_${currentUser.uid}`, JSON.stringify(chats)); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function createNewChat() { activeChatId = Date.now(); chats.unshift({ id: activeChatId, title: "Новый чат", messages: [] }); renderChatList(); renderMessages(); }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text && !base64Image) return;

            if(!activeChatId) createNewChat();
            const chat = chats.find(c => c.id === activeChatId);
            const currentImg = base64Image;
            
            chat.messages.push({ role: 'user', content: text, image: currentImg });
            if(chat.title === "Новый чат") chat.title = text.substring(0, 25);
            
            input.value = ''; clearImage(); renderMessages();

            const aiMsg = { role: 'assistant', content: '' };
            chat.messages.push(aiMsg);
            const container = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg ai';
            container.appendChild(msgDiv);

            try {
                // Если есть картинка, форсируем модель Vision
                const finalModel = currentImg ? models['vision'] : models[selectedModelKey];
                
                let bodyMessages = [{role: "system", content: "Ты FLIKY AI. Отвечай на языке пользователя. Если он пишет на казахском - отвечай на казахском."}];
                
                if(currentImg) {
                    bodyMessages.push({
                        role: "user",
                        content: [
                            { type: "text", text: text || "Что на картинке?" },
                            { type: "image_url", image_url: { url: currentImg } }
                        ]
                    });
                } else {
                    chat.messages.slice(-8).forEach(m => bodyMessages.push({role: m.role, content: m.content}));
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${_k}` },
                    body: JSON.stringify({ model: finalModel, messages: bodyMessages, temperature: 0.7 })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                const result = data.choices[0].message.content;
                let i = 0;
                const timer = setInterval(() => {
                    if(i < result.length) {
                        aiMsg.content += result.charAt(i++);
                        msgDiv.innerHTML = marked.parse(aiMsg.content);
                        container.scrollTop = container.scrollHeight;
                    } else { clearInterval(timer); saveChats(); }
                }, 12);

            } catch (e) { 
                aiMsg.content = "⚠️ Ошибка модели: " + e.message + ". Попробуйте переключить модель сверху."; 
                msgDiv.innerHTML = aiMsg.content;
            }
        }

        function renderMessages() {
            const container = document.getElementById('chat'); container.innerHTML = '';
            const chat = chats.find(c => c.id === activeChatId);
            if(!chat) return;
            chat.messages.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role==='user'?'user':'ai'}`;
                let content = m.image ? `<img src="${m.image}" style="width:100%; border-radius:12px; margin-bottom:10px;"><br>` : '';
                content += marked.parse(m.content || '');
                d.innerHTML = content;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderChatList() {
            const list = document.getElementById('chatList'); list.innerHTML = '';
            chats.forEach(c => {
                const d = document.createElement('div'); 
                d.className = `chat-item ${c.id === activeChatId ? 'active' : ''}`;
                d.innerText = c.title; d.onclick = () => { activeChatId = c.id; renderMessages(); toggleMenu(); renderChatList(); };
                list.appendChild(d);
            });
        }

        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                base64Image = e.target.result;
                document.getElementById('preview-img').src = base64Image;
                document.getElementById('preview-wrap').style.display = 'block';
                selectModel('vision', document.querySelectorAll('.model-btn')[2]);
            };
            reader.readAsDataURL(input.files[0]);
        }
        function clearImage() { base64Image = null; document.getElementById('preview-wrap').style.display = 'none'; }
    </script>
</body>
</html>
