<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DICEGRAM - TikTok</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Хедер с подписками */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 12px 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            gap: 16px;
            font-size: 14px;
            font-weight: 500;
        }

        .header-left span.active {
            color: #fff;
        }

        .header-left span {
            color: #888;
            cursor: pointer;
        }

        .header-right {
            display: flex;
            gap: 16px;
            font-size: 20px;
        }

        .header-right span {
            cursor: pointer;
        }

        /* Основной контейнер видео */
        .video-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .video-container::-webkit-scrollbar {
            display: none;
        }

        .video-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Плейсхолдер для видео */
        .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            text-align: center;
            padding: 40px;
        }

        .video-placeholder .icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .video-placeholder h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .video-placeholder p {
            font-size: 14px;
            color: #888;
            max-width: 280px;
        }

        /* Информация под видео */
        .video-info {
            position: absolute;
            bottom: 100px;
            left: 16px;
            right: 80px;
            z-index: 10;
        }

        .video-info .username {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-info .username .verified {
            color: #38bdf8;
            font-size: 14px;
        }

        .video-info .description {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.4;
        }

        /* Правая боковая панель действий */
        .video-actions {
            position: absolute;
            right: 16px;
            bottom: 120px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.8);
        }

        .action-btn .icon {
            font-size: 28px;
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn .count {
            font-size: 12px;
            color: #fff;
        }

        /* Аватар в видео */
        .video-avatar {
            position: absolute;
            bottom: 180px;
            right: 16px;
            z-index: 10;
        }

        .video-avatar img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #fff;
            object-fit: cover;
        }

        /* Кнопка + внизу */
        .fab-plus {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4);
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab-plus:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 env(safe-area-inset-bottom);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #888;
            font-size: 10px;
            cursor: pointer;
            transition: color 0.3s;
            padding: 4px 12px;
        }

        .nav-item.active {
            color: #fff;
        }

        .nav-item .icon {
            font-size: 22px;
        }

        .nav-item .badge {
            background: #ff3b30;
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            position: absolute;
            top: -4px;
            right: -8px;
        }

        .nav-item {
            position: relative;
        }

        /* Модальное окно публикации */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: slideUp 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-content {
            background: #1a1a2e;
            width: 100%;
            max-height: 80vh;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header h3 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
            margin-bottom: 16px;
        }

        .upload-area:hover {
            border-color: #38bdf8;
        }

        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-area p {
            color: #888;
            font-size: 14px;
        }

        .upload-area .sub {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .modal-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 16px;
            resize: vertical;
            min-height: 80px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .modal-btn:active {
            opacity: 0.7;
        }

        .modal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Секция выбора медиа */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .media-grid .media-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            position: relative;
        }

        .media-grid .media-item img,
        .media-grid .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-grid .media-item .check {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #38bdf8;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .file-input-hidden {
            display: none;
        }

        /* Профиль */
        .profile-screen {
            display: none;
            height: 100vh;
            overflow-y: auto;
            padding-top: 60px;
            background: #000;
        }

        .profile-screen.active {
            display: block;
        }

        .profile-header {
            padding: 20px;
            text-align: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .profile-avatar-big {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #38bdf8;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 600;
        }

        .profile-username {
            color: #888;
            font-size: 14px;
            margin-top: 2px;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 16px 20px;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .profile-stats .stat {
            text-align: center;
        }

        .profile-stats .stat .num {
            font-size: 18px;
            font-weight: 600;
        }

        .profile-stats .stat .label {
            font-size: 12px;
            color: #888;
        }

        .profile-posts {
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .profile-posts .post-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .profile-posts .post-item img,
        .profile-posts .post-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-posts .post-item .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            opacity: 0.7;
        }

        .empty-posts {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-posts .icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Скрытые элементы */
        .hidden {
            display: none !important;
        }

        /* Адаптация под Telegram */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
    </style>
</head>
<body>

    <!-- Хедер -->
    <div class="header">
        <div class="header-left">
            <span class="active" onclick="switchFeed('following')">Подписки</span>
            <span onclick="switchFeed('recommended')">Рекомендации</span>
        </div>
        <div class="header-right">
            <span>🔍</span>
            <span>📱</span>
        </div>
    </div>

    <!-- Контейнер видео -->
    <div class="video-container" id="videoContainer">
        <!-- Видео будут добавляться динамически -->
    </div>

    <!-- Кнопка + -->
    <button class="fab-plus" onclick="openUploadModal()">+</button>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('feed')">
            <span class="icon">🏠</span>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="switchTab('friends')">
            <span class="icon">👥</span>
            <span>Друзья</span>
        </div>
        <div class="nav-item" onclick="switchTab('inbox')">
            <span class="icon">💬</span>
            <span>Входящие</span>
            <span class="badge">10</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile')">
            <span class="icon">👤</span>
            <span>Профиль</span>
        </div>
    </div>

    <!-- Профиль -->
    <div class="profile-screen" id="profileScreen">
        <div class="profile-header">
            <img class="profile-avatar-big" id="profileAvatar" src="" alt="Avatar">
            <div class="profile-name" id="profileName">Имя Фамилия</div>
            <div class="profile-username" id="profileUsername">@username</div>
        </div>
        <div class="profile-stats">
            <div class="stat">
                <div class="num" id="followersCount">0</div>
                <div class="label">Подписчики</div>
            </div>
            <div class="stat">
                <div class="num" id="followingCount">0</div>
                <div class="label">Подписки</div>
            </div>
            <div class="stat">
                <div class="num" id="likesCount">0</div>
                <div class="label">Лайки</div>
            </div>
        </div>
        <div class="profile-posts" id="profilePosts">
            <!-- Посты пользователя -->
        </div>
    </div>

    <!-- Модальное окно публикации -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новая публикация</h3>
                <button class="modal-close" onclick="closeUploadModal()">✕</button>
            </div>

            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="icon">📤</div>
                <p>Нажмите чтобы выбрать фото или видео</p>
                <div class="sub">Можно выбрать до 35 файлов</div>
            </div>

            <input type="file" id="fileInput" class="file-input-hidden" accept="image/*,video/*" multiple>

            <div class="media-grid" id="mediaGrid"></div>

            <textarea class="modal-input" id="postDescription" placeholder="Описание публикации..."></textarea>

            <button class="modal-btn" id="publishBtn" onclick="publishPost()">Опубликовать</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Данные пользователя
        const tgUser = tg.initDataUnsafe?.user || {
            id: Date.now(),
            first_name: 'Пользователь',
            last_name: '',
            username: 'user',
            photo_url: ''
        };

        const currentUser = {
            id: String(tgUser.id),
            name: `${tgUser.first_name} ${tgUser.last_name || ''}`.trim() || 'Пользователь',
            username: tgUser.username || `user${tgUser.id}`,
            avatar: tgUser.photo_url || `https://ui-avatars.com/api/?name=${tgUser.first_name}&background=38bdf8&color=fff&size=80`
        };

        // Состояние
        let posts = [];
        let currentFeed = 'following';
        let selectedFiles = [];
        let currentTab = 'feed';

        // === ЗАГРУЗКА ДАННЫХ ИЗ LOCALSTORAGE ===
        function loadData() {
            try {
                const saved = localStorage.getItem('dicegram_posts');
                if (saved) {
                    posts = JSON.parse(saved);
                }
            } catch (e) {
                posts = [];
            }
            renderFeed();
            renderProfile();
        }

        function saveData() {
            try {
                localStorage.setItem('dicegram_posts', JSON.stringify(posts));
            } catch (e) {
                console.error('Save error:', e);
            }
        }

        // === ОТОБРАЖЕНИЕ ЛЕНТЫ ===
        function renderFeed() {
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';

            const filteredPosts = currentFeed === 'following' ?
                posts.filter(p => p.userId === currentUser.id) :
                posts;

            if (filteredPosts.length === 0) {
                container.innerHTML = `
                    <div class="video-item">
                        <div class="video-placeholder">
                            <div class="icon">🎬</div>
                            <h3>Нет видео</h3>
                            <p>${currentFeed === 'following' ? 'Вы еще не выложили ни одного видео. Нажмите + чтобы создать публикацию!' : 'Пока нет рекомендаций. Подпишитесь на интересных авторов!'}</p>
                        </div>
                    </div>
                `;
                return;
            }

            filteredPosts.forEach((post, index) => {
                const item = document.createElement('div');
                item.className = 'video-item';

                const isVideo = post.type === 'video';

                item.innerHTML = `
                    ${isVideo ? `
                        <video src="${post.file}" loop muted playsinline></video>
                    ` : `
                        <img src="${post.file}" alt="Post" style="width:100%;height:100%;object-fit:cover;">
                    `}
                    <div class="video-info">
                        <div class="username">
                            ${post.userName || 'Пользователь'}
                            ${post.verified ? '<span class="verified">●</span>' : ''}
                        </div>
                        <div class="description">${post.description || ''}</div>
                    </div>
                    <div class="video-avatar">
                        <img src="${post.userAvatar || 'https://ui-avatars.com/api/?name=User&background=38bdf8&color=fff&size=48'}" alt="avatar">
                    </div>
                    <div class="video-actions">
                        <div class="action-btn" onclick="handleLike('${post.id}')">
                            <div class="icon">❤️</div>
                            <div class="count">${post.likes || 0}</div>
                        </div>
                        <div class="action-btn" onclick="handleComment('${post.id}')">
                            <div class="icon">💬</div>
                            <div class="count">${post.comments || 0}</div>
                        </div>
                        <div class="action-btn" onclick="handleShare('${post.id}')">
                            <div class="icon">↗️</div>
                            <div class="count">${post.shares || 0}</div>
                        </div>
                    </div>
                `;

                container.appendChild(item);

                // Автовоспроизведение видео при появлении
                if (isVideo) {
                    const video = item.querySelector('video');
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                video.play();
                            } else {
                                video.pause();
                            }
                        });
                    }, { threshold: 0.5 });
                    observer.observe(video);
                }
            });
        }

        // === ПРОФИЛЬ ===
        function renderProfile() {
            document.getElementById('profileAvatar').src = currentUser.avatar;
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileUsername').textContent = `@${currentUser.username}`;

            const userPosts = posts.filter(p => p.userId === currentUser.id);
            const totalLikes = userPosts.reduce((sum, p) => sum + (p.likes || 0), 0);

            document.getElementById('followersCount').textContent = userPosts.length;
            document.getElementById('followingCount').textContent = Math.floor(userPosts.length / 2);
            document.getElementById('likesCount').textContent = totalLikes;

            const container = document.getElementById('profilePosts');
            container.innerHTML = '';

            if (userPosts.length === 0) {
                container.innerHTML = `
                    <div class="empty-posts">
                        <div class="icon">📸</div>
                        <p>У вас пока нет публикаций</p>
                        <p style="font-size:12px;color:#666;">Нажмите + чтобы создать</p>
                    </div>
                `;
                return;
            }

            userPosts.forEach(post => {
                const item = document.createElement('div');
                item.className = 'post-item';
                const isVideo = post.type === 'video';
                item.innerHTML = `
                    ${isVideo ? `
                        <video src="${post.file}" style="width:100%;height:100%;object-fit:cover;"></video>
                        <div class="play-icon">▶️</div>
                    ` : `
                        <img src="${post.file}" alt="Post" style="width:100%;height:100%;object-fit:cover;">
                    `}
                `;
                container.appendChild(item);
            });
        }

        // === ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ===
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            if (tab === 'feed') {
                document.querySelector('.video-container').style.display = 'block';
                document.getElementById('profileScreen').classList.remove('active');
                document.querySelectorAll('.nav-item')[0].classList.add('active');
            } else if (tab === 'profile') {
                document.querySelector('.video-container').style.display = 'none';
                document.getElementById('profileScreen').classList.add('active');
                document.querySelectorAll('.nav-item')[3].classList.add('active');
                renderProfile();
            } else if (tab === 'friends') {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                tg.showAlert('👥 Список друзей в разработке');
            } else if (tab === 'inbox') {
                document.querySelectorAll('.nav-item')[2].classList.add('active');
                tg.showAlert('💬 Входящие сообщения');
            }
        }

        function switchFeed(feed) {
            currentFeed = feed;
            document.querySelectorAll('.header-left span').forEach(el => el.classList.remove('active'));
            if (feed === 'following') {
                document.querySelector('.header-left span:first-child').classList.add('active');
            } else {
                document.querySelector('.header-left span:last-child').classList.add('active');
            }
            renderFeed();
        }

        // === ПУБЛИКАЦИЯ ===
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
            document.getElementById('fileInput').value = '';
            document.getElementById('mediaGrid').innerHTML = '';
            document.getElementById('postDescription').value = '';
            selectedFiles = [];
            document.getElementById('publishBtn').disabled = false;
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            selectedFiles = files;
            const grid = document.getElementById('mediaGrid');
            grid.innerHTML = '';

            files.forEach((file, index) => {
                const url = URL.createObjectURL(file);
                const item = document.createElement('div');
                item.className = 'media-item';

                if (file.type.startsWith('video/')) {
                    item.innerHTML = `
                        <video src="${url}" style="width:100%;height:100%;object-fit:cover;"></video>
                        <div class="check">✓</div>
                    `;
                } else {
                    item.innerHTML = `
                        <img src="${url}" alt="Selected">
                        <div class="check">✓</div>
                    `;
                }

                grid.appendChild(item);
            });

            document.getElementById('uploadArea').querySelector('p').textContent =
                `Выбрано ${files.length} файлов`;
        });

        function publishPost() {
            if (selectedFiles.length === 0) {
                tg.showAlert('⚠️ Выберите хотя бы одно фото или видео');
                return;
            }

            const description = document.getElementById('postDescription').value.trim();

            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.textContent = 'Публикация...';

            // Симуляция загрузки
            setTimeout(() => {
                selectedFiles.forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const post = {
                            id: `post_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`,
                            userId: currentUser.id,
                            userName: currentUser.name,
                            userAvatar: currentUser.avatar,
                            verified: true,
                            file: e.target.result,
                            type: file.type.startsWith('video/') ? 'video' : 'image',
                            description: description || 'Новая публикация',
                            likes: 0,
                            comments: 0,
                            shares: 0,
                            timestamp: Date.now()
                        };

                        posts.unshift(post);
                        saveData();
                        renderFeed();

                        if (currentTab === 'profile') {
                            renderProfile();
                        }

                        tg.showAlert('✅ Публикация успешно создана!');
                    };
                    reader.readAsDataURL(file);
                });

                closeUploadModal();
                btn.disabled = false;
                btn.textContent = 'Опубликовать';
            }, 1500);
        }

        // === ДЕЙСТВИЯ С ПОСТАМИ ===
        function handleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.likes = (post.likes || 0) + 1;
                saveData();
                renderFeed();
                if (currentTab === 'profile') renderProfile();
            }
        }

        function handleComment(postId) {
            tg.showAlert('💬 Функция комментариев будет добавлена в следующей версии!');
        }

        function handleShare(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.shares = (post.shares || 0) + 1;
                saveData();
                renderFeed();
                tg.showAlert('🔗 Ссылка скопирована в буфер обмена!');
            }
        }

        // === ИНИЦИАЛИЗАЦИЯ ===
        loadData();

        // Восстановление вкладки
        switchTab('feed');

        // Закрытие модалки по клику на оверлей
        document.getElementById('uploadModal').addEventListener('click', function(e) {
            if (e.target === this) closeUploadModal();
        });

        console.log('🚀 DICEGRAM TikTok запущен!');
        console.log('👤 Пользователь:', currentUser);
        console.log('📊 Постов в базе:', posts.length);
    </script>

</body>
