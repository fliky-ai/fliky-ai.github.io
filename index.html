<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICEGRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0e1621;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .app-container {
            background: #17212b;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }
        h2 { color: #5288c1; margin-bottom: 10px; }
        p { color: #7f91a4; margin-bottom: 20px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #243143;
            border-radius: 8px;
            background: #242f3d;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #5288c1;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* ЧАТ */
        #chat-screen { justify-content: flex-end; padding: 0; }
        .header {
            width: 100%;
            background: #242f3d;
            padding: 15px;
            font-weight: bold;
            border-bottom: 1px solid #101921;
        }
        .messages-box {
            width: 100%;
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            background: #182533;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 80%;
            align-self: flex-start;
            word-break: break-word;
        }
        .msg.my {
            background: #2b5278;
            align-self: flex-end;
        }
        .msg-sender { font-size: 11px; color: #5288c1; margin-bottom: 3px; }
        .input-area {
            width: 100%;
            display: flex;
            padding: 10px;
            background: #242f3d;
            gap: 10px;
        }
        .input-area input { margin-bottom: 0; flex: 1; }
        .input-area button { width: auto; padding: 0 20px; }
        #server-status { padding: 8px; font-size: 12px; background: #242f3d; width: 100%; text-align: center;}
    </style>
</head>
<body>

<div class="app-container">
    <div id="server-status" style="color: #e6a23c;">Проверка соединения...</div>

    <div id="phone-screen" class="screen hidden">
        <h2>DICEGRAM</h2>
        <p>Введите номер телефона для авторизации</p>
        <input type="tel" id="phone-input" placeholder="+77071234567">
        <button onclick="sendPhone()">Получить код в ТГ</button>
    </div>

    <div id="code-screen" class="screen hidden">
        <h2>Введите код</h2>
        <p>Бот отправил вам секретный код в чат Telegram</p>
        <input type="text" id="code-input" placeholder="Код из бота">
        <button onclick="sendCode()">Войти</button>
    </div>

    <div id="chat-screen" class="screen hidden">
        <div class="header">Общий чат DICEGRAM 🎲</div>
        <div class="messages-box" id="messages-container"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Напишите сообщение...">
            <button onclick="sendMsg()">Отправить</button>
        </div>
    </div>
</div>

<script>
    // Инициализируем Telegram WebApp API
    const tg = window.Telegram.WebApp;
    tg.expand(); // Раскрываем на весь экран
    
    // Получаем ID юзера из Телеграма
    const myTgId = tg.initDataUnsafe?.user?.id || "8771009385"; 

    // Подключение к твоему хостингу (используем wss)
    const socket = new WebSocket('wss://a38499-be46.m.jrnm.app');
    const statusBox = document.getElementById('server-status');

    socket.onopen = () => {
        statusBox.innerText = 'Сервер DICEGRAM онлайн';
        statusBox.style.color = '#4caf50';
        document.getElementById('phone-screen').classList.remove('hidden');
    };

    socket.onclose = () => {
        statusBox.innerText = 'СЕРВЕР ОТКЛЮЧЕН. DICEGRAM недоступен.';
        statusBox.style.color = '#f56c6c';
        hideAllScreens();
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        if (data.status === 'code_sent') {
            hideAllScreens();
            document.getElementById('code-screen').classList.remove('hidden');
        } 
        else if (data.status === 'success') {
            hideAllScreens();
            document.getElementById('chat-screen').classList.remove('hidden');
            // Отображаем старую историю сообщений из базы данных
            data.messages.forEach(m => appendMessage(m.sender, m.text));
        } 
        else if (data.status === 'new_message') {
            appendMessage(data.sender, data.text);
        }
        else if (data.status === 'error') {
            alert(data.message);
        }
    };

    function sendPhone() {
        const phone = document.getElementById('phone-input').value;
        if (!phone) return alert('Введите номер!');
        socket.send(JSON.stringify({ action: 'send_phone', phone: phone, tg_id: myTgId }));
    }

    function sendCode() {
        const code = document.getElementById('code-input').value;
        if (!code) return alert('Введите код!');
        socket.send(JSON.stringify({ action: 'send_code', code: code }));
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        socket.send(JSON.stringify({ action: 'send_msg', text: input.value }));
        input.value = '';
    }

    function appendMessage(sender, text) {
        const container = document.getElementById('messages-container');
        const msgDiv = document.createElement('div');
        
        // Если отправитель — это наш ID, красим в синий и прижимаем вправо
        const isMy = String(sender) === String(myTgId);
        msgDiv.className = `msg ${isMy ? 'my' : ''}`;
        
        msgDiv.innerHTML = `
            <div class="msg-sender">ID: ${sender}</div>
            <div class="msg-text">${text}</div>
        `;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight; // Скролл вниз
    }

    function hideAllScreens() {
        document.getElementById('phone-screen').classList.add('hidden');
        document.getElementById('code-screen').classList.add('hidden');
        document.getElementById('chat-screen').classList.add('hidden');
    }
</script>

</body>
</html>
