<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Танки Онлайн: Кибер-Арена</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pubnub/7.2.1/pubnub.min.js"></script>
    
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* Экран блокировки вне TG */
        #kick-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: #000; text-align: center; padding: 20px; z-index: 9999; position: absolute; }
        #kick-screen h1 { color: #ff0055; text-transform: uppercase; letter-spacing: 3px; font-size: 24px; margin-bottom: 10px; text-shadow: 0 0 10px #ff0055; }
        #kick-screen p { color: #888; font-size: 14px; }
        
        #game-container { display: none; width: 100%; height: 100%; position: relative; background: #000; }
        
        /* Уведомления (Системный лог) */
        #notifications { position: absolute; top: 12px; left: 12px; z-index: 100; display: flex; flex-direction: column; gap: 6px; pointer-events: none; max-width: 60%; }
        .toast { background: rgba(5, 5, 5, 0.85); border-left: 3px solid #00ffaa; border-top: 1px solid #222; border-right: 1px solid #222; border-bottom: 1px solid #222; padding: 6px 12px; border-radius: 0 6px 6px 0; font-size: 11px; color: #00ffaa; animation: fadeout 4s forwards; font-family: monospace; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        @keyframes fadeout { 0% { opacity: 1; transform: translateX(-10px); } 10% { transform: translateX(0); } 85% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }

        /* Игровая Арена */
        #arena { width: 100%; height: 55%; background-color: #0a0a0a; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; border-bottom: 2px solid #1a1a1a; position: relative; overflow: hidden; }
        
        /* КИБЕР-ТАНК С ВИНИЛАМИ */
        .tank { width: 36px; height: 36px; position: absolute; z-index: 10; transition: transform 0.1s ease-out, left 0.08s linear, top 0.08s linear; }
        
        /* Корпус танка */
        .tank-body { width: 100%; height: 100%; background: #111; border: 2px solid #00ffaa; border-radius: 6px; position: relative; box-shadow: 0 0 12px rgba(0, 255, 170, 0.4); background-image: linear-gradient(45deg, #111 25%, #1a1a1a 25%, #1a1a1a 50%, #111 50%, #111 75%, #1a1a1a 75%, #1a1a1a 100%); background-size: 10px 10px; }
        /* Кастомный винил (акценты) */
        .tank-body::before { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 1px dashed #00ffaa; opacity: 0.7; border-radius: 3px; }
        /* Гусеницы левая/правая */
        .tank-tracks-l { position: absolute; width: 6px; height: 100%; background: #222; border: 1px solid #333; left: -5px; top: 0; border-radius: 2px; background-image: linear-gradient(#000 2px, transparent 2px); background-size: 100% 4px; }
        .tank-tracks-r { position: absolute; width: 6px; height: 100%; background: #222; border: 1px solid #333; right: -5px; top: 0; border-radius: 2px; background-image: linear-gradient(#000 2px, transparent 2px); background-size: 100% 4px; }
        /* Башня и пушка */
        .tank-turret { position: absolute; width: 16px; height: 16px; background: #151515; border: 2px solid #00ffaa; top: 10px; left: 10px; border-radius: 50%; z-index: 2; }
        .tank-gun { position: absolute; width: 4px; height: 18px; background: #00ffaa; top: -16px; left: 4px; border-radius: 2px; box-shadow: 0 0 8px #00ffaa; }
        
        /* Стилизация вражеского танка */
        .tank.enemy .tank-body { border-color: #ff0055; box-shadow: 0 0 12px rgba(255, 0, 85, 0.4); }
        .tank.enemy .tank-body::before { border-color: #ff0055; }
        .tank.enemy .tank-turret { border-color: #ff0055; }
        .tank.enemy .tank-gun { background: #ff0055; box-shadow: 0 0 8px #ff0055; }

        /* Никнейм над танком */
        .tank-name { position: absolute; top: -24px; left: 50%; transform: translateX(-50%); font-size: 9px; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 4px; white-space: nowrap; font-family: monospace; font-weight: bold; color: #fff; letter-spacing: 0.5px; }
        .tank.enemy .tank-name { color: #ffbfcc; }

        /* Эффект выстрела (вспышка) */
        .muzzle-flash { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: -22px; left: 0px; box-shadow: 0 0 15px 5px #ffcc00; opacity: 0; pointer-events: none; }

        /* Плазменный снаряд */
        .bullet { width: 6px; height: 6px; background: #fff; box-shadow: 0 0 10px #fff, 0 0 20px #ff0055; border-radius: 50%; position: absolute; z-index: 5; }

        /* Радар (Мини-карта) */
        #minimap { position: absolute; bottom: 12px; left: 12px; width: 85px; height: 85px; background: rgba(5, 5, 5, 0.85); border: 1px dashed rgba(255,255,255,0.2); z-index: 50; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        #minimap::before { content: 'RADAR'; position: absolute; top: -14px; left: 2px; font-size: 8px; color: #666; font-family: monospace; }
        .map-dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px currentColor; }

        /* Таблица лидеров (Cyber TOП) */
        #leaderboard { position: absolute; top: 12px; right: 12px; background: rgba(5, 5, 5, 0.85); border: 1px solid #222; padding: 8px 12px; border-radius: 8px; font-size: 11px; min-width: 120px; z-index: 50; font-family: monospace; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        #leaderboard h3 { margin: 0 0 6px 0; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .leader-row { display: flex; justify-content: space-between; margin-bottom: 3px; color: #ccc; }
        .leader-row.me { color: #00ffaa; font-weight: bold; }
        
        /* ПУЛЬТ УПРАВЛЕНИЯ (ДЖОЙСТИК) */
        #controls-container { width: 100%; height: 45%; background: #09090b; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; border-top: 1px solid #18181b; }
        
        .grid-pad { display: grid; grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(3, 80px); gap: 12px; }
        
        .btn-dir { background: linear-gradient(135deg, #18181b, #27272a); border: 1px solid #3f3f46; color: #f4f4f5; font-size: 24px; border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); transform: translateZ(0); transition: background 0.1s, transform 0.05s; }
        .btn-dir:active { background: #3f3f46; transform: scale(0.95); border-color: #71717a; }
        
        /* Центральная кнопка ОГОНЬ */
        #btn-shoot { background: linear-gradient(135deg, #7f1d1d, #b91c1c); border: 1px solid #ef4444; grid-column: 2; grid-row: 2; color: #fff; font-size: 28px; border-radius: 50%; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        #btn-shoot:active { background: #ef4444; box-shadow: 0 0 25px #ef4444; transform: scale(0.92); }
        
        /* Пустые зоны пада */
        .empty-slot { pointer-events: none; }
    </style>
</head>
<body>

    <!-- Защитный экран вне Telegram -->
    <div id="kick-screen">
        <h1>Вход заблокирован</h1>
        <p>Запустите игру через официального Telegram-бота.</p>
    </div>

    <!-- Игровой интерфейс -->
    <div id="game-container">
        <div id="notifications"></div>
        <div id="arena"></div>
        <div id="minimap"></div>
        
        <div id="leaderboard">
            <h3>SCOREBOARD</h3>
            <div id="leader-rows"></div>
        </div>
        
        <!-- Пульт управления -->
        <div id="controls-container">
            <div class="grid-pad">
                <div class="empty-slot"></div>
                <div class="btn-dir" id="pad-up">▲</div>
                <div class="empty-slot"></div>
                
                <div class="btn-dir" id="pad-left">◀</div>
                <div class="btn-dir" id="btn-shoot">🔥</div>
                <div class="btn-dir" id="pad-right">▶</div>
                
                <div class="empty-slot"></div>
                <div class="btn-dir" id="pad-down">▼</div>
                <div class="empty-slot"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); 

        // Защитная верификация сессии Telegram
        if (!tg.initData || tg.initData === "") {
            document.getElementById('kick-screen').style.display = 'flex';
            document.getElementById('game-container').style.display = 'none';
        } else {
            document.getElementById('kick-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            initCyberGame();
        }

        function notify(text) {
            const container = document.getElementById('notifications');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4000);
        }

        function initCyberGame() {
            const username = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || "Танкист";
            const myId = tg.initDataUnsafe?.user?.id?.toString() || "player_" + Math.floor(Math.random() * 100000);

            const arena = document.getElementById('arena');
            const minimap = document.getElementById('minimap');
            
            // Настройки размеров танка
            const TANK_SIZE = 36;
            
            // Локальный стейт нашего танка
            let myTank = { 
                id: myId, 
                name: username, 
                x: window.innerWidth / 2 - (TANK_SIZE / 2), 
                y: (window.innerHeight * 0.55) / 2 - (TANK_SIZE / 2), 
                dir: 'up', 
                score: 0 
            };
            
            let players = {};

            notify(`Подключение: ${username}`);

            // Настройка сетевой шины реального времени PubNub
            const pubnub = new PubNub({
                publishKey: 'pub-c-8def65ec-527e-4b47-bc85-ca3b6e828135',
                subscribeKey: 'sub-c-5e5bc8de-1e0e-436f-b425-4c07fcbeaf60',
                userId: myId
            });

            pubnub.subscribe({ channels: ['tanks_black_arena'] });

            // Оповещаем комнату о входе
            pubnub.publish({
                channel: 'tanks_black_arena',
                message: { type: 'join', name: username, id: myId }
            });

            // Обработка пакетов от других игроков
            pubnub.addListener({
                message: function(event) {
                    const msg = event.message;
                    
                    if (msg.id === myId) return; // Игнорируем собственные эхо-сообщения

                    if (msg.type === 'join') {
                        notify(`Игрок ${msg.name} вошел в сеть`);
                        sendPos(); 
                    }
                    else if (msg.type === 'update') {
                        players[msg.id] = msg;
                        renderFrame();
                    }
                    else if (msg.type === 'shoot') {
                        createBullet(msg.x, msg.y, msg.dir, false, msg.id);
                    }
                    else if (msg.type === 'kill') {
                        if (msg.targetId === myId) {
                            notify('Ваш танк ликвидирован!');
                            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                            
                            myTank.score = 0;
                            myTank.x = Math.floor(Math.random() * (arena.clientWidth - TANK_SIZE - 20)) + 10;
                            myTank.y = Math.floor(Math.random() * (arena.clientHeight - TANK_SIZE - 20)) + 10;
                            sendPos();
                        }
                        if (players[msg.killerId]) players[msg.killerId].score = msg.killerScore;
                        if (msg.killerId === myId) myTank.score = msg.killerScore;
                        renderFrame();
                    }
                }
            });

            // Функция отправки вектора движения в сеть
            function sendPos() {
                pubnub.publish({
                    channel: 'tanks_black_arena',
                    message: { 
                        type: 'update', 
                        id: myId, 
                        name: username, 
                        x: myTank.x, 
                        y: myTank.y, 
                        dir: myTank.dir, 
                        score: myTank.score 
                    }
                });
                renderFrame();
            }

            // Глобальная функция перемещения
            function processMove(direction) {
                const step = 15; 
                myTank.dir = direction;
                
                const maxW = arena.clientWidth - TANK_SIZE;
                const maxH = arena.clientHeight - TANK_SIZE;

                if (direction === 'up' && myTank.y > 5) myTank.y -= step;
                if (direction === 'down' && myTank.y < maxH - 5) myTank.y += step;
                if (direction === 'left' && myTank.x > 5) myTank.x -= step;
                if (direction === 'right' && myTank.x < maxW - 5) myTank.x += step;
                
                sendPos();
            }

            // Глобальная функция стрельбы
            function processShoot() {
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                
                // Расчет точки вылета снаряда из центра башни наружу
                let bx = myTank.x + (TANK_SIZE / 2) - 3;
                let by = myTank.y + (TANK_SIZE / 2) - 3;
                
                pubnub.publish({
                    channel: 'tanks_black_arena',
                    message: { type: 'shoot', id: myId, x: bx, y: by, dir: myTank.dir }
                });
                
                createBullet(bx, by, myTank.dir, true, myId);
            }

            // Привязка событий к элементам джойстика
            document.getElementById('pad-up').addEventListener('click', () => processMove('up'));
            document.getElementById('pad-down').addEventListener('click', () => processMove('down'));
            document.getElementById('pad-left').addEventListener('click', () => processMove('left'));
            document.getElementById('pad-right').addEventListener('click', () => processMove('right'));
            document.getElementById('btn-shoot').addEventListener('click', () => processShoot());

            // Поддержка управления с клавиатуры для тестов в ПК-браузере
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') processMove('up');
                if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') processMove('down');
                if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') processMove('left');
                if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') processMove('right');
                if (e.key === ' ' || e.key.toLowerCase() === 'f') processShoot();
            });

            // Логика физики и полета снаряда
            function createBullet(x, y, dir, isMine, ownerId) {
                const bulletHtml = document.createElement('div');
                bulletHtml.className = 'bullet';
                bulletHtml.style.left = x + 'px';
                bulletHtml.style.top = y + 'px';
                arena.appendChild(bulletHtml);

                let bulletInterval = setInterval(() => {
                    let bx = parseInt(bulletHtml.style.left);
                    let by = parseInt(bulletHtml.style.top);

                    if (dir === 'up') by -= 8;
                    if (dir === 'down') by += 8;
                    if (dir === 'left') bx -= 8;
                    if (dir === 'right') bx += 8;

                    bulletHtml.style.left = bx + 'px';
                    bulletHtml.style.top = by + 'px';

                    // Выход за границы арены
                    if (bx < 0 || bx > arena.clientWidth || by < 0 || by > arena.clientHeight) {
                        clearInterval(bulletInterval);
                        bulletHtml.remove();
                    }

                    // Проверка коллизий (попаданий) только на стороне атакующего
                    if (isMine) {
                        for (let id in players) {
                            let enemy = players[id];
                            if (bx >= enemy.x && bx <= enemy.x + TANK_SIZE && by >= enemy.y && by <= enemy.y + TANK_SIZE) {
                                clearInterval(bulletInterval);
                                bulletHtml.remove();
                                
                                myTank.score += 10; // Начисляем очки за фраг
                                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                                
                                pubnub.publish({
                                    channel: 'tanks_black_arena',
                                    message: { type: 'kill', killerId: myId, killerScore: myTank.score, targetId: id }
                                });
                                break;
                            }
                        }
                    }
                }, 25);
            }

            // Отрисовка графического кадра
            function renderFrame() {
                // Очищаем старые рендеры танков и точек радара
                document.querySelectorAll('.tank').forEach(el => el.remove());
                minimap.innerHTML = '';

                // Отрисовка себя
                drawTankElement(myTank, false);
                drawRadarDot(myTank, false);

                let leaderboardList = [{ name: username, score: myTank.score, isMe: true }];

                // Отрисовка сетевых врагов
                for (let id in players) {
                    let p = players[id];
                    // Если обновление от врага старое (более 10 сек) — удаляем его из списка
                    drawTankElement(p, true);
                    drawRadarDot(p, true);
                    leaderboardList.push({ name: p.name, score: p.score, isMe: false });
                }

                // Сортировка и генерация кибер-ТОПа
                leaderboardList.sort((a, b) => b.score - a.score);
                const scoreContainer = document.getElementById('leader-rows');
                scoreContainer.innerHTML = '';
                leaderboardList.slice(0, 5).forEach((item, idx) => {
                    scoreContainer.innerHTML += `
                        <div class="leader-row ${item.isMe ? 'me' : ''}">
                            <span>${idx + 1}. ${item.name}</span>
                            <span>[${item.score}]</span>
                        </div>`;
                });
            }

            // Генерация HTML/CSS структуры кастомного танка
            function drawTankElement(t, isEnemy) {
                const container = document.createElement('div');
                container.className = 'tank' + (isEnemy ? ' enemy' : '');
                container.style.left = t.x + 'px';
                container.style.top = t.y + 'px';
                
                let angle = 0;
                if (t.dir === 'up') angle = 0;
                if (t.dir === 'down') angle = 180;
                if (t.dir === 'left') angle = 270;
                if (t.dir === 'right') angle = 90;
                container.style.transform = `rotate(${angle}deg)`;

                // Рендерим составные части дизайна камуфляжа
                container.innerHTML = `
                    <div class="tank-tracks-l"></div>
                    <div class="tank-body">
                        <div class="tank-turret">
                            <div class="tank-gun"></div>
                            <div class="muzzle-flash"></div>
                        </div>
                    </div>
                    <div class="tank-tracks-r"></div>
                    <div class="tank-name" style="transform: translateX(-50%) rotate(${-angle}deg)">${t.name}</div>
                `;

                arena.appendChild(container);
            }

            // Отрисовка точки на мини-карте
            function drawRadarDot(t, isEnemy) {
                const dot = document.createElement('div');
                dot.className = 'map-dot';
                dot.style.color = isEnemy ? '#ff0055' : '#00ffaa';
                dot.style.backgroundColor = isEnemy ? '#ff0055' : '#00ffaa';
                
                const mapW = minimap.clientWidth;
                const mapH = minimap.clientHeight;
                const arenaW = arena.clientWidth;
                const arenaH = arena.clientHeight;
                
                dot.style.left = (t.x / arenaW * mapW) + 'px';
                dot.style.top = (t.y / arenaH * mapH) + 'px';
                
                minimap.appendChild(dot);
            }

            // Первичный рендер кадра
            renderFrame();

            // Фоновая синхронизация координат в сеть каждые 700мс
            setInterval(sendPos, 700);
        }
    </script>
</body>
</html>
