<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLIKY AI PRO ✨</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root { --bg: #030712; --panel: rgba(17, 24, 39, 0.85); --accent: #8b5cf6; --text: #f3f4f6; --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; margin: 0; height: 100dvh; overflow: hidden; display: flex; width: 100vw; }

        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: var(--panel); backdrop-filter: blur(25px); z-index: 2000; transition: 0.3s ease; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.7); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1500; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 110px; }
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.5; animation: slide 0.2s ease-out; word-wrap: break-word; }
        @keyframes slide { from { opacity:0; transform: translateY(10px); } to { opacity:1; } }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: rgba(31, 41, 55, 0.7); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .global-msg { background: rgba(59, 130, 246, 0.15) !important; border-color: #3b82f6; }

        .input-area { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 700px; background: rgba(31, 41, 55, 0.95); backdrop-filter: blur(20px); border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: white; height: 50px; font-size: 16px; }
        .btn-icon { background: none; border: none; color: white; cursor: pointer; padding: 10px; font-size: 20px; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .google-btn { background: white; color: black; padding: 15px 30px; border-radius: 15px; font-weight: 700; cursor: pointer; border: none; width: 280px; margin: 10px; }
        .chat-item { padding: 12px; margin: 5px 10px; background: rgba(255,255,255,0.03); border-radius: 12px; cursor: pointer; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 40px;">⚡ FLIKY AI</h1>
        <button class="google-btn" onclick="loginWithGoogle()">Войти через Google</button>
        <button class="google-btn" onclick="loginAsGuest()" style="background:none; color:white; border:1px solid #444;">Режим гостя</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div style="padding: 25px; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:20px;">МЕНЮ</b>
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
        </div>
        <button onclick="switchToGlobal()" style="margin: 0 20px 10px 20px; padding: 15px; background:linear-gradient(45deg, #3b82f6, #8b5cf6); border:none; border-radius:15px; color:white; font-weight:bold; cursor:pointer;">🌍 World Chat</button>
        <button onclick="createNewChat()" style="margin: 0 20px 20px 20px; padding: 15px; background:var(--accent); border:none; border-radius:15px; color:white; font-weight:bold; cursor:pointer;">+ Новый чат</button>
        <div id="chatList" style="flex:1; overflow-y:auto;"></div>
        <button onclick="logout()" style="padding:20px; color:#f87171; background:none; border:none; cursor:pointer;">Выйти</button>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; position:relative; width:100%;">
        <div style="height:70px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; justify-content:space-between;">
            <div style="display:flex; align-items:center;">
                <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
                <span id="headerTitle" style="margin-left:15px; font-weight:700;">FLIKY AI</span>
            </div>
            <div id="proBadge" style="background:gold; color:black; padding:4px 10px; border-radius:8px; font-size:12px; font-weight:800;">PRO</div>
        </div>

        <div id="chat" class="chat-container"></div>

        <div id="preview-wrap" style="display:none; position:absolute; bottom:85px; left:20px; background:#1f2937; padding:10px; border-radius:15px;">
            <img id="preview-img" src="" style="height:60px; border-radius:8px;">
            <button onclick="clearImage()" style="color:red; margin-left:10px; border:none; background:none; font-weight:bold;">✕</button>
        </div>

        <div class="input-area">
            <label style="cursor:pointer; padding:10px;">📷<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)"></label>
            <button class="btn-icon" id="micBtn" onclick="runVoice()">🎤</button>
            <input type="text" id="userInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-icon" onclick="send()" style="color:var(--accent);">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyClnvxC1lgvrxn-m7X1huqNmvtH7HaYsxU", authDomain: "flikyfloky-61eed.firebaseapp.com", projectId: "flikyfloky-61eed", storageBucket: "flikyfloky-61eed.firebasestorage.app", messagingSenderId: "167396726913", appId: "1:167396726913:web:871fb5bc1cf4eca509d580" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const _k = "gsk_Ui06zHrORxYH5" + "spkmge9WGdyb3FYiPY" + "yl9VgOfBu1jgvLLvsm6I8";
        
        let currentUser = null, chats = [], activeChatId = null, base64Image = null, isGlobal = false;

        // --- FIXED LOGIN FOR APPS ---
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider); // Popup орнына Redirect қолданамыз
        }
        function loginAsGuest() { currentUser = { uid: 'guest', displayName: 'Гость' }; startApp(); }
        
        auth.getRedirectResult().then(result => { if(result.user) { currentUser = result.user; startApp(); } });
        auth.onAuthStateChanged(user => { if(user) { currentUser = user; startApp(); } });

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            loadChats();
        }

        // --- 100% WORKING VOICE ---
        function runVoice() {
            const rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!rec) return alert("Микрофон не поддерживается в этом приложении");
            const speech = new rec();
            speech.lang = 'ru-RU';
            speech.onstart = () => document.getElementById('micBtn').style.color = 'red';
            speech.onend = () => document.getElementById('micBtn').style.color = 'white';
            speech.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
            speech.start();
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text && !base64Image) return;

            if(isGlobal) {
                await db.collection("global_chat").add({ text, user: currentUser.displayName, uid: currentUser.uid, time: firebase.firestore.FieldValue.serverTimestamp() });
                input.value = ''; return;
            }

            if(!activeChatId) createNewChat();
            const chat = chats.find(c => c.id === activeChatId);
            chat.messages.push({ role: 'user', content: text, image: base64Image });
            
            const currentImg = base64Image;
            input.value = ''; clearImage(); renderMessages();

            const aiMsg = { role: 'assistant', content: '' };
            chat.messages.push(aiMsg);
            const container = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg ai';
            container.appendChild(msgDiv);

            try {
                // FIXED VISION MODEL (Llama 3.2 11B Vision)
                const model = currentImg ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                let messages = [{role: "system", content: "Ты FLIKY AI. Твой автор - Даулет (@dauletbr)."}];
                
                if(currentImg) {
                    messages.push({
                        role: "user",
                        content: [
                            { type: "text", text: text || "Что на фото?" },
                            { type: "image_url", image_url: { url: currentImg } }
                        ]
                    });
                } else {
                    chat.messages.slice(-6).forEach(m => messages.push({role: m.role, content: m.content}));
                }

                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${_k}` },
                    body: JSON.stringify({ model, messages, temperature: 0.6 })
                });

                const data = await res.json();
                const result = data.choices[0].message.content;
                let i = 0;
                const timer = setInterval(() => {
                    if(i < result.length) {
                        aiMsg.content += result.charAt(i++);
                        msgDiv.innerHTML = marked.parse(aiMsg.content);
                        container.scrollTop = container.scrollHeight;
                    } else { clearInterval(timer); saveChats(); }
                }, 5);
            } catch (e) { msgDiv.innerText = "Ошибка: Проверьте интернет или формат фото."; }
        }

        // Базалық функциялар
        function loadChats() { chats = JSON.parse(localStorage.getItem(`chats_${currentUser.uid}`)) || []; renderChatList(); }
        function saveChats() { localStorage.setItem(`chats_${currentUser.uid}`, JSON.stringify(chats)); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function switchToGlobal() { isGlobal = true; activeChatId = 'global'; document.getElementById('headerTitle').innerText = "World Chat"; renderGlobalMessages(); toggleMenu(); }
        function createNewChat() { isGlobal = false; activeChatId = Date.now(); chats.unshift({ id: activeChatId, title: "Чат " + (chats.length+1), messages: [] }); renderChatList(); renderMessages(); toggleMenu(); }
        
        function renderMessages() {
            const container = document.getElementById('chat'); container.innerHTML = '';
            const chat = chats.find(c => c.id === activeChatId);
            if(!chat) return;
            chat.messages.forEach(m => {
                const d = document.createElement('div'); d.className = `msg ${m.role==='user'?'user':'ai'}`;
                d.innerHTML = (m.image ? `<img src="${m.image}" style="width:100%; border-radius:10px;"><br>` : '') + marked.parse(m.content);
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderGlobalMessages() {
            const container = document.getElementById('chat');
            db.collection("global_chat").orderBy("time", "asc").limitToLast(50).onSnapshot(snap => {
                if(!isGlobal) return;
                container.innerHTML = '';
                snap.forEach(doc => {
                    const m = doc.data();
                    const d = document.createElement('div');
                    d.className = `msg ${m.uid === currentUser.uid ? 'user' : 'ai global-msg'}`;
                    d.innerHTML = `<small style="color:gray">${m.user}</small><br>${m.text}`;
                    container.appendChild(d);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                base64Image = e.target.result;
                document.getElementById('preview-img').src = base64Image;
                document.getElementById('preview-wrap').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
        function clearImage() { base64Image = null; document.getElementById('preview-wrap').style.display = 'none'; }
        function renderChatList() {
            const list = document.getElementById('chatList'); list.innerHTML = '';
            chats.forEach(c => {
                const d = document.createElement('div'); d.className = 'chat-item';
                d.innerText = c.title; d.onclick = () => { isGlobal = false; activeChatId = c.id; renderMessages(); toggleMenu(); };
                list.appendChild(d);
            });
        }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
